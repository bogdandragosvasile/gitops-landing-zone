worker_processes auto;
events { worker_connections 1024; }

http {
    upstream api {
        server api:8000;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    # --- Employee / Admin portal (bankoffer.lupulup.com) ---
    server {
        listen 80;
        server_name bankoffer.lupulup.com;

        # Block customer portal on employee domain
        location = /portal {
            return 302 https://my-bankoffer.lupulup.com/;
        }

        # Keycloak auth proxy
        location /auth/ {
            proxy_pass http://keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # API and static files
        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- Customer portal (my-bankoffer.lupulup.com) ---
    server {
        listen 80;
        server_name my-bankoffer.lupulup.com;

        # Serve customer portal at root
        location = / {
            proxy_pass http://api/portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block employee and admin portals
        location = /admin {
            return 403;
        }
        location /staff-auth/ {
            return 403;
        }
        location /api-tokens/ {
            return 403;
        }
        location /products-catalog/ {
            return 403;
        }

        # Keycloak auth proxy (needed for SSO)
        location /auth/ {
            proxy_pass http://keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Allow customer-facing API routes and static assets
        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- Fallback for unmatched hosts (e.g. direct IP access) ---
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
