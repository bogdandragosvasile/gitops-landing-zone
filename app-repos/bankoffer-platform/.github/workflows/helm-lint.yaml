name: Helm Lint & Template

on:
  push:
    paths:
      - "infra/helm/**"
      - "gitops/argocd/**"
  pull_request:
    paths:
      - "infra/helm/**"
      - "gitops/argocd/**"

jobs:
  lint:
    name: Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.20.1"

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update

      - name: Resolve dependencies — bankoffer umbrella
        run: helm dependency update infra/helm/bankoffer

      - name: Lint — default values
        run: |
          helm lint infra/helm/bankoffer \
            --set postgresql.auth.postgresPassword=lint-placeholder \
            --set redis.auth.password=lint-placeholder \
            --set keycloak.auth.adminPassword=lint-placeholder

      - name: Lint — staging values
        run: |
          helm lint infra/helm/bankoffer \
            -f infra/helm/bankoffer/values-staging.yaml \
            --set postgresql.auth.postgresPassword=lint-placeholder \
            --set redis.auth.password=lint-placeholder \
            --set keycloak.auth.adminPassword=lint-placeholder

      - name: Lint — production values
        run: |
          helm lint infra/helm/bankoffer \
            -f infra/helm/bankoffer/values-production.yaml \
            --set postgresql.auth.postgresPassword=lint-placeholder \
            --set redis.auth.password=lint-placeholder \
            --set keycloak.auth.adminPassword=lint-placeholder

      - name: Template — render staging manifests
        run: |
          helm template bankoffer infra/helm/bankoffer \
            -f infra/helm/bankoffer/values-staging.yaml \
            --set postgresql.auth.postgresPassword=lint-placeholder \
            --set redis.auth.password=lint-placeholder \
            --set keycloak.auth.adminPassword=lint-placeholder \
            --namespace bankoffer-staging \
            > /tmp/rendered-staging.yaml
          echo "Rendered $(grep -c '^---' /tmp/rendered-staging.yaml) resource(s)"

      - name: Validate ArgoCD manifests (YAML syntax)
        run: |
          for f in gitops/argocd/**/*.yaml gitops/argocd/*.yaml; do
            python3 -c "import yaml, sys; list(yaml.safe_load_all(open('$f')))" \
              && echo "OK: $f" \
              || (echo "FAIL: $f" && exit 1)
          done
