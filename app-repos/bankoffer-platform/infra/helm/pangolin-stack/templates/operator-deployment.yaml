{{- if .Values.operator.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pangolin-stack.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pangolin-stack.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      annotations:
        # Force pod rollout whenever the operator script ConfigMap changes.
        checksum/script: {{ include (print $.Template.BasePath "/operator-script-configmap.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/name: {{ include "pangolin-stack.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "pangolin-stack.fullname" . }}-operator
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # initContainer: install Python dependencies into a writable emptyDir.
      # This avoids building a custom operator image — python:3.12-slim is sufficient.
      initContainers:
        - name: install-deps
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - pip
            - install
            - "kubernetes==29.0.0"
            - "requests==2.32.3"
            - "--target"
            - /packages
            - "--quiet"
            - "--no-cache-dir"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: packages
              mountPath: /packages
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command: ["python", "/scripts/pangolin_operator.py"]
          env:
            - name: PYTHONPATH
              value: /packages
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            # -- Pangolin connection --
            - name: PANGOLIN_URL
              value: {{ .Values.operator.pangolin.url | quote }}
            - name: PANGOLIN_ORG_ID
              value: {{ .Values.operator.pangolin.orgId | quote }}
            - name: PANGOLIN_SITE_ID
              value: {{ .Values.operator.pangolin.siteId | quote }}
            - name: PANGOLIN_DOMAIN_ID
              value: {{ .Values.operator.pangolin.domainId | default "domain1" | quote }}
            - name: TUNNEL_DOMAIN
              value: {{ .Values.operator.pangolin.tunnelDomain | quote }}
            # -- ingress-nginx target --
            - name: INGRESS_TARGET_IP
              value: {{ .Values.operator.ingressNginx.targetIP | quote }}
            - name: INGRESS_TARGET_PORT
              value: {{ .Values.operator.ingressNginx.targetPort | quote }}
            # -- operator behaviour --
            - name: EXPOSE_ANNOTATION
              value: {{ .Values.operator.exposeAnnotation | quote }}
            - name: RECONCILE_INTERVAL
              value: {{ .Values.operator.reconcileInterval | quote }}
            # -- credentials from Secret --
            - name: PANGOLIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pangolin-stack.operator.secretName" . }}
                  key: PANGOLIN_EMAIL
            - name: PANGOLIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pangolin-stack.operator.secretName" . }}
                  key: PANGOLIN_PASSWORD
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "pangolin-stack.operator.secretName" . }}
                  key: CF_API_TOKEN
            - name: CF_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "pangolin-stack.operator.secretName" . }}
                  key: CF_ZONE_ID
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: packages
              mountPath: /packages
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      volumes:
        - name: scripts
          configMap:
            name: {{ include "pangolin-stack.fullname" . }}-operator-script
        - name: packages
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
