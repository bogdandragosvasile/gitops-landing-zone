{{- if and .Values.newt.enabled (not .Values.newt.credentials.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pangolin-stack.fullname" . }}-newt-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: newt
type: Opaque
stringData:
  config.json: |
    {
      "id": {{ required "newt.credentials.id is required when existingSecret is not set" .Values.newt.credentials.id | quote }},
      "secret": {{ required "newt.credentials.secret is required when existingSecret is not set" .Values.newt.credentials.secret | quote }},
      "endpoint": {{ .Values.newt.credentials.endpoint | default "https://tunnel.lupulup.com" | quote }}
    }
{{- end }}
