{{- if and .Values.operator.enabled (not .Values.operator.credentials.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pangolin-stack.fullname" . }}-operator-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
type: Opaque
stringData:
  PANGOLIN_EMAIL: {{ .Values.operator.credentials.pangolinEmail | quote }}
  PANGOLIN_PASSWORD: {{ .Values.operator.credentials.pangolinPassword | quote }}
  CF_API_TOKEN: {{ .Values.operator.credentials.cfApiToken | quote }}
  CF_ZONE_ID: {{ .Values.operator.credentials.cfZoneId | quote }}
{{- end }}
