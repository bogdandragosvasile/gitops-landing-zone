{{- if .Values.newt.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pangolin-stack.fullname" . }}-newt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: newt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pangolin-stack.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: newt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pangolin-stack.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: newt
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # newt needs NET_ADMIN to create the WireGuard interface.
      # Ensure the wireguard kernel module is loaded on all nodes:
      #   modprobe wireguard  (or add to /etc/modules-load.d/wireguard.conf)
      securityContext:
        runAsNonRoot: false   # newt requires root for WireGuard iface creation
      containers:
        - name: newt
          image: "{{ .Values.newt.image.repository }}:{{ .Values.newt.image.tag }}"
          imagePullPolicy: {{ .Values.newt.image.pullPolicy }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: newt-config
              mountPath: /root/.config/newt-client/config.json
              subPath: config.json
              readOnly: true
          resources:
            {{- toYaml .Values.newt.resources | nindent 12 }}
      volumes:
        - name: newt-config
          secret:
            secretName: {{ include "pangolin-stack.newt.secretName" . }}
      {{- with .Values.newt.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.newt.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.newt.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
