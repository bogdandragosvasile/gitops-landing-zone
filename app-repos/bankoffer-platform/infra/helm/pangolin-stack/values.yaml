# =============================================================================
# pangolin-stack — newt WireGuard tunnel client + Pangolin DNS operator
#
# Architecture:
#   Internet → Cloudflare DNS (CNAME → tunnel.lupulup.com)
#            → Pangolin/Traefik (TLS via Cloudflare DNS-01)
#            → Gerbil WireGuard tunnel
#            → newt pod (in this namespace)
#            → ingress-nginx ClusterIP (10.102.247.250:80)
#            → app services
#
# Deploy:
#   helm upgrade --install pangolin-stack ./infra/helm/pangolin-stack \
#     --set newt.credentials.id=$NEWT_ID \
#     --set newt.credentials.secret=$NEWT_SECRET \
#     --set operator.credentials.pangolinEmail=$PANGOLIN_EMAIL \
#     --set operator.credentials.pangolinPassword=$PANGOLIN_PASS \
#     --set operator.credentials.cfApiToken=$CF_TOKEN \
#     --set operator.credentials.cfZoneId=$CF_ZONE_ID \
#     -n pangolin-system --create-namespace
# =============================================================================

global:
  imagePullSecrets:
    - name: dockerhub-pull
    - name: gitea-pull

# ---------------------------------------------------------------------------
# newt — WireGuard tunnel client (fosrl/newt)
#
# Obtain credentials from Pangolin Dashboard:
#   Dashboard → Sites → <your-k8s-site> → Edit → Newt Credentials
# ---------------------------------------------------------------------------
newt:
  enabled: true

  image:
    repository: fosrl/newt
    tag: latest
    pullPolicy: Always

  # Site credentials — NEVER commit plain values; inject via --set or ArgoCD params
  credentials:
    existingSecret: ""   # If set, use this pre-existing Secret (must have config.yml key)
    id: ""               # Pangolin site newt ID
    secret: ""           # Pangolin site newt secret
    endpoint: "https://tunnel.lupulup.com"
    logLevel: "info"

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Pangolin DNS Operator
#
# Watches Ingresses with annotation `pangolin.io/expose: "true"` and:
#   1. Creates a Pangolin HTTP resource (routing rule to ingress-nginx)
#   2. Creates a Cloudflare CNAME <hostname> → tunnel.lupulup.com
#
# TLS is handled automatically by Pangolin's Traefik via Cloudflare DNS-01.
# Uses python:3.12-slim — no custom image build required.
# ---------------------------------------------------------------------------
operator:
  enabled: true

  image:
    repository: python
    tag: "3.12-slim"
    pullPolicy: IfNotPresent

  # Pangolin server connection
  pangolin:
    url: "https://pangolin.lupulup.com"
    orgId: "lupulup"                      # Pangolin organisation slug
    siteId: "8"                           # Pangolin site ID for the K8s cluster
    domainId: "domain1"                   # Pangolin domain config key
    tunnelDomain: "pangolin.lupulup.com"  # CNAME target for all published hostnames

  # ingress-nginx ClusterIP — all routed traffic lands here
  ingressNginx:
    targetIP: "10.102.247.250"
    targetPort: 80

  # Annotation key that opts an Ingress in for Pangolin exposure
  exposeAnnotation: "pangolin.io/expose"

  # Seconds between full reconciliation passes (also the watch timeout)
  reconcileInterval: 60

  # Credentials — inject via --set or ArgoCD secret params; NEVER commit plain text
  credentials:
    existingSecret: ""    # If set, use this Secret instead; must have keys below
    pangolinEmail: ""     # key: PANGOLIN_EMAIL
    pangolinPassword: ""  # key: PANGOLIN_PASSWORD
    cfApiToken: ""        # key: CF_API_TOKEN
    cfZoneId: ""          # key: CF_ZONE_ID

  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
