apiVersion: v2
name: bankoffer
description: >
  BankOffer AI — AI-powered real-time personalization platform for banking.
  Umbrella chart that deploys the FastAPI service, nginx reverse-proxy ingresses,
  seed job, PostgreSQL, Redis, and Keycloak as one cohesive release.
type: application
version: 0.1.0
appVersion: "2.8.1"
icon: https://bankoffer.lupulup.com/static/favicon.ico
keywords:
  - banking
  - fintech
  - ai
  - personalization
maintainers:
  - name: bogdan
    url: https://github.com/bogdandragosvasile
dependencies:
  - name: postgresql
    version: "~18.5.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~25.3.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: keycloak
    version: "~25.2.0"
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled
