{{- if .Values.ingressEmployee.enabled -}}
# ─────────────────────────────────────────────────────────────────────────────
# Employee + Admin portal  —  bankoffer.lupulup.com
#
# Routes:
#   /auth/*  → keycloak (SSO)
#   /        → api (all remaining paths, incl. /admin, /static, /api/*)
#   = /portal → 302 to customer domain  (via server-snippet)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bankoffer.fullname" . }}-employee
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bankoffer.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress-employee
  annotations:
    {{- with .Values.ingressEmployee.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingressEmployee.className }}
  {{- if .Values.ingressEmployee.tls }}
  tls:
    - hosts:
        - {{ .Values.ingressEmployee.host | quote }}
      secretName: {{ .Values.ingressEmployee.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingressEmployee.host | quote }}
      http:
        paths:
          # /auth/ → Keycloak (must come before the catch-all)
          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: {{ include "bankoffer.keycloak.host" . }}
                port:
                  name: http
          # Everything else → API
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "bankoffer.fullname" . }}-api
                port:
                  name: http
{{- end }}
