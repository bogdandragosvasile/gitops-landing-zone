{{- if .Values.networkPolicy.enabled -}}
# ─────────────────────────────────────────────────────────────────────────────
# API pod: ingress from ingress-nginx + Prometheus; egress to postgres/redis/keycloak
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bankoffer.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bankoffer.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bankoffer.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the nginx ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 8000
    # Allow Prometheus scrape
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 6379
    # Keycloak
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 8080
    # External HTTPS — needed for AI provider API calls (Claude, OpenAI, etc.)
    - ports:
        - port: 443
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ─────────────────────────────────────────────────────────────────────────────
# Seed job: only needs to reach PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bankoffer.fullname" . }}-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bankoffer.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bankoffer.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: seed
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 5432
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
