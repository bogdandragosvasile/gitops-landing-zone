{{/*
  Placeholder ConfigMap used only for triggering pod rollouts via checksum annotation.
  Actual config is injected via env vars in the Deployment.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bankoffer.fullname" . }}-api-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bankoffer.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
data:
  DEMO_MODE: {{ .Values.api.config.demoMode | quote }}
  LOG_LEVEL: {{ .Values.api.config.logLevel | quote }}
  KEYCLOAK_REALM: {{ .Values.api.config.keycloakRealm | quote }}
