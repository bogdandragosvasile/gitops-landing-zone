{{- if .Values.keycloak.enabled -}}
# ConfigMap containing the Keycloak realm definition.
# Mounted into the Keycloak pod at /opt/bitnami/keycloak/data/import/
# and imported on startup via `--import-realm` flag.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-realm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bankoffer.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
data:
  realm-export.json: |
    {{- .Files.Get "files/realm-export.json" | nindent 4 }}
{{- end }}
