# =============================================================================
# Production overrides — applied on top of values.yaml
# Secrets are injected by ArgoCD + External Secrets Operator (ESO).
# helm upgrade --install bankoffer ./infra/helm/bankoffer \
#   -f infra/helm/bankoffer/values-production.yaml \
#   -n bankoffer --create-namespace
# =============================================================================

api:
  replicaCount: 3
  config:
    demoMode: "false"
    logLevel: "info"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
  pdb:
    enabled: true
    minAvailable: 2
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

seed:
  # In production the seed job only runs on first install; it is idempotent
  # (INSERT ... ON CONFLICT DO NOTHING), so upgrades are safe.
  enabled: true

postgresql:
  primary:
    persistence:
      size: 50Gi
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi
  metrics:
    serviceMonitor:
      enabled: true

redis:
  master:
    persistence:
      size: 8Gi
  metrics:
    serviceMonitor:
      enabled: true

keycloak:
  production: true
  replicaCount: 2
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
