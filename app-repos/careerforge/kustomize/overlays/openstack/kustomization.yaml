apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: careerforge

resources:
  # Sealed Secrets — decrypted in-cluster by the sealed-secrets controller
  - sealed-secrets/careerforge-db.yaml
  - sealed-secrets/careerforge-redis.yaml
  - sealed-secrets/careerforge-dev-keys.yaml
  # Shared config, RBAC, ServiceAccount
  - ../../base/common.yaml
  # Stateful infrastructure
  - ../../base/postgres/deployment.yaml
  - ../../base/redis/deployment.yaml
  # Backend services
  - ../../base/employee/deployment.yaml
  - ../../base/employee/service.yaml
  - ../../base/coach/deployment.yaml
  - ../../base/coach/service.yaml
  - ../../base/admin/deployment.yaml
  - ../../base/admin/service.yaml
  # API ingress
  - ingress.yaml

# Pin image to a specific immutable tag — updated by CI via `kustomize edit set image`
images:
  - name: gitea.local/careerforge/backend
    newName: git.lupulup.com/admin/careerforge-backend
    newTag: "581b2bb"

patches:
  # Demo: single replica everywhere
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  # Remove Vault sidecar volumes (no Vault in this environment; keys come from
  # the careerforge-dev-keys SealedSecret via DEV_PII_KEY_HEX / DEV_HMAC_KEY_HEX)
  - patch: |-
      - op: remove
        path: /spec/template/spec/volumes
    target:
      kind: Deployment
      labelSelector: "component=backend"
  - patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
    target:
      kind: Deployment
      labelSelector: "component=backend"

  # Inject DEV encryption keys from SealedSecret
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DEV_PII_KEY_HEX
          valueFrom:
            secretKeyRef:
              name: careerforge-dev-keys
              key: pii_key_hex
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DEV_HMAC_KEY_HEX
          valueFrom:
            secretKeyRef:
              name: careerforge-dev-keys
              key: hmac_key_hex
    target:
      kind: Deployment
      labelSelector: "component=backend"

  # Inject connector encryption key into admin service (no Vault in this env)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DEV_CONNECTOR_KEY_HEX
          valueFrom:
            secretKeyRef:
              name: careerforge-dev-keys
              key: pii_key_hex
    target:
      kind: Deployment
      name: admin-service

  # Inject Keycloak admin credentials into admin service (for user/role management)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: KEYCLOAK_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: careerforge-ai-keys
              key: keycloak_admin_user
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: careerforge-ai-keys
              key: keycloak_admin_password
    target:
      kind: Deployment
      name: admin-service

  # Inject Perplexity API key into all backend services (for RAG queries)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PERPLEXITY_API_KEY
          valueFrom:
            secretKeyRef:
              name: careerforge-ai-keys
              key: perplexity_api_key
    target:
      kind: Deployment
      labelSelector: "component=backend"

  # Pull from the authenticated Gitea registry
  - patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: gitea-pull
    target:
      kind: Deployment
      labelSelector: "component=backend"

secretGenerator:
  - name: careerforge-ai-keys
    literals:
      - perplexity_api_key=CHANGE_ME
      - keycloak_admin_user=admin
      - keycloak_admin_password=CHANGE_ME
    options:
      disableNameSuffixHash: true

configMapGenerator:
  - name: careerforge-common
    behavior: merge
    literals:
      - KEYCLOAK_URL=https://auth.lupulup.com
      - CORS_ORIGINS=https://my-career.k8s.openstack.lupulup.com,https://cc-career.k8s.openstack.lupulup.com,https://admin-career.k8s.openstack.lupulup.com
      - APP_VERSION=1.0.0
