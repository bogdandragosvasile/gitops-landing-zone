apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: careerforge

resources:
  - ../../base

patches:
  # Prod: 3 replicas for backend services
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      labelSelector: "component=backend"
  # Prod: 4 celery workers
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
    target:
      kind: Deployment
      name: celery-worker
  # Prod: tighter resource limits
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
    target:
      kind: Deployment
      labelSelector: "component=backend"

configMapGenerator:
  - name: careerforge-common
    behavior: merge
    literals:
      - APP_VERSION=stable
      - CORS_ORIGINS=https://admin.careerforge.io,https://coach.careerforge.io,https://app.careerforge.io

images:
  - name: gitea.local/careerforge/backend
    newTag: stable
  - name: gitea.local/careerforge/admin-portal
    newTag: stable
  - name: gitea.local/careerforge/coach-portal
    newTag: stable
  - name: gitea.local/careerforge/employee-portal
    newTag: stable
