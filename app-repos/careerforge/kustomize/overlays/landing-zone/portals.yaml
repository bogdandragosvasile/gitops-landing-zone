---
# Admin portal frontend — nginx serving pre-built React app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal
  namespace: careerforge
  labels:
    app: admin-portal
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-portal
  template:
    metadata:
      labels:
        app: admin-portal
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: admin-portal
          image: careerforge-admin-portal:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: admin-portal
  namespace: careerforge
  labels:
    app: admin-portal
spec:
  selector:
    app: admin-portal
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
