---
# CareerForge DB credentials — landing zone local dev only
apiVersion: v1
kind: Secret
metadata:
  name: careerforge-db
  namespace: careerforge
type: Opaque
stringData:
  username: careerforge
  password: careerforge123
  url: postgresql+asyncpg://careerforge:careerforge123@postgres:5432/careerforge
---
# CareerForge Redis credentials — no auth in landing zone (redis:7-alpine default)
apiVersion: v1
kind: Secret
metadata:
  name: careerforge-redis
  namespace: careerforge
type: Opaque
stringData:
  url: redis://redis:6379/0
---
# CareerForge PII/HMAC dev keys (optional — services mark secretRef optional)
apiVersion: v1
kind: Secret
metadata:
  name: careerforge-pii
  namespace: careerforge
type: Opaque
stringData:
  PII_ENCRYPTION_KEY: "landing-zone-dev-pii-key-32chars!!"
  HMAC_SECRET: "landing-zone-dev-hmac-secret-key!!"
