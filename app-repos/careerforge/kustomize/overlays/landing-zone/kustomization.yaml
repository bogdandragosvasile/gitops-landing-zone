apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: careerforge

resources:
  - ../../base
  - secrets.yaml
  - portals.yaml

# Exclude ollama — too resource-heavy for local dev
components: []

patches:
  # ── Ingress: nginx → traefik, no TLS, local hostnames ─────────────────────
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: careerforge-ingress
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
      spec:
        ingressClassName: traefik
        tls: []
        rules:
          - host: cf-admin.local
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: admin-portal
                      port:
                        number: 80
          - host: cf-coach.local
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: coach-portal
                      port:
                        number: 80
          - host: cf-employee.local
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: employee-portal
                      port:
                        number: 80
          - host: cf-api.local
            http:
              paths:
                - path: /admin
                  pathType: Prefix
                  backend:
                    service:
                      name: admin-service
                      port:
                        number: 8000
                - path: /employee
                  pathType: Prefix
                  backend:
                    service:
                      name: employee-service
                      port:
                        number: 8002
                - path: /coach
                  pathType: Prefix
                  backend:
                    service:
                      name: coach-service
                      port:
                        number: 8003
    target:
      kind: Ingress
      name: careerforge-ingress

  # ── Scale down all backend Deployments to 1 replica ───────────────────────
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      labelSelector: "component=backend"

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: celery-worker

  # ── Single worker + asyncio loop for dev ──────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "services.admin.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--loop", "asyncio"]
    target:
      kind: Deployment
      name: admin-service

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "services.employee.main:app", "--host", "0.0.0.0", "--port", "8002", "--workers", "1", "--loop", "asyncio"]
    target:
      kind: Deployment
      name: employee-service

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "services.coach.main:app", "--host", "0.0.0.0", "--port", "8003", "--workers", "1", "--loop", "asyncio"]
    target:
      kind: Deployment
      name: coach-service

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["uvicorn", "services.ai_connector.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1", "--loop", "asyncio"]
    target:
      kind: Deployment
      name: ai-connector-service

  # ── Remove Vault projected volumes (Vault not deployed in landing zone) ────
  - patch: |-
      - op: remove
        path: /spec/template/spec/volumes
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
    target:
      kind: Deployment
      labelSelector: "component=backend"

  - patch: |-
      - op: remove
        path: /spec/template/spec/volumes
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
    target:
      kind: Deployment
      name: celery-worker

  - patch: |-
      - op: remove
        path: /spec/template/spec/volumes
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
    target:
      kind: Deployment
      name: celery-beat

  # ── NetworkPolicy: allow Traefik instead of nginx ─────────────────────────
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: careerforge-default
      spec:
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: careerforge
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
    target:
      kind: NetworkPolicy
      name: careerforge-default

  # ── Exclude Ollama ─────────────────────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      kind: Deployment
      name: ollama
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: ollama-models-pvc
    target:
      kind: PersistentVolumeClaim
      name: ollama-models-pvc

configMapGenerator:
  - name: careerforge-common
    behavior: merge
    literals:
      - APP_VERSION=dev
      - KEYCLOAK_URL=http://keycloak-keycloakx-http.keycloak.svc.cluster.local
      - OLLAMA_BASE_URL=http://ollama:11434
      - CORS_ORIGINS=http://cf-employee.local,http://cf-admin.local,http://cf-coach.local,http://localhost:3000

images:
  - name: gitea.local/careerforge/backend
    newName: careerforge-backend
    newTag: dev
  - name: gitea.local/careerforge/admin-portal
    newName: careerforge-admin-portal
    newTag: dev
  - name: gitea.local/careerforge/coach-portal
    newName: careerforge-coach-portal
    newTag: dev
  - name: gitea.local/careerforge/employee-portal
    newName: careerforge-employee-portal
    newTag: dev
