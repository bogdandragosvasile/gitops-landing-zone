apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: careerforge

resources:
  # Sealed Secrets for DB and Redis only
  - ../openstack/sealed-secrets/careerforge-db.yaml
  - ../openstack/sealed-secrets/careerforge-redis.yaml
  # Shared config, RBAC, ServiceAccount
  - ../../base/common.yaml
  # Stateful infrastructure only
  - ../../base/postgres/deployment.yaml
  - ../../base/redis/deployment.yaml

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

configMapGenerator:
  - name: careerforge-common
    behavior: merge
    literals:
      - KEYCLOAK_URL=https://auth.lupulup.com
      - CORS_ORIGINS=https://my-career.k8s.openstack.lupulup.com,https://cc-career.k8s.openstack.lupulup.com,https://admin-career.k8s.openstack.lupulup.com
      - APP_VERSION=1.0.0
