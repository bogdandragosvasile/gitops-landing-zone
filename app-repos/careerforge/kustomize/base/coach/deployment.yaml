apiVersion: apps/v1
kind: Deployment
metadata:
  name: coach-service
  labels:
    app: coach-service
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coach-service
  template:
    metadata:
      labels:
        app: coach-service
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8003"
    spec:
      serviceAccountName: careerforge-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: coach-service
          image: gitea.local/careerforge/backend:latest
          command: ["uvicorn", "services.coach.main:app", "--host", "0.0.0.0", "--port", "8003", "--workers", "2"]
          ports:
            - containerPort: 8003
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: careerforge-db
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: careerforge-redis
                  key: url
          envFrom:
            - configMapRef:
                name: careerforge-common
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: vault-secrets
          projected:
            sources:
              - serviceAccountToken:
                  path: vault-token
                  expirationSeconds: 7200
                  audience: vault
