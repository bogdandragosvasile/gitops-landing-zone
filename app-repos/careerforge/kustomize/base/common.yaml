---
# ConfigMap with non-secret environment variables shared by all services
apiVersion: v1
kind: ConfigMap
metadata:
  name: careerforge-common
data:
  KEYCLOAK_URL: "http://keycloak:8080"
  OLLAMA_BASE_URL: "http://ollama:11434"
  EMBEDDING_MODEL: "nomic-embed-text"
  CLAUDE_MODEL: "claude-opus-4-6"
  RAG_TOP_K: "8"
  CORS_ORIGINS: ""
  APP_VERSION: "0.1.0"
---
# ServiceAccount for all backend pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: careerforge-backend
  annotations:
    # Vault Kubernetes auth role
    vault.hashicorp.com/role: "careerforge"
---
# RBAC: allow backend SA to read secrets in its namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: careerforge-backend
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: careerforge-backend
subjects:
  - kind: ServiceAccount
    name: careerforge-backend
roleRef:
  kind: Role
  name: careerforge-backend
  apiGroup: rbac.authorization.k8s.io
---
# Namespace-level NetworkPolicy: only allow intra-namespace + ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: careerforge-default
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: careerforge
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - {}  # Allow all egress (DNS, Vault, Keycloak, external APIs)
