apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    app: celery-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
        component: worker
    spec:
      serviceAccountName: careerforge-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: celery-worker
          image: gitea.local/careerforge/backend:latest
          command:
            - celery
            - -A
            - services.ai_connector.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - --queues=celery
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: careerforge-db
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: careerforge-redis
                  key: url
          envFrom:
            - configMapRef:
                name: careerforge-common
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: vault-secrets
          projected:
            sources:
              - serviceAccountToken:
                  path: vault-token
                  expirationSeconds: 7200
                  audience: vault
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  labels:
    app: celery-beat
    component: scheduler
spec:
  replicas: 1  # Beat must be singleton
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
        component: scheduler
    spec:
      serviceAccountName: careerforge-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: celery-beat
          image: gitea.local/careerforge/backend:latest
          command:
            - celery
            - -A
            - services.ai_connector.celery_app
            - beat
            - --loglevel=info
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: careerforge-db
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: careerforge-redis
                  key: url
          envFrom:
            - configMapRef:
                name: careerforge-common
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: vault-secrets
          projected:
            sources:
              - serviceAccountToken:
                  path: vault-token
                  expirationSeconds: 7200
                  audience: vault
