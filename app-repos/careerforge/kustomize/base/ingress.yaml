apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careerforge-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - admin.careerforge.local
        - coach.careerforge.local
        - app.careerforge.local
        - api.careerforge.local
      secretName: careerforge-tls
  rules:
    # Admin portal
    - host: admin.careerforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-portal
                port:
                  number: 80
    # Coach portal
    - host: coach.careerforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coach-portal
                port:
                  number: 80
    # Employee portal
    - host: app.careerforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: employee-portal
                port:
                  number: 80
    # Admin API
    - host: api.careerforge.local
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 8000
          - path: /employee
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 8002
          - path: /coach
            pathType: Prefix
            backend:
              service:
                name: coach-service
                port:
                  number: 8003
