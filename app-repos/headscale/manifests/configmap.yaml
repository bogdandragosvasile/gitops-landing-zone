apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale
  labels:
    app: headscale
data:
  config.yaml: |
    # Headscale control-plane config for the gitops-landing-zone.
    # Reference: https://github.com/juanfont/headscale/blob/main/config-example.yaml

    # The URL clients connect to. On the landing zone, Traefik ingress
    # routes http://headscale.local to this pod. If you expose Headscale
    # publicly (e.g. via Cloudflare Tunnel), change this to the public URL.
    server_url: http://headscale.local

    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: true

    private_key_path: /var/lib/headscale/private.key
    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48

    # Embedded DERP server — relays traffic between Tailscale clients that
    # can't reach each other directly. On a LAN-only landing zone this also
    # runs on the same pod; for cross-internet phone demos, run a separate
    # public DERP or use Cloudflare Tunnel.
    derp:
      server:
        enabled: true
        region_id: 999
        region_code: "landingzone"
        region_name: "GitOps Landing Zone"
        stun_listen_addr: "0.0.0.0:3478"
        # DERP server needs a persistent private key — same PVC as the
        # Headscale noise key so it survives pod restarts.
        private_key_path: /var/lib/headscale/derp_server_private.key
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      auto_update_enabled: true
      update_frequency: 24h

    disable_check_updates: true
    ephemeral_node_inactivity_timeout: 30m

    database:
      type: sqlite3
      sqlite:
        path: /var/lib/headscale/db.sqlite

    log:
      format: text
      level: info

    # Magic DNS — clients resolve each other's hostnames automatically.
    dns:
      magic_dns: true
      base_domain: landingzone.local
      nameservers:
        global:
          - 1.1.1.1
          - 8.8.8.8

    unix_socket: /var/run/headscale/headscale.sock
    unix_socket_permission: "0770"

    # Policy / ACLs — start with allow-all; tighten once you have multiple users.
    policy:
      mode: file
      path: ""
