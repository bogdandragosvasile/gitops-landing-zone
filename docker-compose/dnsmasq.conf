# dnsmasq configuration for GitOps Landing Zone
# Resolves *.local to 127.0.0.1 for the host

# Wildcard: all *.local domains resolve to localhost
address=/.local/127.0.0.1

# Upstream DNS for everything else
server=8.8.8.8
server=8.8.4.4

# Don't read /etc/resolv.conf (we provide our own upstreams)
no-resolv

# Don't read /etc/hosts inside the container
no-hosts

# Log queries for debugging (view with: docker logs dnsmasq)
log-queries
log-facility=-

# Cache DNS results (1000 entries)
cache-size=1000

# Listen on all interfaces
listen-address=0.0.0.0

# Don't forward plain names (without dots) upstream
domain-needed
bogus-priv
