    function _auditSection(label, data) {
      if (!data) return '';
      const json = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      return `
        <div>
          <p class="text-xs font-semibold uppercase tracking-wider mb-2" style="color: var(--text-muted);">${label}</p>
          <pre class="text-xs p-3 overflow-x-auto rounded" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-secondary); white-space: pre-wrap; word-break: break-word;">${json}</pre>
        </div>`;
    }

    async function showAuditDetail(recommendationId) {
      const modal = document.getElementById('audit-detail-modal');
      const body  = document.getElementById('audit-detail-body');
      const idEl  = document.getElementById('audit-detail-id');

      idEl.textContent = recommendationId;
      body.innerHTML = '<p style="color: var(--text-muted);">Loading...</p>';
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      try {
        const resp = await fetch(`${API}/compliance/audit/${recommendationId}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const r = await resp.json();

        const suitability = r.suitability_checks;
        let suitabilityHtml = '';
        if (suitability && typeof suitability === 'object' && !Array.isArray(suitability)) {
          // Object form: { gdpr: true, mifid: false, ... }
          const rows = Object.entries(suitability).map(([k, v]) => {
            const pass = v === true || v === 'pass' || v === 'ok';
            const color = pass ? 'var(--accent-green, #2D7D46)' : 'var(--accent-red, #C1403D)';
            const label = pass ? 'PASS' : 'FAIL';
            return `<tr><td class="pr-4 py-1 font-mono text-xs" style="color: var(--text-secondary);">${k}</td>
                        <td class="py-1 text-xs font-semibold" style="color: ${color};">${label}</td>
                        <td class="py-1 text-xs pl-3" style="color: var(--text-muted);">${typeof v === 'object' ? JSON.stringify(v) : String(v)}</td></tr>`;
          }).join('');
          suitabilityHtml = `
            <div>
              <p class="text-xs font-semibold uppercase tracking-wider mb-2" style="color: var(--text-muted);">Suitability Checks</p>
              <table class="w-full text-sm" style="border: 1px solid var(--border);">
                <thead><tr class="text-left text-xs uppercase tracking-wider" style="border-bottom: 1px solid var(--border); color: var(--text-muted);">
                  <th class="pr-4 pb-2 pt-2 pl-2">Check</th><th class="pb-2 pt-2">Result</th><th class="pb-2 pt-2 pl-3">Value</th>
                </tr></thead>
                <tbody class="divide-y" style="--tw-divide-opacity:1;">${rows}</tbody>
              </table>
            </div>`;
        } else {
          suitabilityHtml = _auditSection('Suitability Checks', suitability);
        }

        const finalOffers = Array.isArray(r.final_offers) ? r.final_offers : (r.final_offers ? [r.final_offers] : []);
        const offersHtml = finalOffers.length ? `
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider mb-2" style="color: var(--text-muted);">Final Offers (${finalOffers.length})</p>
            <div class="space-y-2">
              ${finalOffers.map(o => `
                <div class="px-3 py-2 text-xs" style="border: 1px solid var(--border); background: var(--bg-sunken);">
                  <span class="font-medium" style="color: var(--text-primary);">${o.product_name || o.product_id || '—'}</span>
                  ${o.score !== undefined ? `<span class="ml-3" style="color: var(--text-muted);">Score: ${(o.score * 100).toFixed(1)}%</span>` : ''}
                  ${o.reason ? `<span class="ml-3" style="color: var(--text-muted);">${o.reason}</span>` : ''}
                </div>`).join('')}
            </div>
          </div>` : '';

        const excluded = Array.isArray(r.excluded_products) ? r.excluded_products : [];
        const excludedHtml = excluded.length ? `
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider mb-2" style="color: var(--text-muted);">Excluded Products (${excluded.length})</p>
            <div class="space-y-1">
              ${excluded.map(e => `
                <div class="px-3 py-1.5 text-xs" style="border: 1px solid var(--border); background: var(--bg-sunken);">
                  <span style="color: var(--text-primary);">${e.product_name || e.product_id || '—'}</span>
                  ${e.reason ? `<span class="ml-3" style="color: var(--accent-red, #C1403D);">${e.reason}</span>` : ''}
                </div>`).join('')}
            </div>
          </div>` : '';

        body.innerHTML = `
          <div class="grid grid-cols-2 gap-4 text-xs pb-4" style="border-bottom: 1px solid var(--border);">
            <div><span style="color: var(--text-muted);">Customer ID</span><br><span class="font-mono font-medium">${r.customer_id}</span></div>
            <div><span style="color: var(--text-muted);">External ID</span><br><span class="font-mono font-medium">${r.external_customer_id || '—'}</span></div>
            <div><span style="color: var(--text-muted);">Model Version</span><br><span class="font-medium">${r.model_version}</span></div>
            <div><span style="color: var(--text-muted);">Created</span><br><span class="font-medium">${new Date(r.created_at).toLocaleString()}</span></div>
          </div>
          ${offersHtml}
          ${excludedHtml}
          ${suitabilityHtml}
          ${_auditSection('Input Features', r.input_features)}
          ${_auditSection('Profile Result', r.profile_result)}
          ${_auditSection('Scored Products', r.scored_products)}
          ${_auditSection('Consent Snapshot', r.consent_snapshot)}
        `;
      } catch (e) {
        body.innerHTML = `<p class="text-sm" style="color: var(--accent-red, #C1403D);">Failed to load audit detail: ${e.message}</p>`;
      }
    }

    function closeAuditDetail() {
      const modal = document.getElementById('audit-detail-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Close on backdrop click
    document.addEventListener('click', e => {
      const modal = document.getElementById('audit-detail-modal');
      if (e.target === modal) closeAuditDetail();
    });

    // ===== PRODUCT P&L =====

    let _pnlDays = 30;
    let _pnlData = null;
    let _pnlActiveFilter = 'all';

    function setPnlPeriod(d) {
      _pnlDays = d;
      document.querySelectorAll('.pnl-period-btn').forEach(b => {
        b.style.borderColor = 'var(--border)';
        b.style.color = 'var(--text-secondary)';
        b.style.background = 'transparent';
      });
      const btn = document.getElementById(`pnl-btn-${d}`);
      if (btn) { btn.style.borderColor = 'var(--accent)'; btn.style.color = 'var(--accent)'; }
      loadPnL();
    }

    async function loadPnL() {
      document.getElementById('pnl-table-loading').style.display = '';
      document.getElementById('pnl-table').classList.add('hidden');
      document.getElementById('pnl-alerts').classList.add('hidden');
      try {
        const resp = await fetch(`${API}/products-catalog/performance?days=${_pnlDays}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        _pnlData = await resp.json();
        renderPnL(_pnlData);
      } catch(e) {
        document.getElementById('pnl-table-loading').textContent = `Failed to load: ${e.message}`;
      }
    }

    function _eur(v) {
      if (v === 0) return '—';
      return (v < 0 ? '-€' : '€') + Math.abs(v).toLocaleString('ro-RO', { maximumFractionDigits: 0 });
    }
    function _pct(v) { return v === 0 ? '—' : v.toFixed(1) + '%'; }
    function _scoreColor(v) {
      if (v > 40)  return '#2D7D46';
      if (v > 10)  return '#D4A843';
      return '#C1403D';
    }
    function _complianceColor(v) {
      if (v >= 95) return '#2D7D46';
      if (v >= 80) return '#D4A843';
      return '#C1403D';
    }

    const _pnlFilters = {
      all:             () => true,
      low_conv:        p => p.compliance_pass_rate >= 50 && p.e2e_conversion < 2 && p.offers_generated > 0,
      high_block:      p => p.blocked_by_compliance > 0 && p.offers_generated > 0,
      negative_net:    p => p.final_score < 0,
      high_complaints: p => p.complaint_rate > 2 && p.contracts_activated > 0,
    };

    function filterPnl(key) {
      _pnlActiveFilter = key;
      document.querySelectorAll('.pnl-filter-btn').forEach(b => {
        b.style.background = 'transparent';
        b.style.color = 'var(--text-secondary)';
        b.style.border = '1px solid var(--border)';
      });
      const active = document.getElementById(`pnl-filter-${key}`);
      if (active) { active.style.background = 'var(--accent)'; active.style.color = '#fff'; active.style.border = 'none'; }
      if (_pnlData) _renderPnlTable(_pnlData.products || []);
    }

    function renderPnL(data) {
      const products = data.products || [];
      const alerts   = data.alerts   || [];

      // KPI cards
      const active = products.filter(p => p.offers_generated > 0);
      const totalNet = active.reduce((s, p) => s + p.net_contribution, 0);
      const avgE2E   = active.length ? active.reduce((s, p) => s + p.e2e_conversion, 0) / active.length : 0;
      const avgComp  = active.length ? active.reduce((s, p) => s + p.compliance_pass_rate, 0) / active.length : 0;
      const flagCount = alerts.filter(a => a.level === 'HIGH').length;

      document.getElementById('pnl-kpi-net').textContent  = _eur(totalNet);
      document.getElementById('pnl-kpi-net').style.color  = totalNet > 0 ? '#2D7D46' : totalNet < 0 ? '#C1403D' : 'var(--text-primary)';
      document.getElementById('pnl-kpi-e2e').textContent  = _pct(avgE2E);
      document.getElementById('pnl-kpi-comp').textContent = _pct(avgComp);
      document.getElementById('pnl-kpi-comp').style.color = _complianceColor(avgComp);
      document.getElementById('pnl-kpi-flags').textContent = flagCount > 0 ? `${flagCount}` : '0';
      document.getElementById('pnl-kpi-flags').style.color = flagCount > 0 ? '#C1403D' : '#2D7D46';

      // Alerts (collapsed by default — show only if there are any)
      const alertsEl = document.getElementById('pnl-alerts');
      if (alerts.length) {
        alertsEl.classList.remove('hidden');
        alertsEl.innerHTML = alerts.map(a => {
          const col = a.level === 'HIGH' ? '#C1403D' : '#D4A843';
          return `<div class="flex items-center gap-3 px-4 py-2 text-xs" style="background:${col}18;border-left:3px solid ${col};">
            <span class="font-bold text-[10px] uppercase" style="color:${col};">${a.level}</span>
            <span style="color:var(--text-primary);">${a.product}</span>
            <span style="color:var(--text-secondary);">${a.msg}</span>
          </div>`;
        }).join('');
      }

      // Table + chart
      _renderPnlTable(products);
      _renderPnlScatter(products);
      _renderPnlPlaybook();
    }

    function _renderPnlTable(products) {
      const filterFn = _pnlFilters[_pnlActiveFilter] || _pnlFilters.all;
      const sorted = [...products].sort((a, b) => b.final_score - a.final_score);
      const filtered = sorted.filter(filterFn);

      document.getElementById('pnl-tbody').innerHTML = filtered.map(p => {
        const scoreColor = _scoreColor(p.final_score);
        const compColor  = _complianceColor(p.compliance_pass_rate);
        return `<tr class="border-b table-row" style="border-color:var(--border);">
          <td class="px-4 py-2.5">
            <div class="font-medium" style="color:var(--text-primary);">${p.product_name}</div>
            <div class="text-[10px]" style="color:var(--text-muted);">${p.category || ''}</div>
          </td>
          <td class="px-3 py-2.5 text-right" style="color:var(--text-secondary);">${p.offers_generated.toLocaleString()}</td>
          <td class="px-3 py-2.5 text-right" style="color:var(--text-secondary);">${p.offers_sent.toLocaleString()}</td>
          <td class="px-3 py-2.5 text-right" style="color:var(--text-secondary);">${p.contracts_activated}</td>
          <td class="px-3 py-2.5 text-right" style="color:var(--text-secondary);">${p.blocked_by_compliance}</td>
          <td class="px-3 py-2.5 text-right font-semibold" style="color:${compColor};">${_pct(p.compliance_pass_rate)}</td>
          <td class="px-3 py-2.5 text-right" style="color:var(--text-secondary);">${p.business_score.toFixed(0)}</td>
          <td class="px-3 py-2.5 text-right" style="color:var(--text-secondary);">${p.risk_penalty.toFixed(0)}</td>
          <td class="px-3 py-2.5 text-right font-bold" style="color:${scoreColor};font-size:.8rem;">${p.final_score.toFixed(0)}</td>
        </tr>`;
      }).join('') || `<tr><td colspan="9" class="px-4 py-6 text-center text-xs" style="color:var(--text-muted);">No products match this filter.</td></tr>`;

      document.getElementById('pnl-table-loading').style.display = 'none';
      document.getElementById('pnl-table').classList.remove('hidden');
    }

    function _renderPnlScatter(products) {
      const el = document.getElementById('pnl-scatter');
      if (!el) return;

      const W = el.clientWidth || 700;
      const H = 300;
      const pad = { t: 16, r: 28, b: 44, l: 54 };
      const pw = W - pad.l - pad.r;
      const ph = H - pad.t - pad.b;

      const all = products.filter(p => p.offers_generated > 0);
      if (!all.length) {
        el.innerHTML = '<p class="text-xs p-4" style="color:var(--text-muted);">No data for this period.</p>';
        return;
      }

      const scores = all.map(p => p.final_score);
      const comps  = all.map(p => p.compliance_pass_rate);
      const vols   = all.map(p => p.offers_generated);
      const maxVol = Math.max(...vols);
      let minS = Math.min(...scores), maxS = Math.max(...scores);
      if (minS === maxS) { minS -= 5; maxS += 5; }
      // Add 10% padding on each side of score axis
      const scoreRange = maxS - minS;
      minS -= scoreRange * 0.1;
      maxS += scoreRange * 0.1;

      const sx = v => pad.l + (v - minS) / (maxS - minS) * pw;
      const sy = v => pad.t + ph - (v / 100 * ph);
      const sr = v => Math.max(6, Math.min(22, (v / maxVol) * 22));

      // Y-axis gridlines + labels
      let grid = '';
      [0, 25, 50, 75, 100].forEach(v => {
        const y = sy(v);
        grid += `<line x1="${pad.l}" y1="${y}" x2="${pad.l+pw}" y2="${y}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>
                 <text x="${pad.l - 7}" y="${y + 3.5}" text-anchor="end" font-size="9" fill="var(--text-muted)">${v}%</text>`;
      });

      // X-axis labels
      let xLabels = '';
      const ticks = 5;
      for (let i = 0; i <= ticks; i++) {
        const v = minS + (maxS - minS) * i / ticks;
        const x = sx(v);
        xLabels += `<text x="${x}" y="${pad.t + ph + 14}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${v.toFixed(0)}</text>`;
      }

      // Zero-score vertical line
      const zeroX = sx(0);
      const zeroLine = (zeroX > pad.l + 4 && zeroX < pad.l + pw - 4)
        ? `<line x1="${zeroX}" y1="${pad.t}" x2="${zeroX}" y2="${pad.t+ph}" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="4,3"/>`
        : '';

      const bubbles = all.map((p, i) => {
        const x = sx(scores[i]), y = sy(comps[i]), r = sr(vols[i]);
        const color = _scoreColor(p.final_score);
        const short = p.product_name.split(' ').slice(0, 2).join('\u00A0');
        return `<g>
          <circle cx="${x}" cy="${y}" r="${r}" fill="${color}" fill-opacity="0.65" stroke="${color}" stroke-width="1.5"/>
          <text x="${x}" y="${y - r - 5}" text-anchor="middle" font-size="8.5" fill="var(--text-secondary)" pointer-events="none">${short}</text>
        </g>`;
      }).join('');

      el.innerHTML = `<svg width="${W}" height="${H}" style="display:block;overflow:visible;">
        <rect x="${pad.l}" y="${pad.t}" width="${pw}" height="${ph}" fill="var(--bg-sunken)" stroke="var(--border)" stroke-width="1"/>
        ${grid}
        ${zeroLine}
        ${bubbles}
        ${xLabels}
        <text x="${pad.l + pw/2}" y="${H - 6}" text-anchor="middle" font-size="9" fill="var(--text-muted)">&#x2190; Final Priority Score &#x2192;</text>
        <text transform="rotate(-90)" x="${-(pad.t + ph/2)}" y="14" text-anchor="middle" font-size="9" fill="var(--text-muted)">Compliance %</text>
      </svg>`;
    }

    function _renderPnlPlaybook() {
      const grid = document.getElementById('pnl-playbook-grid');
      if (!grid) return;
      // Show the prompt button — user decides when to run AI
      grid.innerHTML = `<div class="col-span-1 md:col-span-2 flex items-center gap-4 p-4" style="background:var(--bg-raised);border:1px solid var(--border);">
        <div class="flex-1">
          <div class="text-xs font-medium mb-0.5" style="color:var(--text-primary);">AI Analysis not yet run</div>
          <div class="text-xs" style="color:var(--text-muted);">Analyse all product metrics with the active AI connector and get per-product recommendations.</div>
        </div>
        <button onclick="_loadPlaybookAI()" id="pnl-ai-run-btn"
          class="flex items-center gap-2 px-3 py-2 text-xs font-medium transition-colors"
          style="background:var(--accent);color:#fff;border:none;white-space:nowrap;">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
          Run AI Analysis
        </button>
      </div>`;
    }

    async function _loadPlaybookAI() {
      const grid = document.getElementById('pnl-playbook-grid');
      if (!grid) return;

      // Show loading state
      grid.innerHTML = `<div class="col-span-1 md:col-span-2 flex items-center gap-3 p-4 text-xs" style="color:var(--text-muted);">
        <span class="pulse-dot inline-block w-2 h-2 rounded-full flex-shrink-0" style="background:var(--accent);"></span>
        Analysing with AI — this may take a few seconds...
      </div>`;

      try {
        const resp = await fetch(`${API}/intelligence/playbook-analysis?days=${_pnlDays}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        const priorityColor = { high: '#C1403D', medium: '#D4A843', low: '#2D7D46' };

        const header = `<div class="col-span-1 md:col-span-2 flex items-center justify-between px-1 mb-1">
          <div class="flex items-center gap-2 text-[10px] uppercase tracking-wider font-semibold" style="color:var(--text-muted);">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            AI Analysis &mdash; ${escHtml(data.connector)}
          </div>
          <button onclick="_loadPlaybookAI()" class="text-[10px] px-2 py-1 transition-colors"
            style="border:1px solid var(--border);color:var(--text-secondary);">Refresh</button>
        </div>`;

        const summaryCard = data.summary ? `<div class="col-span-1 md:col-span-2 p-3 text-xs" style="background:var(--accent)0D;border:1px solid var(--accent)33;">
          <div class="font-semibold mb-1" style="color:var(--accent);">Portfolio Summary</div>
          <div style="color:var(--text-primary);">${escHtml(data.summary)}</div>
        </div>` : '';

        const recCards = (data.recommendations || []).map(r => {
          const pColor = priorityColor[r.priority] || '#999';
          return `<div class="p-3 text-xs" style="background:var(--bg-raised);border:1px solid var(--border);border-left:3px solid ${pColor};">
            <div class="flex items-center justify-between mb-1.5">
              <div class="font-semibold" style="color:var(--text-primary);">${escHtml(r.product_name)}</div>
              <span class="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded" style="background:${pColor}18;color:${pColor};">${r.priority}</span>
            </div>
            <div class="mb-1" style="color:var(--text-primary);">${escHtml(r.situation)}</div>
            <div class="mb-1" style="color:var(--text-secondary);"><span style="color:var(--text-muted);">Root cause:</span> ${escHtml(r.root_cause)}</div>
            <div style="color:var(--accent);font-weight:500;">&#x2192; ${escHtml(r.action)}</div>
          </div>`;
        }).join('');

        grid.innerHTML = header + summaryCard + (recCards || `<div class="col-span-2 p-3 text-xs" style="color:var(--text-muted);">No issues detected by AI.</div>`);

      } catch(e) {
        grid.innerHTML = `<div class="col-span-1 md:col-span-2 flex items-center gap-4 p-4" style="background:var(--bg-raised);border:1px solid var(--border);">
          <div class="flex-1 text-xs" style="color:var(--accent-red,#C1403D);">AI analysis failed: ${escHtml(e.message)}</div>
          <button onclick="_loadPlaybookAI()" class="px-3 py-2 text-xs transition-colors"
            style="border:1px solid var(--border);color:var(--text-secondary);">Retry</button>
        </div>`;
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== CONNECTORS =====
    let _allConnectors = [];
    let _currentCatFilter = 'all';
    let _configConnectorId = null;

    const CONN_ICONS = {
      brain: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>',
      cloud: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>',
      megaphone: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>',
      chart: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>',
      users: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>',
      message: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>',
      card: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>',
      shield: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>',
      plug: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>',
    };

    const CONN_STATUS_STYLES = {
      available: { bg: 'bg-border/30', text: 'text-ink-secondary', border: 'border-border/50', label: 'Available', dot: 'bg-border-strong' },
      pending: { bg: 'bg-accent-yellow/10', text: 'text-accent-yellow', border: 'border-accent-yellow/30', label: 'Pending Approval', dot: 'bg-accent-yellow' },
      approved: { bg: 'bg-accent-blue/10', text: 'text-accent-blue', border: 'border-accent-blue/30', label: 'Approved', dot: 'bg-accent-blue' },
      active: { bg: 'bg-accent-green/10', text: 'text-accent-green', border: 'border-accent-green/30', label: 'Active', dot: 'bg-accent-green' },
      disabled: { bg: 'bg-border/30', text: 'text-ink-secondary', border: 'border-border/50', label: 'Disabled', dot: 'bg-border-strong' },
      rejected: { bg: 'bg-accent-red/10', text: 'text-accent-red', border: 'border-accent-red/30', label: 'Rejected', dot: 'bg-accent-red' },
    };

    const CAT_COLORS = {
      ai: 'text-accent-blue bg-accent-blue/10',
      cloud: 'text-accent-blue bg-accent-blue/10',
      advertising: 'text-accent-yellow bg-accent-yellow/10',
      analytics: 'text-accent-blue bg-accent-blue/10',
      crm: 'text-accent-green bg-accent-green/10',
      messaging: 'text-ink bg-border/50',
      payments: 'text-accent-yellow bg-accent-yellow/10',
      security: 'text-accent-red bg-accent-red/10',
    };

    async function loadConnectors() {
      try {
        const resp = await fetch(`${API}/connectors`);
        if (!resp.ok) throw new Error('Failed to load');
        _allConnectors = await resp.json();
        renderConnectors();
      } catch (err) {
        document.getElementById('connectors-grid').innerHTML = '<div class="col-span-full text-center py-8 text-accent-red text-sm">Failed to load connectors</div>';
      }
    }

    function renderConnectors() {
      const grid = document.getElementById('connectors-grid');
      const filtered = _currentCatFilter === 'all' ? _allConnectors : _allConnectors.filter(c => c.category === _currentCatFilter);

      // Update counts
      const active = _allConnectors.filter(c => c.status === 'active').length;
      const pending = _allConnectors.filter(c => c.status === 'pending').length;
      document.getElementById('conn-count-active').innerHTML = `<span class="w-2 h-2 rounded bg-accent-green"></span> ${active} active`;
      document.getElementById('conn-count-pending').innerHTML = `<span class="w-2 h-2 rounded bg-accent-yellow"></span> ${pending} pending`;
      document.getElementById('conn-count-total').textContent = `${_allConnectors.length} total`;

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-12 text-ink-muted text-sm">No connectors in this category</div>';
        return;
      }

      grid.innerHTML = filtered.map(c => {
        const st = CONN_STATUS_STYLES[c.status] || CONN_STATUS_STYLES.available;
        const icon = CONN_ICONS[c.icon] || CONN_ICONS.plug;
        const catColor = CAT_COLORS[c.category] || 'text-ink-secondary bg-border/50';
        const aiSuggested = c.suggested_by && c.suggested_by.startsWith('ai');

        let actions = '';
        if (c.status === 'pending') {
          actions = `<div class="flex gap-2 mt-3">
            <button onclick="approveConnector(${c.id}, 'approve')" class="flex-1 px-3 py-1.5 rounded bg-accent-green/10 text-accent-green text-xs font-medium hover:bg-accent-green/20 transition">Approve</button>
            <button onclick="approveConnector(${c.id}, 'reject')" class="flex-1 px-3 py-1.5 rounded bg-accent-red/10 text-accent-red text-xs font-medium hover:bg-accent-red/20 transition">Reject</button>
          </div>`;
        } else if (c.status === 'available' || c.status === 'approved') {
          const canActivate = c.status === 'approved' || (c.status === 'available' && c.config_values && Object.keys(c.config_values).length > 0);
          actions = `<div class="flex gap-2 mt-3">
            <button onclick="openConfigModal(${c.id})" class="flex-1 px-3 py-1.5 rounded bg-accent-blue/10 text-accent-blue text-xs font-medium hover:bg-accent-blue/20 transition">Configure</button>
            ${canActivate ? `<button onclick="toggleConnector(${c.id})" class="px-3 py-1.5 rounded bg-accent-green/10 text-accent-green text-xs font-medium hover:bg-accent-green/20 transition">Activate</button>` : ''}
          </div>`;
        } else if (c.status === 'active') {
          actions = `<div class="flex gap-2 mt-3">
            <button onclick="openConfigModal(${c.id})" class="flex-1 px-3 py-1.5 rounded bg-accent-blue/10 text-accent-blue text-xs font-medium hover:bg-accent-blue/20 transition">Configure</button>
            <button onclick="toggleConnector(${c.id})" class="px-3 py-1.5 rounded bg-accent-red/10 text-accent-red text-xs font-medium hover:bg-accent-red/20 transition">Disable</button>
          </div>`;
        } else if (c.status === 'disabled') {
          actions = `<div class="flex gap-2 mt-3">
            <button onclick="toggleConnector(${c.id})" class="flex-1 px-3 py-1.5 rounded bg-accent-green/10 text-accent-green text-xs font-medium hover:bg-accent-green/20 transition">Re-activate</button>
            <button onclick="deleteConnector(${c.id}, '${c.name.replace(/'/g, "\\'")}')" class="px-3 py-1.5 rounded bg-accent-red/10 text-accent-red text-xs font-medium hover:bg-accent-red/20 transition">Delete</button>
          </div>`;
        }

        return `<div class="glass-card rounded p-4 fade-in border ${st.border}">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded ${catColor} flex items-center justify-center flex-shrink-0">${icon}</div>
              <div>
                <h4 class="text-sm font-semibold text-ink">${c.name}</h4>
                <p class="text-xs text-ink-muted">${c.provider}</p>
              </div>
            </div>
            <div class="flex items-center gap-1.5">
              ${aiSuggested ? '<span class="px-1.5 py-0.5 rounded text-[10px] font-medium" style="background: var(--bg-sunken); color: var(--text-secondary);">AI</span>' : ''}
              <span class="flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-medium ${st.bg} ${st.text}"><span class="w-1.5 h-1.5 rounded ${st.dot}"></span>${st.label}</span>
            </div>
          </div>
          <p class="text-xs text-ink-secondary leading-relaxed mb-1">${c.description || ''}</p>
          <span class="inline-block px-2 py-0.5 rounded text-[10px] font-medium ${catColor} uppercase tracking-wider">${c.category}</span>
          ${c.approved_by ? `<p class="text-[10px] text-ink-muted mt-2">Approved by ${c.approved_by}</p>` : ''}
          ${actions}
        </div>`;
      }).join('');
    }

    function filterConnectors(cat) {
      _currentCatFilter = cat;
      document.querySelectorAll('.conn-filter').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
      renderConnectors();
    }

    async function approveConnector(id, action) {
      const session = getStaffSession();
      const admin = session?.email || session?.name || 'admin';
      try {
        const resp = await fetch(`${API}/connectors/${id}/approve`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ approved_by: admin, action }),
        });
        if (!resp.ok) throw new Error('Failed');
        alert(action === 'approve' ? 'Connector approved!' : 'Connector rejected.');
        loadConnectors();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function toggleConnector(id) {
      try {
        const resp = await fetch(`${API}/connectors/${id}/toggle`, { method: 'PUT' });
        if (!resp.ok) throw new Error('Failed');
        loadConnectors();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function deleteConnector(id, name) {
      if (!confirm(`Delete connector "${name}"?`)) return;
      try {
        const resp = await fetch(`${API}/connectors/${id}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error('Failed');
        loadConnectors();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function aiSuggestConnectors() {
      const btn = document.getElementById('ai-suggest-btn');
      btn.disabled = true;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Analyzing...';
      try {
        const resp = await fetch(`${API}/connectors/ai-suggest`, { method: 'POST' });
        if (!resp.ok) throw new Error('Failed');
        const suggested = await resp.json();
        alert(`AI suggested ${suggested.length} new connector(s) for your review.`);
        loadConnectors();
      } catch (err) {
        alert('AI suggestion failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg> AI Suggest';
      }
    }

    function openAddConnectorForm() {
      document.getElementById('add-connector-form').classList.remove('hidden');
    }

    function closeAddConnectorForm() {
      document.getElementById('add-connector-form').classList.add('hidden');
      document.getElementById('conn-name').value = '';
      document.getElementById('conn-provider').value = '';
      document.getElementById('conn-desc').value = '';
    }

    async function saveNewConnector() {
      const name = document.getElementById('conn-name').value.trim();
      const provider = document.getElementById('conn-provider').value.trim();
      const category = document.getElementById('conn-category').value;
      const icon = document.getElementById('conn-icon').value;
      const desc = document.getElementById('conn-desc').value.trim();
      if (!name || !provider) { alert('Name and Provider are required.'); return; }
      try {
        const resp = await fetch(`${API}/connectors`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, provider, category, icon, description: desc, config_schema: [], suggested_by: 'admin' }),
        });
        if (!resp.ok) throw new Error('Failed');
        closeAddConnectorForm();
        loadConnectors();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function openConfigModal(id) {
      const conn = _allConnectors.find(c => c.id === id);
      if (!conn) return;
      _configConnectorId = id;
      document.getElementById('config-modal-title').textContent = `Configure: ${conn.name}`;
      const fields = document.getElementById('config-modal-fields');
      const schema = conn.config_schema || [];
      const values = conn.config_values || {};

      if (schema.length === 0) {
        fields.innerHTML = '<p class="text-ink-muted text-sm">No configuration fields defined for this connector.</p>';
      } else {
        fields.innerHTML = schema.map(f => {
          const val = values[f.name] || '';
          const req = f.required ? '<span class="text-accent-red">*</span>' : '';
          if (f.type === 'select' && f.options) {
            const opts = f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('');
            return `<div><label class="block text-xs text-ink-secondary mb-1">${f.label} ${req}</label><select id="cfg-${f.name}" class="w-full px-3 py-2 rounded bg-surface-sunken border border-border/50 text-ink text-sm focus:outline-none focus:border-accent-blue/50">${opts}</select></div>`;
          }
          if (f.type === 'textarea') {
            return `<div><label class="block text-xs text-ink-secondary mb-1">${f.label} ${req}</label><textarea id="cfg-${f.name}" rows="3" class="w-full px-3 py-2 rounded bg-surface-sunken border border-border/50 text-ink text-sm focus:outline-none focus:border-accent-blue/50 resize-y" placeholder="${f.placeholder || ''}">${val}</textarea></div>`;
          }
          const inputType = f.type === 'password' ? 'password' : f.type || 'text';
          return `<div><label class="block text-xs text-ink-secondary mb-1">${f.label} ${req}</label><input type="${inputType}" id="cfg-${f.name}" value="${val}" class="w-full px-3 py-2 rounded bg-surface-sunken border border-border/50 text-ink text-sm focus:outline-none focus:border-accent-blue/50" placeholder="${f.placeholder || ''}"></div>`;
        }).join('');
      }

      const modal = document.getElementById('conn-config-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeConfigModal() {
      const modal = document.getElementById('conn-config-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      _configConnectorId = null;
    }

    async function saveConnectorConfig() {
      if (!_configConnectorId) return;
      const conn = _allConnectors.find(c => c.id === _configConnectorId);
      if (!conn) return;
      const schema = conn.config_schema || [];
      const values = {};
      schema.forEach(f => {
        const el = document.getElementById(`cfg-${f.name}`);
        if (el) values[f.name] = el.value;
      });
      try {
        const resp = await fetch(`${API}/connectors/${_configConnectorId}/configure`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ config_values: values }),
        });
        if (!resp.ok) throw new Error('Failed');
        closeConfigModal();
        alert('Configuration saved!');
        loadConnectors();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // ═══════════════════════════════════════════════════════════
    // INTELLIGENCE HUB
    // ═══════════════════════════════════════════════════════════

    let _allIntel = [];
    let _allSuggestions = [];
    let _activeAiConnectors = [];
    let _intelFilter = 'all';
    let _sugFilter = 'all';

    const IMPACT_STYLES = {
      positive: { bg: 'bg-accent-green/10', text: 'text-accent-green', border: 'border-accent-green/20', icon: '↑' },
      negative: { bg: 'bg-accent-red/10', text: 'text-accent-red', border: 'border-accent-red/20', icon: '↓' },
      neutral:  { bg: 'bg-border-strong/10', text: 'text-ink-secondary', border: 'border-border', icon: '→' },
      mixed:    { bg: 'bg-accent-yellow/10', text: 'text-accent-yellow', border: 'border-accent-yellow/20', icon: '↕' },
    };

    const SEVERITY_STYLES = {
      critical: { bg: 'bg-accent-red/15', text: 'text-accent-red', label: 'CRITICAL' },
      high:     { bg: 'bg-accent-yellow/15', text: 'text-accent-yellow', label: 'HIGH' },
      medium:   { bg: 'bg-accent-blue/15', text: 'text-accent-blue', label: 'MEDIUM' },
      low:      { bg: 'bg-border/15', text: 'text-ink-secondary', label: 'LOW' },
    };

    const CAT_LABELS = {
      exchange_markets: 'Exchange Markets',
      geopolitics: 'Geopolitics',
      regulations: 'Regulations',
      economic: 'Economic',
      trends: 'Trends',
    };

    const CAT_ICONS = {
      exchange_markets: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>',
      geopolitics: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
      regulations: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/></svg>',
      economic: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>',
      trends: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>',
    };

    const PROD_TYPE_STYLES = {
      investment:  { bg: 'bg-accent-blue/10', text: 'text-accent-blue', label: 'Investment' },
      savings:     { bg: 'bg-accent-green/10', text: 'text-accent-green', label: 'Savings' },
      lending:     { bg: 'bg-accent-yellow/10', text: 'text-accent-yellow', label: 'Lending' },
      mortgage:    { bg: 'bg-accent-blue/10', text: 'text-accent-blue', label: 'Mortgage' },
      credit_card: { bg: 'bg-accent-blue/10', text: 'text-accent-blue', label: 'Credit' },
      insurance:   { bg: 'bg-accent-red/10', text: 'text-accent-red', label: 'Insurance' },
    };

    async function loadIntelligence() {
      try {
        const [mResp, sResp, cResp] = await Promise.all([
          fetch(`${API}/intelligence/market-data`),
          fetch(`${API}/intelligence/suggestions`),
          fetch(`${API}/connectors?category=ai&status=active`),
        ]);
        _allIntel = mResp.ok ? await mResp.json() : [];
        _allSuggestions = sResp.ok ? await sResp.json() : [];
        _activeAiConnectors = cResp.ok ? await cResp.json() : [];
      } catch (e) {
        _allIntel = [];
        _allSuggestions = [];
        _activeAiConnectors = [];
      }
      updateIntelStats();
      renderIntelGrid();
      renderSuggestionsGrid();
      updateModelBadge();
    }

    function updateIntelStats() {
      document.getElementById('intel-stat-total').textContent = _allIntel.length;
      document.getElementById('intel-stat-positive').textContent = _allIntel.filter(i => i.impact === 'positive').length;
      document.getElementById('intel-stat-negative').textContent = _allIntel.filter(i => i.impact === 'negative').length;
      document.getElementById('intel-stat-critical').textContent = _allIntel.filter(i => i.severity === 'critical').length;
      document.getElementById('intel-stat-suggestions').textContent = _allSuggestions.length;
    }

    function updateModelBadge() {
      const badge = document.getElementById('intel-model-badge');
      if (_activeAiConnectors && _activeAiConnectors.length > 0) {
        const names = _activeAiConnectors.map(c => c.name).join(', ');
        badge.innerHTML = `<span class="w-2 h-2 rounded bg-accent-green inline-block mr-1"></span> ${names}`;
        badge.className = 'px-3 py-1.5 rounded text-xs font-medium bg-accent-green/10 text-accent-green border border-accent-green/20';
      } else {
        badge.textContent = 'No AI model connected';
        badge.className = 'px-3 py-1.5 rounded text-xs font-medium bg-surface-sunken text-ink-secondary border border-border';
      }
    }

    function renderIntelGrid() {
      const grid = document.getElementById('intel-market-grid');
      const items = _intelFilter === 'all' ? _allIntel : _allIntel.filter(i => i.category === _intelFilter);
      if (!items.length) {
        grid.innerHTML = '<div class="text-center py-12 text-ink-muted col-span-full"><p class="text-sm">No market intelligence data for this category.</p></div>';
        return;
      }
      grid.innerHTML = items.map(item => {
        const imp = IMPACT_STYLES[item.impact] || IMPACT_STYLES.neutral;
        const sev = SEVERITY_STYLES[item.severity] || SEVERITY_STYLES.medium;
        const catIcon = CAT_ICONS[item.category] || '';
        const catLabel = CAT_LABELS[item.category] || item.category;

        // Render data points as key-value pills
        const dp = item.data_points || {};
        const dpHtml = Object.entries(dp).slice(0, 6).map(([k, v]) => {
          const label = k.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
          const val = Array.isArray(v) ? v.join(', ') : v;
          return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-surface-sunken text-xs"><span class="text-ink-muted">${label}:</span> <span class="text-ink font-medium">${val}</span></span>`;
        }).join('');

        return `
          <div class="glass-card rounded p-5">
            <div class="flex items-start justify-between gap-3 mb-2">
              <div class="flex items-center gap-2 min-w-0">
                <span class="flex-shrink-0 ${imp.text}">${catIcon}</span>
                <span class="text-xs font-medium px-2 py-0.5 rounded ${imp.bg} ${imp.text}">${catLabel}</span>
                <span class="text-xs font-medium px-2 py-0.5 rounded ${sev.bg} ${sev.text}">${sev.label}</span>
              </div>
              <span class="text-lg ${imp.text} font-bold flex-shrink-0">${imp.icon}</span>
            </div>
            <h4 class="text-sm font-semibold text-ink mb-1.5 leading-snug">${item.title}</h4>
            <p class="text-xs text-ink-secondary leading-relaxed mb-3">${item.summary}</p>
            <div class="flex flex-wrap gap-1.5 mb-2">${dpHtml}</div>
            <div class="flex items-center justify-between text-xs text-ink-muted pt-2 border-t border-border">
              <span>${item.source || 'Unknown source'}</span>
              <span>${item.region || 'Global'}</span>
            </div>
          </div>`;
      }).join('');
    }

    function filterIntel(cat) {
      _intelFilter = cat;
      document.querySelectorAll('.intel-filter').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-icat="${cat}"]`).classList.add('active');
      renderIntelGrid();
    }

    function renderSuggestionsGrid() {
      const grid = document.getElementById('intel-suggestions-grid');
      const items = _sugFilter === 'all' ? _allSuggestions : _allSuggestions.filter(s => s.status === _sugFilter);
      if (!items.length) {
        grid.innerHTML = '<div class="text-center py-8 text-ink-muted"><p class="text-sm">No suggestions match this filter.</p></div>';
        return;
      }
      grid.innerHTML = items.map(s => {
        const pt = PROD_TYPE_STYLES[s.product_type] || PROD_TYPE_STYLES.investment;
        const conf = Math.round(s.confidence * 100);
        const confColor = conf >= 85 ? 'text-accent-green' : conf >= 70 ? 'text-accent-yellow' : 'text-ink-secondary';
        const demandColors = { very_high: 'text-accent-green', high: 'text-accent-blue', medium: 'text-accent-yellow', low: 'text-ink-secondary' };
        const riskColors = { low: 'text-accent-green', medium: 'text-accent-yellow', high: 'text-accent-red' };
        const statusBadge = s.status === 'pending' ? '<span class="px-2 py-0.5 rounded bg-accent-yellow/10 text-accent-yellow text-xs">Pending</span>'
          : s.status === 'approved' ? '<span class="px-2 py-0.5 rounded bg-accent-green/10 text-accent-green text-xs">Approved</span>'
          : s.status === 'rejected' ? '<span class="px-2 py-0.5 rounded bg-accent-red/10 text-accent-red text-xs">Rejected</span>'
          : s.status === 'expired' ? '<span class="px-2 py-0.5 rounded bg-surface-sunken text-ink-muted text-xs">Expired</span>'
          : '<span class="px-2 py-0.5 rounded bg-accent-blue/10 text-accent-blue text-xs">Implemented</span>';

        const segments = (s.target_segments || []).map(seg => `<span class="px-2 py-0.5 rounded bg-surface-sunken text-xs text-ink-secondary">${seg.replace(/_/g, ' ')}</span>`).join('');
        const drivers = (s.market_drivers || []).map(d => `<span class="px-2 py-0.5 rounded bg-accent-blue/10 text-accent-blue text-xs">${d}</span>`).join('');

        const actions = s.status === 'pending' ? `
          <div class="flex gap-2 mt-3 pt-3 border-t border-border">
            <button onclick="approveSuggestion(${s.id},'approve')" class="flex-1 py-2 rounded bg-accent-green/10 text-accent-green text-xs font-medium hover:bg-accent-green/20 transition">Approve</button>
            <button onclick="approveSuggestion(${s.id},'reject')" class="flex-1 py-2 rounded bg-accent-red/10 text-accent-red text-xs font-medium hover:bg-accent-red/20 transition">Reject</button>
            <button onclick="deleteSuggestion(${s.id})" class="py-2 px-3 rounded bg-surface-sunken text-ink-muted text-xs hover:text-accent-red transition">✕</button>
          </div>`
          : s.status === 'approved' ? `
          <div class="flex gap-2 mt-3 pt-3 border-t border-border">
            <button onclick="implementSuggestion(${s.id})" class="flex-1 py-2 rounded bg-accent-blue text-ink-inverse text-xs font-medium hover:bg-accent-blue/90 transition flex items-center justify-center gap-1">
              Publish to Catalog
            </button>
            <button onclick="approveSuggestion(${s.id},'reject')" class="py-2 px-4 rounded border text-xs font-medium transition" style="border-color: var(--border); color: var(--text-secondary);">Reject</button>
            <button onclick="deleteSuggestion(${s.id})" class="py-2 px-3 rounded bg-surface-sunken text-ink-muted text-xs hover:text-accent-red transition">✕</button>
          </div>`
          : s.status === 'implemented' ? `
          <div class="flex items-center gap-2 mt-3 pt-3 border-t border-border text-xs">
            <span class="flex items-center gap-1 text-accent-blue"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> In catalog</span>
            <span class="px-2 py-0.5 rounded bg-accent-yellow/10 text-accent-yellow">24h staging</span>
            ${s.approved_by ? `<span class="text-ink-muted">by ${s.approved_by}</span>` : ''}
            <button onclick="deleteSuggestion(${s.id})" class="ml-auto py-1 px-2 rounded bg-surface-sunken text-ink-muted hover:text-accent-red transition">Delete</button>
          </div>`
          : `
          <div class="flex gap-2 mt-3 pt-3 border-t border-border text-xs text-ink-muted">
            ${s.approved_by ? `<span>By ${s.approved_by}</span>` : ''}
            ${s.approved_at ? `<span>on ${new Date(s.approved_at).toLocaleDateString()}</span>` : ''}
            <button onclick="deleteSuggestion(${s.id})" class="ml-auto py-1 px-2 rounded bg-surface-sunken text-ink-muted hover:text-accent-red transition">Delete</button>
          </div>`;

        return `
          <div class="glass-card rounded p-5">
            <div class="flex items-start justify-between gap-3 mb-2">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="px-2 py-0.5 rounded text-xs font-medium ${pt.bg} ${pt.text}">${pt.label}</span>
                ${statusBadge}
              </div>
              <div class="flex items-center gap-3 text-xs flex-shrink-0">
                <span class="${confColor} font-bold">${conf}%</span>
                <span class="${demandColors[s.projected_demand] || 'text-ink-secondary'}">${(s.projected_demand || 'medium').replace('_', ' ')} demand</span>
                <span class="${riskColors[s.risk_level] || 'text-ink-secondary'}">${s.risk_level || 'medium'} risk</span>
              </div>
            </div>
            <h4 class="text-sm font-semibold text-ink mb-1">${s.product_name}</h4>
            <p class="text-xs text-ink-secondary leading-relaxed mb-2">${s.description}</p>
            <details class="mb-3">
              <summary class="text-xs text-accent-blue cursor-pointer hover:underline">AI Reasoning</summary>
              <p class="text-xs text-ink-secondary mt-2 leading-relaxed pl-3" style="border-left: 1px solid var(--border);">${s.reasoning}</p>
            </details>
            <div class="flex flex-wrap gap-1.5 mb-1">
              <span class="text-xs text-ink-muted mr-1">Segments:</span>${segments}
            </div>
            <div class="flex flex-wrap gap-1.5">
              <span class="text-xs text-ink-muted mr-1">Drivers:</span>${drivers}
            </div>
            <div class="text-xs text-ink-muted mt-2">Model: ${s.ai_model_used || 'built-in'}</div>
            ${actions}
          </div>`;
      }).join('');
    }

    function filterSuggestions(status) {
      _sugFilter = status;
      document.querySelectorAll('.sug-filter').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-sst="${status}"]`).classList.add('active');
      renderSuggestionsGrid();
    }

    async function runIntelAnalysis() {
      const btn = document.getElementById('intel-analyze-btn');
      btn.disabled = true;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Analyzing...';
      try {
        const resp = await fetch(`${API}/intelligence/analyze`, { method: 'POST' });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: `HTTP ${resp.status}` }));
          throw new Error(err.detail || 'Analysis failed');
        }
        const data = await resp.json();
        const modelNote = data.ai_powered ? `AI: ${data.model_used}` : `Built-in engine (no active AI reached)`;
        alert(`Analysis complete!\n\n• ${data.market_intelligence_count} market signals processed\n• ${data.suggestions_created} new product suggestions\n• ${modelNote}`);
        loadIntelligence();
      } catch (err) {
        alert('Analysis error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg> Run AI Analysis';
      }
    }

    async function approveSuggestion(id, action) {
      const session = getStaffSession();
      const by = session ? session.email : 'admin';
      try {
        const resp = await fetch(`${API}/intelligence/suggestions/${id}/approve?action=${action}&approved_by=${encodeURIComponent(by)}`, { method: 'PUT' });
        if (!resp.ok) throw new Error('Failed');
        loadIntelligence();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function implementSuggestion(id) {
      if (!confirm('Publish this product to the catalog?\n\nA 24-hour staging period applies — the product will go live after compliance review.')) return;
      const session = getStaffSession();
      const by = session ? session.email : 'admin';
      try {
        const resp = await fetch(`${API}/intelligence/suggestions/${id}/implement?implemented_by=${encodeURIComponent(by)}`, { method: 'PUT' });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || 'Failed');
        }
        const data = await resp.json();
        const goLive = data.go_live_at ? new Date(data.go_live_at).toLocaleString() : '24h from now';
        alert(`Product staged for catalog!\n\n• Product ID: ${data.product_id}\n• Type: ${data.product_type}\n• Risk: ${data.risk_level}\n• Active: ${data.active ? 'Yes' : 'No (staging)'}\n• Goes live: ${goLive}\n\n${data.message || ''}`);
        loadIntelligence();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function deleteSuggestion(id) {
      if (!confirm('Delete this product suggestion?')) return;
      try {
        const resp = await fetch(`${API}/intelligence/suggestions/${id}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error('Failed');
        loadIntelligence();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function activateStaged() {
      try {
        const resp = await fetch(`${API}/intelligence/activate-staged`, { method: 'POST' });
        if (!resp.ok) throw new Error('Failed');
        const data = await resp.json();
        if (data.count > 0) {
          alert(`Activated ${data.count} product(s):\n\n${data.activated.map(p => '• ' + p).join('\n')}`);
        } else {
          alert('No products ready for activation.\n\nProducts need to complete the 24-hour staging period before they can go live.');
        }
        loadIntelligence();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }
    </script>
    </body>
    </html>

