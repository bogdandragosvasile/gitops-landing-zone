        <div class="space-y-2 text-sm">
          <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
            <span style="color:var(--text-muted);">Action</span><span style="color:var(--text-primary);font-weight:600;">${entry.action}</span>
            <span style="color:var(--text-muted);">Actor</span><span style="color:var(--text-primary);">${entry.actor || '—'}</span>
            <span style="color:var(--text-muted);">Actor type</span><span style="color:var(--text-primary);">${entry.actor_type || '—'}</span>
            <span style="color:var(--text-muted);">Resource</span><span style="color:var(--text-primary);">${[entry.resource_type, entry.resource_id].filter(Boolean).join(' / ') || '—'}</span>
            <span style="color:var(--text-muted);">Endpoint</span><span class="font-mono" style="color:var(--text-secondary);">${entry.http_method || ''} ${entry.endpoint || '—'}</span>
            <span style="color:var(--text-muted);">HTTP status</span><span style="color:var(--text-primary);">${entry.http_status || '—'}</span>
            <span style="color:var(--text-muted);">Duration</span><span style="color:var(--text-primary);">${entry.duration_ms != null ? entry.duration_ms + ' ms' : '—'}</span>
