    // ===== API TOKENS =====
    async function loadApiTokens() {
      const container = document.getElementById('tokens-table-container');
      try {
        const resp = await fetch(`${API}/api-tokens`);
        if (!resp.ok) throw new Error('Failed to load tokens');
        const tokens = await resp.json();

        if (!tokens.length) {
          container.innerHTML = `<p class="text-ink-muted text-sm" data-i18n="admin.token_empty">${t('admin.token_empty') || 'No API tokens generated yet.'}</p>`;
          return;
        }

        let html = `<div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-ink-secondary uppercase tracking-wider border-b border-border">
            <th class="pb-2 pr-3" data-i18n="admin.token_th_name">Name</th>
            <th class="pb-2 pr-3" data-i18n="admin.token_th_prefix">Token Prefix</th>
            <th class="pb-2 pr-3" data-i18n="admin.token_th_scopes">Scopes</th>
            <th class="pb-2 pr-3" data-i18n="admin.token_th_created">Created</th>
            <th class="pb-2 pr-3" data-i18n="admin.token_th_last_used">Last Used</th>
            <th class="pb-2 pr-3" data-i18n="admin.token_th_expires">Expires</th>
            <th class="pb-2 pr-3" data-i18n="common.status">Status</th>
            <th class="pb-2" data-i18n="common.actions">Actions</th>
          </tr></thead><tbody>`;

        tokens.forEach(tk => {
          const statusBadge = tk.is_active
            ? `<span class="px-2 py-0.5 rounded text-xs bg-accent-green/10 text-accent-green font-medium">${t('admin.token_active') || 'Active'}</span>`
            : `<span class="px-2 py-0.5 rounded text-xs bg-accent-red/10 text-accent-red font-medium">${t('admin.token_revoked') || 'Revoked'}</span>`;

          const expiresText = tk.expires_at ? new Date(tk.expires_at).toLocaleDateString() : (t('admin.token_never') || 'Never');
          const lastUsed = tk.last_used ? new Date(tk.last_used).toLocaleString() : (t('admin.token_never_used') || 'Never');

          html += `<tr class="table-row border-b border-border">
            <td class="py-2.5 pr-3 text-ink font-medium">${tk.name}</td>
            <td class="py-2.5 pr-3 font-mono text-xs text-accent-blue">${tk.token_prefix}...</td>
            <td class="py-2.5 pr-3">${tk.scopes.split(',').map(s => `<span class="px-1.5 py-0.5 rounded text-[10px] bg-accent-blue/10 text-accent-blue mr-1">${s.trim()}</span>`).join('')}</td>
            <td class="py-2.5 pr-3 text-ink-secondary text-xs">${new Date(tk.created_at).toLocaleDateString()}</td>
            <td class="py-2.5 pr-3 text-ink-secondary text-xs">${lastUsed}</td>
            <td class="py-2.5 pr-3 text-ink-secondary text-xs">${expiresText}</td>
            <td class="py-2.5 pr-3">${statusBadge}</td>
            <td class="py-2.5">${tk.is_active ? `<button onclick="revokeApiToken(${tk.id}, '${tk.name}')" class="px-3 py-1.5 bg-accent-red/10 hover:bg-accent-red/20 text-accent-red border border-accent-red/20 rounded text-xs font-medium transition-all">${t('admin.token_revoke') || 'Revoke'}</button>` : '--'}</td>
          </tr>`;
        });

        html += '</tbody></table></div>';
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<p class="text-accent-red text-sm">${t('admin.token_load_error') || 'Failed to load tokens:'} ${e.message}</p>`;
      }
    }

    async function generateApiToken() {
      const name = document.getElementById('token-name').value.trim();
      if (!name) {
        alert(t('admin.token_name_required') || 'Please enter a token name.');
        return;
      }

      const expiryVal = document.getElementById('token-expiry').value;
      const scopes = document.getElementById('token-scopes').value;
      const btn = document.getElementById('generate-token-btn');

      btn.disabled = true;
      btn.querySelector('span').textContent = '...';

      try {
        const body = { name, scopes };
        if (expiryVal) body.expires_in_days = parseInt(expiryVal);

        const resp = await fetch(`${API}/api-tokens`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || 'Failed to generate token');
        }

        const data = await resp.json();

        // Show the token (only time it's visible)
        const resultEl = document.getElementById('token-result');
        document.getElementById('token-value').value = data.token;
        document.getElementById('token-value-curl').textContent = data.token.slice(0, 20) + '...';
        resultEl.classList.remove('hidden');

        // Clear form
        document.getElementById('token-name').value = '';

        // Refresh the list
        await loadApiTokens();
      } catch (e) {
        alert((t('admin.token_error') || 'Error: ') + e.message);
      } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = t('admin.token_generate_btn') || 'Generate Token';
      }
    }

    function copyToken() {
      const input = document.getElementById('token-value');
      navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.getElementById('copy-token-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = `<span class="text-accent-green">${t('admin.token_copied') || 'Copied!'}</span>`;
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      });
    }

    async function revokeApiToken(id, name) {
      if (!confirm((t('admin.token_revoke_confirm') || 'Revoke token') + ` "${name}"?`)) return;

      try {
        const resp = await fetch(`${API}/api-tokens/${id}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error('Failed to revoke token');
        await loadApiTokens();
      } catch (e) {
        alert((t('admin.token_error') || 'Error: ') + e.message);
      }
    }

    // ===== CONSENT REGISTRY =====
    let consentData = {};

    async function loadConsentRegistry() {
      try {
        const [statusResp, textsResp, mapResp, productsResp, aiResp, implResp, sourcesResp, checksResp] = await Promise.all([
          fetch(`${API}/consent-registry/sync-status`),
          fetch(`${API}/consent-registry/texts`),
          fetch(`${API}/consent-registry/product-map`),
          fetch(`${API}/consent-registry/product-map/products`),
          fetch(`${API}/consent-registry/ai-rules`),
          fetch(`${API}/consent-registry/implementation-map`),
          fetch(`${API}/consent-registry/sources`),
          fetch(`${API}/consent-registry/source-checks`),
        ]);
        const status = await statusResp.json();
        consentData.texts = await textsResp.json();
        consentData.productMap = await mapResp.json();
        consentData.products = await productsResp.json();
        consentData.aiRules = await aiResp.json();
        consentData.implMap = await implResp.json();
        consentData.sources = await sourcesResp.json();
        consentData.sourceChecks = await checksResp.json();

        renderConsentSyncStatus(status);
        renderConsentHistory(status.history || []);
        renderConsentTexts(consentData.texts);
        populateConsentProductFilter(consentData.products);
        renderConsentProductMap();
        renderConsentAiRules(consentData.aiRules);
        renderConsentImplMap(consentData.implMap);
        renderConsentSourcesWithChecks(consentData.sources, consentData.sourceChecks);
      } catch (e) {
        console.error('Consent registry load error:', e);
      }
    }

    function renderConsentSyncStatus(status) {
      const cur = status.current;
      if (!cur) {
        document.getElementById('consent-version').textContent = '—';
        document.getElementById('consent-last-sync').textContent = 'Never synced';
        document.getElementById('consent-records').textContent = '0';
        document.getElementById('consent-next-sync').textContent = `~${status.next_sync_hours}h`;
        document.getElementById('consent-file').textContent = status.source_file || '—';
        document.getElementById('consent-hash').textContent = '—';
        document.getElementById('consent-synced-by').textContent = '—';
        return;
      }

      document.getElementById('consent-version').textContent = `v${cur.version}`;
      const syncDate = cur.synced_at ? new Date(cur.synced_at) : null;
      document.getElementById('consent-last-sync').textContent = syncDate ? syncDate.toLocaleString() : '—';

      const sheets = cur.sheets_synced || {};
      const total = Object.values(sheets).reduce((a, b) => a + b, 0);
      document.getElementById('consent-records').textContent = total;

      // Next sync estimate
      if (syncDate) {
        const next = new Date(syncDate.getTime() + status.next_sync_hours * 3600000);
        document.getElementById('consent-next-sync').textContent = next > new Date()
          ? `~${next.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`
          : 'Due now';
      } else {
        document.getElementById('consent-next-sync').textContent = `~${status.next_sync_hours}h`;
      }

      document.getElementById('consent-file').textContent = cur.source_file || status.source_file || '—';
      document.getElementById('consent-hash').textContent = cur.file_hash ? cur.file_hash.slice(0, 16) + '...' : '—';
      document.getElementById('consent-synced-by').textContent = cur.synced_by || 'system';

      // Color the card border based on status
      const card = document.getElementById('consent-sync-card');
      card.classList.remove('border-accent-green/30', 'border-accent-red/30');
      card.classList.add(cur.status === 'success' ? 'border-accent-green/30' : 'border-accent-red/30');
    }

    function renderConsentHistory(history) {
      const container = document.getElementById('consent-history-container');
      if (!history.length) {
        container.innerHTML = `<p class="text-ink-muted text-sm">${t('admin.consent_no_history') || 'No sync history yet.'}</p>`;
        return;
      }

      let html = `<div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-ink-secondary uppercase tracking-wider border-b border-border">
          <th class="pb-2 pr-3">${t('admin.consent_version') || 'Version'}</th>
          <th class="pb-2 pr-3">${t('admin.consent_last_sync') || 'Synced At'}</th>
          <th class="pb-2 pr-3">${t('admin.consent_records') || 'Records'}</th>
          <th class="pb-2 pr-3">SHA-256</th>
          <th class="pb-2 pr-3">${t('common.status') || 'Status'}</th>
          <th class="pb-2">${t('admin.consent_synced_by') || 'By'}</th>
        </tr></thead><tbody>`;

      history.forEach(h => {
        const sheets = h.sheets_synced || {};
        const total = typeof sheets === 'object' ? Object.values(sheets).reduce((a, b) => a + b, 0) : 0;
        const statusBadge = h.status === 'success'
          ? '<span class="px-2 py-0.5 rounded text-xs bg-accent-green/10 text-accent-green font-medium">OK</span>'
          : `<span class="px-2 py-0.5 rounded text-xs bg-accent-red/10 text-accent-red font-medium">${h.status}</span>`;

        html += `<tr class="table-row border-b border-border">
          <td class="py-2.5 pr-4 text-ink font-semibold">v${h.version}</td>
          <td class="py-2.5 pr-4 text-ink-secondary text-xs">${h.synced_at ? new Date(h.synced_at).toLocaleString() : '—'}</td>
          <td class="py-2.5 pr-4 text-ink">${total}</td>
          <td class="py-2.5 pr-4 font-mono text-xs text-ink-secondary">${h.file_hash ? h.file_hash.slice(0, 12) + '...' : '—'}</td>
          <td class="py-2.5 pr-4">${statusBadge}</td>
          <td class="py-2.5 text-ink-secondary text-xs">${h.synced_by || 'system'}</td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function renderConsentTexts(texts) {
      const container = document.getElementById('consent-texts-body');
      if (!texts || !texts.length) {
        container.innerHTML = `<p class="text-ink-muted text-sm">${t('admin.consent_no_data') || 'No consent texts loaded. Run a sync first.'}</p>`;
        return;
      }

      let html = '<div class="space-y-3">';
      texts.forEach(ct => {
        html += `
          <div class="p-4 rounded bg-surface-sunken border border-border">
            <div class="flex items-center gap-2 mb-2">
              <span class="px-2 py-0.5 rounded text-xs font-mono bg-accent-blue/10 text-accent-blue">${ct.code}</span>
              <span class="text-sm font-medium text-ink">${ct.checkbox_name}</span>
              ${ct.mandatory_to_tick && ct.mandatory_to_tick.toLowerCase().startsWith('da')
                ? '<span class="px-2 py-0.5 rounded text-[10px] bg-accent-red/10 text-accent-red">Mandatory</span>'
                : '<span class="px-2 py-0.5 rounded text-[10px] bg-border/50 text-ink-secondary">Optional</span>'}
            </div>
            <div class="p-3 rounded bg-surface-sunken border border-border mb-2">
              <p class="text-sm text-accent-blue italic">"${ct.ui_text}"</p>
            </div>
            ${ct.help_text ? `<p class="text-xs text-ink-secondary mb-1"><span class="text-ink-muted">Help text:</span> ${ct.help_text}</p>` : ''}
            ${ct.location ? `<p class="text-xs text-ink-secondary"><span class="text-ink-muted">Location:</span> ${ct.location}</p>` : ''}
            ${ct.when_applicable ? `<p class="text-xs text-ink-secondary"><span class="text-ink-muted">When:</span> ${ct.when_applicable}</p>` : ''}
          </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function populateConsentProductFilter(products) {
      const select = document.getElementById('consent-product-filter');
      select.innerHTML = `<option value="">${t('admin.consent_all_products') || 'All Products'}</option>`;
      (products || []).forEach(p => {
        select.innerHTML += `<option value="${p}">${p}</option>`;
      });
    }

    function renderConsentProductMap() {
      const filter = document.getElementById('consent-product-filter').value;
      const data = filter
        ? consentData.productMap.filter(r => r.product_name === filter)
        : consentData.productMap;
      const container = document.getElementById('consent-product-table');

      if (!data || !data.length) {
        container.innerHTML = `<p class="text-ink-muted text-sm">${t('admin.consent_no_data') || 'No data.'}</p>`;
        return;
      }

      let html = `<div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-ink-secondary uppercase tracking-wider border-b border-border">
          <th class="pb-3 pr-3">Product</th>
          <th class="pb-3 pr-3">Code</th>
          <th class="pb-3 pr-3">Required</th>
          <th class="pb-3 pr-3">Mandatory</th>
          <th class="pb-3 pr-3">Location</th>
          <th class="pb-3 pr-3">AI Consent</th>
          <th class="pb-2">Regulatory</th>
        </tr></thead><tbody>`;

      let lastProduct = '';
      data.forEach(r => {
        const showProduct = r.product_name !== lastProduct;
        lastProduct = r.product_name;
        const codeColor = r.checkbox_code.startsWith('MKT_') ? 'accent-yellow' :
          r.checkbox_code.includes('AI') || r.checkbox_code.includes('PROFILING') ? 'accent-blue' :
          r.checkbox_code.includes('CONFIRM') ? 'accent-green' : 'accent-blue';

        html += `<tr class="table-row border-b border-border${showProduct ? ' border-t border-border/40' : ''}">
          <td class="py-2.5 pr-3 text-ink text-xs font-medium">${showProduct ? r.product_name : ''}</td>
          <td class="py-2.5 pr-3"><span class="px-1.5 py-0.5 rounded text-[10px] font-mono bg-${codeColor}/10 text-${codeColor}">${r.checkbox_code}</span></td>
          <td class="py-2.5 pr-3 text-xs text-ink-secondary">${r.required_in_ui || '—'}</td>
          <td class="py-2.5 pr-3 text-xs">${r.mandatory_to_tick && r.mandatory_to_tick.toLowerCase().startsWith('da') ? '<span class="text-accent-red">Yes</span>' : '<span class="text-ink-muted">No</span>'}</td>
          <td class="py-2.5 pr-3 text-xs text-ink-secondary max-w-[200px] truncate" title="${(r.location || '').replace(/"/g, '&quot;')}">${r.location || '—'}</td>
          <td class="py-2.5 pr-3 text-xs text-accent-blue">${r.ai_consent_needed || '—'}</td>
          <td class="py-2.5 text-xs text-ink-secondary max-w-[180px] truncate" title="${(r.regulatory_note || '').replace(/"/g, '&quot;')}">${r.regulatory_note || '—'}</td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function renderConsentAiRules(rules) {
      const container = document.getElementById('consent-ai-body');
      if (!rules || !rules.length) {
        container.innerHTML = `<p class="text-ink-muted text-sm">${t('admin.consent_no_data') || 'No AI rules loaded.'}</p>`;
        return;
      }

      let html = '<div class="space-y-3">';
      rules.forEach(r => {
        const canRun = r.can_ai_run_without && r.can_ai_run_without.toLowerCase().startsWith('da');
        html += `
          <div class="p-4 rounded bg-surface-sunken border border-border">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-sm font-medium text-ink">${r.ai_use_case}</span>
              ${canRun
                ? '<span class="px-2 py-0.5 rounded text-[10px] bg-accent-yellow/10 text-accent-yellow">Can run without consent</span>'
                : '<span class="px-2 py-0.5 rounded text-[10px] bg-accent-red/10 text-accent-red">Consent required</span>'}
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
              <div><span class="text-ink-muted">Consent needed:</span> <span class="text-accent-blue font-mono">${r.consent_needed || '—'}</span></div>
              <div><span class="text-ink-muted">Location:</span> <span class="text-ink-secondary">${r.location || '—'}</span></div>
              <div><span class="text-ink-muted">Fallback:</span> <span class="text-accent-yellow">${r.fallback || '—'}</span></div>
              <div><span class="text-ink-muted">Products:</span> <span class="text-ink-secondary">${r.products || '—'}</span></div>
            </div>
            ${r.notes ? `<p class="text-xs text-ink-muted mt-2 italic">${r.notes}</p>` : ''}
          </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function renderConsentImplMap(map) {
      const container = document.getElementById('consent-impl-body');
      if (!map || !map.length) {
        container.innerHTML = `<p class="text-ink-muted text-sm">${t('admin.consent_no_data') || 'No implementation data.'}</p>`;
        return;
      }

      let html = '<div class="space-y-3">';
      map.forEach(m => {
        html += `
          <div class="p-4 rounded bg-surface-sunken border border-border">
            <div class="flex items-center gap-2 mb-2">
              <span class="px-2 py-0.5 rounded text-xs font-mono bg-accent-blue/10 text-accent-blue">${m.checkbox_code}</span>
              <span class="text-xs text-ink-muted">Owner: <span class="text-ink-secondary">${m.owner || '—'}</span></span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
              <div><span class="text-ink-muted">DB fields:</span> <span class="text-accent-green font-mono">${m.db_fields || '—'}</span></div>
              <div><span class="text-ink-muted">Capture point:</span> <span class="text-ink-secondary">${m.capture_point || '—'}</span></div>
              <div><span class="text-ink-muted">Withdrawal:</span> <span class="text-ink-secondary">${m.withdrawal_location || '—'}</span></div>
              <div><span class="text-ink-muted">Enforcement:</span> <span class="text-accent-yellow">${m.enforcement_rule || '—'}</span></div>
              <div class="md:col-span-2"><span class="text-ink-muted">Audit evidence:</span> <span class="text-ink-secondary">${m.audit_evidence || '—'}</span></div>
            </div>
          </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function renderConsentSourcesWithChecks(sources, checksData) {
      const container = document.getElementById('consent-sources-container');
      const checks = (checksData && checksData.checks) || [];
      const checkMap = {};
      checks.forEach(c => { checkMap[c.url] = c; });

      // Show/hide alert banner
      const changedCount = checks.filter(c => c.status === 'changed').length;
      const alertEl = document.getElementById('consent-change-alert');
      const badge = document.getElementById('source-check-badge');
      if (changedCount > 0) {
        alertEl.classList.remove('hidden');
        badge.classList.remove('hidden');
        badge.textContent = `${changedCount} changed`;
        document.getElementById('consent-alert-detail').textContent =
          `${changedCount} regulatory source page(s) changed since last review. Legal/DPO review recommended.`;
      } else {
        alertEl.classList.add('hidden');
        badge.classList.add('hidden');
      }

      // Source check interval info
      const interval = checksData?.check_interval_hours || 24;
      document.getElementById('source-check-info').textContent =
        `Pages checked every ${interval}h for content changes. Changes require Legal/DPO review before updating consent texts.`;

      if (!sources || !sources.length) {
        container.innerHTML = `<p class="text-ink-muted text-sm">${t('admin.consent_no_data') || 'No sources.'}</p>`;
        return;
      }

      let html = '<div class="space-y-3">';
      sources.forEach(s => {
        const chk = checkMap[s.url];
        const status = chk ? chk.status : 'pending';

        let statusIcon, statusColor, statusBorder, statusLabel;
        if (status === 'changed') {
          statusIcon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>';
          statusColor = 'accent-red'; statusBorder = 'border-accent-red/30'; statusLabel = 'CHANGED';
        } else if (status === 'error') {
          statusIcon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
          statusColor = 'accent-yellow'; statusBorder = 'border-accent-yellow/30'; statusLabel = 'ERROR';
        } else if (status === 'ok') {
          statusIcon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
          statusColor = 'accent-green'; statusBorder = 'border-accent-green/20'; statusLabel = 'OK';
        } else {
          statusIcon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
          statusColor = 'ink-muted'; statusBorder = 'border-border'; statusLabel = 'PENDING';
        }

        html += `
          <div class="p-4 rounded bg-surface-sunken border ${statusBorder}">
            <div class="flex items-start gap-4">
              <div class="w-10 h-10 rounded bg-${statusColor}/10 flex items-center justify-center flex-shrink-0 text-${statusColor}">
                ${statusIcon}
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                  <p class="text-sm font-medium text-ink">${s.instrument}</p>
                  <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-${statusColor}/10 text-${statusColor}">${statusLabel}</span>
                </div>
                <a href="${s.url}" target="_blank" rel="noopener" class="text-xs text-accent-blue hover:text-accent underline truncate block mb-1">${s.url}</a>
                ${s.notes ? `<p class="text-xs text-ink-muted">${s.notes}</p>` : ''}`;

        if (chk) {
          html += `<div class="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-[10px] text-ink-muted">`;
          if (chk.checked_at) html += `<span>Last checked: <span class="text-ink-secondary">${new Date(chk.checked_at).toLocaleString()}</span></span>`;
          if (chk.content_hash) html += `<span>Hash: <span class="font-mono text-ink-secondary">${chk.content_hash.slice(0, 12)}...</span></span>`;
          if (chk.http_status) html += `<span>HTTP: <span class="text-ink-secondary">${chk.http_status}</span></span>`;
          if (chk.content_length) html += `<span>Size: <span class="text-ink-secondary">${(chk.content_length / 1024).toFixed(0)} KB</span></span>`;
          if (chk.reviewed_at) html += `<span>Reviewed: <span class="text-accent-green">${new Date(chk.reviewed_at).toLocaleString()}</span> by ${chk.reviewed_by || 'admin'}</span>`;
          html += `</div>`;

          if (status === 'changed') {
            html += `
              <div class="mt-3 p-3 rounded bg-accent-red/5 border border-accent-red/20">
                <p class="text-xs text-accent-red mb-2">Content change detected${chk.last_changed_at ? ' at ' + new Date(chk.last_changed_at).toLocaleString() : ''}. Previous hash: <span class="font-mono">${chk.previous_hash ? chk.previous_hash.slice(0, 12) + '...' : '—'}</span></p>
                <button onclick="dismissSourceChange(${chk.id})" class="px-3 py-1.5 bg-accent-green/10 hover:bg-accent-green/20 text-accent-green border border-accent-green/20 rounded text-xs font-semibold transition-all">
                  ${t('admin.consent_mark_reviewed') || 'Mark as Reviewed'}
                </button>
              </div>`;
          }
          if (status === 'error' && chk.error_message) {
            html += `<p class="mt-2 text-xs text-accent-yellow">${chk.error_message}</p>`;
          }
        }

        html += `</div></div></div>`;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    function toggleConsentPanel(id) {
      const el = document.getElementById(id);
      el.classList.toggle('hidden');
    }

    function scrollToSourceChecks() {
      const el = document.getElementById('source-checks-section');
      // Expand the panel if hidden
      const body = document.getElementById('consent-sources-body');
      if (body.classList.contains('hidden')) body.classList.remove('hidden');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function triggerSourceCheck() {
      try {
        const resp = await fetch(`${API}/consent-registry/check-sources`, { method: 'POST' });
        if (!resp.ok) throw new Error('Check failed');
        const result = await resp.json();
        const msg = `Checked ${result.total} sources: ${result.changed} changed, ${result.errors} errors.`;
        alert(msg);
        await loadConsentRegistry();
      } catch (e) {
        alert((t('admin.consent_sync_error') || 'Error: ') + e.message);
      }
    }

    async function dismissSourceChange(checkId) {
      try {
        const resp = await fetch(`${API}/consent-registry/source-checks/${checkId}/review`, { method: 'POST' });
        if (!resp.ok) throw new Error('Review failed');
        await loadConsentRegistry();
      } catch (e) {
        alert((t('admin.consent_sync_error') || 'Error: ') + e.message);
      }
    }

    async function triggerConsentSync(force) {
      const label = force ? 'Force syncing...' : 'Syncing...';
      try {
        const resp = await fetch(`${API}/consent-registry/sync?force=${force}`, { method: 'POST' });
        if (!resp.ok) throw new Error('Sync failed');
        const result = await resp.json();
        if (result.status === 'no_change') {
          alert(t('admin.consent_sync_no_change') || 'No changes detected — file is identical to last sync.');
        } else if (result.status === 'synced') {
          alert((t('admin.consent_sync_success') || 'Sync complete!') + ` Version v${result.version}, ${result.records} records.`);
        } else {
          alert(result.message || result.reason || 'Sync completed.');
        }
        await loadConsentRegistry();
      } catch (e) {
        alert((t('admin.consent_sync_error') || 'Sync error: ') + e.message);
      }
    }

    // ===== PRODUCT CATALOG =====
    let editingProductId = null;

    async function loadProducts() {
      const container = document.getElementById('products-table-container');
      try {
        const resp = await fetch(`${API}/products-catalog`);
        if (!resp.ok) throw new Error('Failed to load products');
        const products = await resp.json();

        if (!products.length) {
          container.innerHTML = `<p class="text-ink-muted text-sm" data-i18n="admin.product_empty">${t('admin.product_empty') || 'No products in catalog yet.'}</p>`;
          return;
        }

        let html = `<div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-ink-secondary uppercase tracking-wider border-b border-border">
            <th class="pb-2 pr-3" data-i18n="admin.product_id">ID</th>
            <th class="pb-2 pr-3" data-i18n="admin.product_name">Name</th>
            <th class="pb-2 pr-3" data-i18n="admin.product_type">Type</th>
            <th class="pb-2 pr-3" data-i18n="admin.product_risk">Risk</th>
            <th class="pb-2 pr-3" data-i18n="admin.product_priority">Priority</th>
            <th class="pb-2 pr-3" data-i18n="admin.product_credit">Credit</th>
            <th class="pb-2 pr-3" data-i18n="common.status">Status</th>
            <th class="pb-2" data-i18n="common.actions">Actions</th>
          </tr></thead><tbody>`;

        products.forEach(p => {
          const riskColor = p.risk_level === 'high' ? 'accent-red' : p.risk_level === 'low' ? 'accent-green' : 'accent-yellow';
          const statusBadge = p.active
            ? `<span class="px-2 py-0.5 rounded text-xs bg-accent-green/10 text-accent-green font-medium">${t('admin.product_active') || 'Active'}</span>`
            : `<span class="px-2 py-0.5 rounded text-xs bg-border-strong/20 text-ink-secondary font-medium">${t('admin.product_inactive') || 'Inactive'}</span>`;

          html += `<tr class="table-row border-b border-border">
            <td class="py-2.5 pr-3 font-mono text-xs text-accent-blue">${p.product_id}</td>
            <td class="py-2.5 pr-3 text-ink font-medium">${p.name}</td>
            <td class="py-2.5 pr-3"><span class="px-2 py-0.5 rounded text-xs bg-accent-blue/10 text-accent-blue">${p.type}</span></td>
            <td class="py-2.5 pr-3"><span class="px-2 py-0.5 rounded text-xs bg-${riskColor}/10 text-${riskColor}">${p.risk_level}</span></td>
            <td class="py-2.5 pr-3 text-ink-secondary text-xs">${p.priority || '—'}</td>
            <td class="py-2.5 pr-3">${p.is_credit_product ? '<span class="text-accent-yellow">Yes</span>' : '<span class="text-ink-muted">No</span>'}</td>
            <td class="py-2.5 pr-3">${statusBadge}</td>
            <td class="py-2.5">
              <div class="flex items-center gap-2">
                <button onclick="editProduct('${p.product_id}')" class="px-3 py-1.5 bg-accent-blue/10 hover:bg-accent-blue/20 text-accent-blue border border-accent-blue/20 rounded text-xs font-medium transition-all">${t('admin.product_edit') || 'Edit'}</button>
                <button onclick="deleteProduct('${p.product_id}', '${p.name.replace(/'/g, "\\'")}')" class="px-3 py-1.5 bg-accent-red/10 hover:bg-accent-red/20 text-accent-red border border-accent-red/20 rounded text-xs font-medium transition-all">${t('admin.product_delete') || 'Delete'}</button>
              </div>
            </td>
          </tr>`;
        });

        html += '</tbody></table></div>';
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<p class="text-accent-red text-sm">${t('admin.product_load_error') || 'Failed to load products:'} ${e.message}</p>`;
      }
    }

    async function saveProduct() {
      const id = document.getElementById('prod-id').value.trim();
      const name = document.getElementById('prod-name').value.trim();
      const type = document.getElementById('prod-type').value;
      const risk = document.getElementById('prod-risk').value;
      const category = document.getElementById('prod-category').value.trim();
      const priority = document.getElementById('prod-priority').value;
      const desc = document.getElementById('prod-desc').value.trim();
      const credit = document.getElementById('prod-credit').checked;
      const active = document.getElementById('prod-active').checked;

      if (!id || !name) {
        alert(t('admin.product_id_name_required') || 'Product ID and Name are required.');
        return;
      }

      const btn = document.getElementById('save-product-btn');
      btn.disabled = true;

      const body = {
        product_id: id, name, type, risk_level: risk,
        short_description: desc || null, category: category || type,
        priority: priority || null, is_credit_product: credit, active
      };

      try {
        let resp;
        if (editingProductId) {
          // Update existing product
          const { product_id, ...updateBody } = body;
          resp = await fetch(`${API}/products-catalog/${editingProductId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updateBody),
          });
        } else {
          // Create new product
          resp = await fetch(`${API}/products-catalog`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
        }

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || 'Failed to save product');
        }

        resetProductForm();
        await loadProducts();
      } catch (e) {
        alert((t('admin.product_error') || 'Error: ') + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function editProduct(productId) {
      try {
        const resp = await fetch(`${API}/products-catalog/${productId}`);
        if (!resp.ok) throw new Error('Product not found');
        const p = await resp.json();

        editingProductId = p.product_id;
        document.getElementById('prod-id').value = p.product_id;
        document.getElementById('prod-id').disabled = true;
        document.getElementById('prod-name').value = p.name;
        document.getElementById('prod-type').value = p.type;
        document.getElementById('prod-risk').value = p.risk_level;
        document.getElementById('prod-category').value = p.category || '';
        document.getElementById('prod-priority').value = p.priority || '';
        document.getElementById('prod-desc').value = p.short_description || '';
        document.getElementById('prod-credit').checked = p.is_credit_product;
        document.getElementById('prod-active').checked = p.active;

        const titleEl = document.getElementById('product-form-title');
        titleEl.textContent = (t('admin.product_edit_title') || 'Edit Product') + ': ' + p.name;

        // Scroll to form
        titleEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (e) {
        alert((t('admin.product_error') || 'Error: ') + e.message);
      }
    }

    function resetProductForm() {
      editingProductId = null;
      document.getElementById('prod-id').value = '';
      document.getElementById('prod-id').disabled = false;
      document.getElementById('prod-name').value = '';
      document.getElementById('prod-type').value = 'investment';
      document.getElementById('prod-risk').value = 'moderate';
      document.getElementById('prod-category').value = '';
      document.getElementById('prod-priority').value = '';
      document.getElementById('prod-desc').value = '';
      document.getElementById('prod-credit').checked = false;
      document.getElementById('prod-active').checked = true;

      const titleEl = document.getElementById('product-form-title');
      titleEl.textContent = t('admin.product_add') || 'Add New Product';
    }

    async function deleteProduct(productId, productName) {
      if (!confirm((t('admin.product_delete_confirm') || 'Delete product') + ` "${productName}"?`)) return;

      try {
        const resp = await fetch(`${API}/products-catalog/${productId}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error('Failed to delete product');
        await loadProducts();
      } catch (e) {
        alert((t('admin.product_error') || 'Error: ') + e.message);
      }
    }

