              <button onclick="filterPnl('all')" id="pnl-filter-all" class="pnl-filter-btn px-2.5 py-1 rounded text-xs" style="background:var(--accent);color:#fff;">All</button>
              <button onclick="filterPnl('low_conv')" id="pnl-filter-low_conv" class="pnl-filter-btn px-2.5 py-1 rounded border text-xs" style="border-color:var(--border);color:var(--text-secondary);">Low Conversion</button>
              <button onclick="filterPnl('high_block')" id="pnl-filter-high_block" class="pnl-filter-btn px-2.5 py-1 rounded border text-xs" style="border-color:var(--border);color:var(--text-secondary);">High Block Rate</button>
              <button onclick="filterPnl('negative_net')" id="pnl-filter-negative_net" class="pnl-filter-btn px-2.5 py-1 rounded border text-xs" style="border-color:var(--border);color:var(--text-secondary);">Negative Score</button>
              <button onclick="filterPnl('high_complaints')" id="pnl-filter-high_complaints" class="pnl-filter-btn px-2.5 py-1 rounded border text-xs" style="border-color:var(--border);color:var(--text-secondary);">High Complaints</button>
