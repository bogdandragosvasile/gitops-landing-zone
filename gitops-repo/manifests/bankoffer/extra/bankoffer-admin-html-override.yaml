    // ===== AI ACT COMPLIANCE =====
    let aiActData = null;

    async function loadAiActCompliance() {
      try {
        const [statusResp, riskResp] = await Promise.all([
          fetch(`${API}/compliance/ai-act-status`),
          fetch(`${API}/compliance/risk-register`)
        ]);
        aiActData = await statusResp.json();
        const risks = await riskResp.json();
        renderAiActStatus(aiActData);
        renderKillSwitch(aiActData.kill_switch);
        renderComplianceChecklist(aiActData.compliance_checklist);
        renderProhibitedPractices(aiActData.prohibited_practices_check);
        renderRiskRegister(risks, aiActData.risk_register);
        renderConsentStats(aiActData.consent_statistics);
        renderOperationalMetrics(aiActData);
      } catch (e) {
        console.error('AI Act load error:', e);
      }
    }

    function deadlineStatusBadge(status) {
      if (status === 'COMPLIANT') return 'bg-accent-green/10 text-accent-green';
      if (status === 'IN_PROGRESS') return 'bg-accent-yellow/10 text-accent-yellow';
      return 'bg-accent-red/10 text-accent-red';
    }

    function renderAiActStatus(data) {
      document.getElementById('aiact-classification').textContent = data.classification + ' AI System';
      document.getElementById('aiact-legal-basis').textContent = data.legal_basis;
      document.getElementById('aiact-model-version').textContent = data.model_version;

      const dlMap = {
        'practices_banned': { el: 'practices', label: 'admin.aiact_deadline_practices' },
        'gpai_obligations': { el: 'gpai', label: 'admin.aiact_deadline_gpai' },
        'high_risk_conformity': { el: 'highrisk', label: 'admin.aiact_deadline_highrisk' }
      };
      for (const [key, cfg] of Object.entries(dlMap)) {
        const dl = data.deadlines[key];
        if (!dl) continue;
        document.getElementById(`aiact-dl-${cfg.el}-date`).textContent = dl.date;
        const statusEl = document.getElementById(`aiact-dl-${cfg.el}-status`);
        statusEl.textContent = dl.status.replace('_', ' ');
        statusEl.className = `inline-block mt-1 px-2 py-0.5 rounded text-xs font-medium ${deadlineStatusBadge(dl.status)}`;
      }
    }

    function renderKillSwitch(ks) {
      const badge = document.getElementById('aiact-ks-badge');
      const details = document.getElementById('aiact-ks-details');
      const activateBtn = document.getElementById('aiact-ks-activate');
      const deactivateBtn = document.getElementById('aiact-ks-deactivate');
      const card = document.getElementById('aiact-killswitch-card');

      if (ks.active) {
        badge.textContent = t('admin.aiact_ks_active') || 'ACTIVE -- ENGINE HALTED';
        badge.className = 'px-3 py-1 rounded text-sm font-semibold bg-accent-red/20 text-accent-red animate-pulse';
        card.classList.add('border', 'border-accent-red/40');
        card.classList.remove('border-accent-green/20');
        details.innerHTML = `
          <p><span class="text-ink-muted" data-i18n="admin.aiact_ks_by">Activated by:</span> <span class="text-ink">${ks.activated_by || '--'}</span></p>
          <p><span class="text-ink-muted" data-i18n="admin.aiact_ks_reason">Reason:</span> <span class="text-accent-red">${ks.reason || '--'}</span></p>
        `;
        activateBtn.classList.add('hidden');
        deactivateBtn.classList.remove('hidden');
      } else {
        badge.textContent = t('admin.aiact_ks_inactive') || 'INACTIVE -- Engine Running';
        badge.className = 'px-3 py-1 rounded text-sm font-semibold bg-accent-green/20 text-accent-green';
        card.classList.remove('border-accent-red/40');
        card.classList.add('border', 'border-transparent');
        details.innerHTML = `<p class="text-accent-green" data-i18n="admin.aiact_ks_normal">AI recommendation engine operating normally.</p>`;
        activateBtn.classList.remove('hidden');
        deactivateBtn.classList.add('hidden');
      }
    }

    async function toggleKillSwitch(activate) {
      let reason = '';
      const user = window.BOAI_AUTH.getUser();
      const activatedBy = user?.email || user?.name || 'admin';

      if (activate) {
        reason = prompt(t('admin.aiact_ks_reason_prompt') || 'Enter reason for activating the kill-switch:');
        if (!reason) return;
      } else {
        if (!confirm(t('admin.aiact_ks_deactivate_confirm') || 'Are you sure you want to re-enable the AI recommendation engine?')) return;
      }

      try {
        const resp = await fetch(`${API}/compliance/kill-switch`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ active: activate, reason: reason, activated_by: activatedBy })
        });
        if (!resp.ok) throw new Error('Failed to toggle kill-switch');
        const ks = await resp.json();
        renderKillSwitch(ks.kill_switch || ks);
      } catch (e) {
        alert((t('admin.aiact_ks_error') || 'Error toggling kill-switch: ') + e.message);
      }
    }

