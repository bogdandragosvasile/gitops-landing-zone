    function switchAuditTab(tab) {
      const tabs = ['recommendations', 'actions'];
      tabs.forEach(t => {
        const btn = document.getElementById(`audit-tab-${t}`);
        const pane = document.getElementById(`audit-pane-${t}`);
        const active = t === tab;
        btn.style.borderColor = active ? 'var(--accent)' : 'transparent';
        btn.style.color = active ? 'var(--accent)' : 'var(--text-secondary)';
        pane.classList.toggle('hidden', !active);
      });
      if (tab === 'actions') loadActionLog();
    }

    let _actionLogDebounce = null;
