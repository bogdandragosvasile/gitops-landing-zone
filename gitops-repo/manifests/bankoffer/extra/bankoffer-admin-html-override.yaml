        ? `<div class="mt-3"><p class="text-xs font-semibold uppercase tracking-wider mb-1" style="color:var(--text-muted);">Changes</p>
           <pre class="text-xs p-3 overflow-x-auto" style="background:var(--bg-sunken);border:1px solid var(--border);color:var(--text-secondary);white-space:pre-wrap;">${JSON.stringify(entry.changes, null, 2)}</pre></div>`
        : '';
