              <span class="inline-flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#2D7D46;opacity:.8;vertical-align:middle;"></span>Scale (&gt;40)</span>
              &nbsp;
              <span class="inline-flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#D4A843;opacity:.8;vertical-align:middle;"></span>Optimise (10&ndash;40)</span>
              &nbsp;
              <span class="inline-flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#C1403D;opacity:.8;vertical-align:middle;"></span>Restrict (&lt;10)</span>
