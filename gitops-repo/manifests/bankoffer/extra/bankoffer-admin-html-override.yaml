apiVersion: v1
kind: ConfigMap
metadata:
  name: bankoffer-admin-html-override
  namespace: bankoffer
data:
  admin.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankOffer - Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Satoshi', 'system-ui', 'sans-serif'] },
          colors: {
            surface: { DEFAULT:'#FAFAF8', raised:'#FFFFFF', sunken:'#F2F0EB' },
            ink: { DEFAULT:'#1A1A1A', secondary:'#6B6B6B', muted:'#999999', inverse:'#FFFFFF' },
            border: { DEFAULT:'#E8E6E1', strong:'#D1CFC9', focus:'#2D5F9A' },
            accent: { blue:'#2D5F9A', red:'#C1403D', yellow:'#D4A843', green:'#2D7D46' },
          }
        }
      }
    }
    </script>
    <style>
      :root {
        --bg: #FAFAF8;
        --bg-raised: #FFFFFF;
        --bg-sunken: #F2F0EB;
        --border: #E8E6E1;
        --border-strong: #D1CFC9;
        --text-primary: #1A1A1A;
        --text-secondary: #6B6B6B;
        --text-muted: #999999;
        --accent: #2D5F9A;
        --accent-red: #C1403D;
        --accent-yellow: #D4A843;
        --accent-green: #2D7D46;
        --focus-ring: rgba(45,95,154,0.4);
      }
      [data-theme="dark"] {
        --bg: #1A1A1A;
        --bg-raised: #242424;
        --bg-sunken: #141414;
        --border: #333333;
        --border-strong: #444444;
        --text-primary: #E8E6E1;
        --text-secondary: #999999;
        --text-muted: #6B6B6B;
        --accent: #5B8EC9;
        --accent-red: #D4645F;
        --accent-yellow: #E0BD6A;
        --accent-green: #4A9D64;
        --focus-ring: rgba(91,142,201,0.4);
      }
      * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
      body { background: var(--bg); color: var(--text-primary); }
      /* Fallback for JS-generated classes */
      .glass-card { background: var(--bg-raised); border: 1px solid var(--border); }
      .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
      @keyframes fadeIn { to { opacity: 1; } }
      .pulse-dot { animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      .admin-nav { transition: all 0.2s; }
      .admin-nav:hover { background: var(--bg-sunken); }
      .admin-nav.active { background: var(--bg-sunken); color: var(--accent); border-left: 2px solid var(--accent); }
      .table-row { transition: background 0.15s; }
      .table-row:hover { background: var(--bg-sunken); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
      .conn-filter:hover, .intel-filter:hover, .sug-filter:hover { background: var(--bg-sunken); }
      .conn-filter.active, .intel-filter.active, .sug-filter.active { background: rgba(45,95,154,0.1); border-color: var(--accent); color: var(--accent); }
      a:focus-visible, button:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
      @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
    </head>
    <body class="font-sans min-h-screen" style="background: var(--bg); color: var(--text-primary);">

    <!-- Auth + Theme + i18n scripts -->
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/keycloak-js@26.2.0/dist/keycloak.min.js"></script>
    <script src="/static/js/auth.js"></script>

    <!-- Auth gate — Admin login screen -->
    <div id="auth-gate" class="fixed inset-0 z-[100] flex items-center justify-center p-4 overflow-y-auto" style="background: var(--bg);">
      <div class="max-w-md w-full">
        <!-- Language/Theme selectors: top-right fixed -->
        <div class="fixed top-4 right-4 z-[101] flex items-center gap-3">
          <div id="auth-lang-selector-adm"></div>
          <div id="auth-theme-toggle-adm"></div>
        </div>
        <div class="text-center mb-8 fade-in">
          <div class="text-xs font-medium uppercase tracking-widest mb-6" style="color: var(--text-muted); letter-spacing: 0.2em;">BankOffer</div>
          <h1 class="text-2xl font-semibold mb-1" style="color: var(--text-primary); letter-spacing: -0.02em;">Administration</h1>
        </div>
        <div class="p-6 fade-in" style="animation-delay:0.1s; background: var(--bg-raised); border: 1px solid var(--border);">
          <h2 class="text-xl font-medium mb-1" style="color: var(--text-primary);" data-i18n="sauth.login_title_admin">Admin Portal</h2>
          <p class="text-sm mb-5" style="color: var(--text-secondary);" data-i18n="sauth.login_subtitle_admin">Sign in with your administrator credentials</p>
          <div id="admin-login-error" class="hidden mb-4 p-3 rounded text-sm" style="background: rgba(193,64,61,0.1); border: 1px solid rgba(193,64,61,0.3); color: var(--accent-red);"></div>
          <!-- SSO Button -->
          <button onclick="ssoAdminLogin()" id="sso-admin-btn"
            class="w-full py-2.5 rounded font-medium text-sm transition-colors flex items-center justify-center gap-2 mb-4 bg-accent-blue text-ink-inverse">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <span data-i18n="sauth.sso_login">Sign in with SSO (Keycloak)</span>
          </button>
          <!-- Divider -->
          <div class="flex items-center gap-3 mb-4">
            <div class="flex-1 h-px" style="background: var(--border);"></div>
            <span class="text-xs uppercase" style="color: var(--text-muted);">or</span>
            <div class="flex-1 h-px" style="background: var(--border);"></div>
          </div>
          <!-- Email/Password form -->
          <div class="space-y-4">
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="sauth.email">Email address</label>
              <input type="email" id="admin-login-email" autocomplete="email"
                class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);"
                placeholder="admin@bankofferai.com">
            </div>
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="sauth.password">Password</label>
              <input type="password" id="admin-login-password" autocomplete="current-password"
                class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);"
                placeholder="********">
            </div>
            <button onclick="handleAdminLogin()" id="admin-login-btn"
              class="w-full py-2.5 rounded font-medium text-sm transition-colors" style="border: 1px solid var(--border); color: var(--text-primary);">
              <span data-i18n="sauth.login_btn">Sign In</span>
            </button>
          </div>
          <div class="mt-5 pt-5" style="border-top: 1px solid var(--border);">
            <details>
              <summary class="text-xs font-medium cursor-pointer select-none" style="color: var(--text-muted);" data-i18n="sauth.demo_hint">Demo credentials</summary>
              <button onclick="fillAdminDemo('admin@bankofferai.com','Admin1234!')" class="w-full text-left px-3 py-2 rounded transition-colors group mt-2" style="background: var(--bg-sunken);">
                <span class="text-xs" style="color: var(--text-primary);">admin@bankofferai.com</span>
                <span class="text-xs ml-2" style="color: var(--text-muted);">/ Admin1234!</span>
              </button>
            </details>
          </div>
        </div>
        <!-- Quiet portal links below card -->
        <div class="text-center mt-6">
          <span class="text-xs" style="color: var(--text-muted);">
            <a href="/" class="hover:underline" style="color: var(--text-secondary);">Employee Portal</a>
            <span style="margin: 0 8px; color: var(--border-strong);">&middot;</span>
            <a href="http://bankoffer.local/portal" class="hover:underline" style="color: var(--text-secondary);">Customer Portal</a>
          </span>
        </div>
      </div>
    </div>

    <!-- Main admin layout (hidden until authenticated) -->
    <div id="admin-app" class="min-h-screen flex hidden">
      <!-- Mobile menu button -->
      <button onclick="document.getElementById('admin-sidebar').classList.toggle('hidden');document.getElementById('admin-sidebar').classList.toggle('flex')" class="fixed top-4 left-4 z-[60] md:hidden w-10 h-10 rounded flex items-center justify-center" style="background: var(--bg-raised); border: 1px solid var(--border); color: var(--text-secondary);">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <!-- Sidebar -->
      <aside id="admin-sidebar" class="w-64 flex-col fixed h-full z-50 hidden md:flex" style="background: var(--bg-raised); border-right: 1px solid var(--border);">
        <div class="flex items-center gap-3 p-5" style="border-bottom: 1px solid var(--border);">
          <div class="w-10 h-10 rounded flex items-center justify-center" style="background: rgba(45,95,154,0.1);">
            <svg class="w-6 h-6" style="color: var(--accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          </div>
          <div>
            <div class="text-lg font-bold" style="color: var(--text-primary);" data-i18n="admin.title_short">Admin</div>
            <div class="text-[10px] uppercase tracking-wider" style="color: var(--text-muted);" data-i18n="nav.admin">Administration</div>
          </div>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1">
          <button onclick="showSection('overview')" data-section="overview" class="admin-nav active w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zm0 7a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1h-4a1 1 0 01-1-1v-5zM4 13a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1v-2z"/></svg>
            <span data-i18n="admin.overview">System Overview</span>
          </button>
          <button onclick="showSection('users')" data-section="users" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span data-i18n="admin.users">User Management</span>
          </button>
          <button onclick="showSection('security')" data-section="security" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <span data-i18n="admin.security">Security & MFA</span>
          </button>
          <button onclick="showSection('aiact')" data-section="aiact" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 1v2m0 18v2m-9-11H1m22 0h-2"/></svg>
            <span data-i18n="admin.aiact">AI Act Compliance</span>
          </button>
          <button onclick="showSection('tokens')" data-section="tokens" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            <span data-i18n="admin.api_tokens">API Tokens</span>
          </button>
          <button onclick="showSection('products')" data-section="products" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            <span data-i18n="admin.products">Product Catalog</span>
          </button>
          <button onclick="showSection('consent')" data-section="consent" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span data-i18n="admin.consent_registry">Consent Registry</span>
          </button>
          <button onclick="showSection('connectors')" data-section="connectors" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
            <span>Connectors</span>
          </button>
          <button onclick="showSection('intelligence')" data-section="intelligence" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            <span>Intelligence</span>
          </button>
          <button onclick="showSection('config')" data-section="config" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span data-i18n="admin.config">System Config</span>
          </button>
          <button onclick="showSection('audit')" data-section="audit" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <span data-i18n="admin.audit_log">Audit Log</span>
          </button>
          <button onclick="showSection('pnl')" data-section="pnl" class="admin-nav w-full text-left flex items-center gap-3 px-3 py-2.5 rounded text-sm" style="color: var(--text-secondary);">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span>Product P&amp;L</span>
          </button>
        </nav>
        <div class="p-3 space-y-2" style="border-top: 1px solid var(--border);">
          <a href="/" class="flex items-center gap-2 px-3 py-2 rounded text-xs transition" style="color: var(--text-secondary);">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg>
            <span data-i18n="nav.employee_portal">Employee Portal</span>
          </a>
          <a href="http://bankoffer.local/portal" class="flex items-center gap-2 px-3 py-2 rounded text-xs transition" style="color: var(--text-secondary);">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span data-i18n="nav.customer_portal">Customer Portal</span>
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="ml-0 md:ml-64 flex-1 min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 px-4 md:px-8 py-3 md:py-4 flex items-center justify-between" style="background: var(--bg-raised); border-bottom: 1px solid var(--border);">
          <div>
            <h1 class="text-xl font-medium" style="color: var(--text-primary);" id="sectionTitle" data-i18n="admin.overview">System Overview</h1>
            <p class="text-xs mt-0.5" style="color: var(--text-muted);" data-i18n="admin.subtitle">Administration panel</p>
          </div>
          <div class="flex items-center gap-2 md:gap-3">
            <div id="lang-selector"></div>
            <div id="theme-toggle"></div>
            <div id="user-badge"></div>
          </div>
        </header>

        <!-- ===== OVERVIEW SECTION ===== -->
        <section id="section-overview" class="p-4 md:p-8 space-y-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5">
            <div class="p-5 fade-in" style="background: var(--bg-raised); border: 1px solid var(--border);">
              <div class="mb-3">
                <span class="text-xs font-medium uppercase tracking-wider" style="color: var(--text-muted);" data-i18n="admin.total_users">Total Users</span>
              </div>
              <p class="text-3xl font-bold" style="color: var(--text-primary);" id="stat-users">53</p>
              <p class="text-xs mt-1" style="color: var(--text-secondary);" data-i18n="admin.users_breakdown">3 staff + 50 customers</p>
            </div>
            <div class="p-5 fade-in" style="animation-delay:0.1s; background: var(--bg-raised); border: 1px solid var(--border);">
              <div class="mb-3">
