            <div class="grid grid-cols-3 gap-4" id="aiact-deadlines">
              <div class="p-4 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
                <p class="text-xs mb-1" style="color: var(--text-muted);" data-i18n="admin.aiact_deadline_practices">Prohibited Practices Ban</p>
                <p class="text-lg font-medium" style="color: var(--text-primary);" id="aiact-dl-practices-date">--</p>
                <span class="inline-block mt-1 px-2 py-0.5 rounded text-xs" id="aiact-dl-practices-status">--</span>
              </div>
              <div class="p-4 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
                <p class="text-xs mb-1" style="color: var(--text-muted);" data-i18n="admin.aiact_deadline_gpai">GPAI Obligations</p>
                <p class="text-lg font-medium" style="color: var(--text-primary);" id="aiact-dl-gpai-date">--</p>
                <span class="inline-block mt-1 px-2 py-0.5 rounded text-xs" id="aiact-dl-gpai-status">--</span>
              </div>
              <div class="p-4 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
                <p class="text-xs mb-1" style="color: var(--text-muted);" data-i18n="admin.aiact_deadline_highrisk">High-Risk Conformity</p>
                <p class="text-lg font-medium" style="color: var(--text-primary);" id="aiact-dl-highrisk-date">--</p>
                <span class="inline-block mt-1 px-2 py-0.5 rounded text-xs" id="aiact-dl-highrisk-status">--</span>
              </div>
            </div>
          </div>

          <!-- Kill-Switch Control Panel -->
          <div class="p-6 fade-in" id="aiact-killswitch-card" style="animation-delay:0.1s; background: var(--bg-raised); border: 1px solid var(--border);">
            <div class="flex items-center gap-3 mb-4">
              <div>
                <h3 class="text-sm font-semibold" style="color: var(--text-primary);" data-i18n="admin.aiact_killswitch">Kill-Switch Control</h3>
                <p class="text-xs" style="color: var(--text-muted);" data-i18n="admin.aiact_killswitch_desc">Emergency shutdown of AI recommendation engine (Art. 14 Human Oversight)</p>
              </div>
            </div>
            <div class="flex items-center gap-6 p-4 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-2">
                  <span class="text-sm" style="color: var(--text-muted);" data-i18n="admin.aiact_ks_status">Status:</span>
                  <span class="px-3 py-1 rounded text-sm font-medium" id="aiact-ks-badge">--</span>
                </div>
                <div id="aiact-ks-details" class="text-xs space-y-1" style="color: var(--text-muted);"></div>
              </div>
              <div class="flex flex-col gap-2">
                <button id="aiact-ks-activate" onclick="toggleKillSwitch(true)"
                  class="px-5 py-2.5 rounded text-sm font-medium transition-all hidden" style="background: rgba(193,64,61,0.1); color: var(--accent-red); border: 1px solid rgba(193,64,61,0.3);"
                  data-i18n="admin.aiact_ks_activate">
                  Activate Kill-Switch
                </button>
                <button id="aiact-ks-deactivate" onclick="toggleKillSwitch(false)"
                  class="px-5 py-2.5 rounded text-sm font-medium transition-all hidden" style="background: rgba(45,125,70,0.1); color: var(--accent-green); border: 1px solid rgba(45,125,70,0.3);"
                  data-i18n="admin.aiact_ks_deactivate">
                  Deactivate Kill-Switch
                </button>
              </div>
            </div>
          </div>

          <!-- Compliance Checklist (Art. 9-15) -->
          <div class="p-6 fade-in" style="animation-delay:0.2s; background: var(--bg-raised); border: 1px solid var(--border);">
            <h3 class="text-sm font-semibold mb-4" style="color: var(--text-primary);" data-i18n="admin.aiact_checklist">Compliance Checklist (Art. 9-15)</h3>
            <div class="grid grid-cols-3 gap-4" id="aiact-checklist-grid">
              <div class="text-sm" style="color: var(--text-muted);" data-i18n="common.loading">Loading...</div>
            </div>
          </div>

          <!-- Prohibited Practices (Art. 5) -->
          <div class="p-6 fade-in" style="animation-delay:0.3s; background: var(--bg-raised); border: 1px solid var(--border);">
            <h3 class="text-sm font-semibold mb-4" style="color: var(--text-primary);" data-i18n="admin.aiact_prohibited">Prohibited Practices Check (Art. 5)</h3>
            <div class="space-y-3" id="aiact-prohibited-grid">
              <div class="text-sm" style="color: var(--text-muted);" data-i18n="common.loading">Loading...</div>
            </div>
          </div>

          <!-- Risk Register (Art. 9) -->
          <div class="p-6 fade-in" style="animation-delay:0.4s; background: var(--bg-raised); border: 1px solid var(--border);">
            <h3 class="text-sm font-semibold mb-4" style="color: var(--text-primary);" data-i18n="admin.aiact_risk_register">Risk Register (Art. 9)</h3>
            <div id="aiact-risk-summary" class="grid grid-cols-4 gap-4 mb-4"></div>
            <div class="overflow-x-auto" id="aiact-risk-table-container">
              <p class="text-sm" style="color: var(--text-muted);" data-i18n="common.loading">Loading...</p>
            </div>
          </div>

          <!-- Consent Statistics -->
          <div class="p-6 fade-in" style="animation-delay:0.5s; background: var(--bg-raised); border: 1px solid var(--border);">
            <h3 class="text-sm font-semibold mb-4" style="color: var(--text-primary);" data-i18n="admin.aiact_consent">Consent Statistics</h3>
            <div class="grid grid-cols-3 gap-4" id="aiact-consent-grid">
              <div class="text-sm" style="color: var(--text-muted);" data-i18n="common.loading">Loading...</div>
            </div>
          </div>

          <!-- Operational Metrics -->
          <div class="p-6 fade-in" style="animation-delay:0.6s; background: var(--bg-raised); border: 1px solid var(--border);">
            <h3 class="text-sm font-semibold mb-4" style="color: var(--text-primary);" data-i18n="admin.aiact_operational">Operational Metrics</h3>
            <div class="grid grid-cols-3 gap-4" id="aiact-metrics-grid">
              <div class="text-sm" style="color: var(--text-muted);" data-i18n="common.loading">Loading...</div>
            </div>
          </div>

        </section>

        <!-- ===== API TOKENS SECTION ===== -->
        <section id="section-tokens" class="p-4 md:p-8 space-y-6 hidden">
          <!-- Generate Token -->
          <div class="p-6 fade-in" style="background: var(--bg-raised); border: 1px solid var(--border);">
            <div class="mb-5">
              <h3 class="text-sm font-semibold" style="color: var(--text-primary);" data-i18n="admin.token_generate">Generate New Token</h3>
              <p class="text-xs mt-0.5" style="color: var(--text-muted);" data-i18n="admin.token_generate_desc">Create a Bearer token for programmatic API access</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.token_name">Token Name</label>
                <input type="text" id="token-name"
                  class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);"
                  placeholder="e.g. CI/CD Pipeline">
              </div>
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.token_expiry">Expires In</label>
                <select id="token-expiry"
                  class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);">
                  <option value="" data-i18n="admin.token_never">Never</option>
                  <option value="30">30 days</option>
                  <option value="90">90 days</option>
                  <option value="180">180 days</option>
                  <option value="365">365 days</option>
                </select>
              </div>
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.token_scopes">Scopes</label>
                <select id="token-scopes"
                  class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);">
                  <option value="read">read</option>
                  <option value="read,write">read, write</option>
                  <option value="read,write,admin">read, write, admin</option>
                </select>
              </div>
            </div>
            <button onclick="generateApiToken()" id="generate-token-btn"
              class="px-5 py-2.5 rounded text-sm font-medium transition-all flex items-center gap-2" style="background: var(--accent); color: #fff;">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
              <span data-i18n="admin.token_generate_btn">Generate Token</span>
            </button>
          </div>

          <!-- Generated Token Display (hidden until generated) -->
          <div id="token-result" class="hidden p-6 fade-in" style="background: var(--bg-raised); border: 1px solid rgba(45,125,70,0.3);">
            <div class="mb-4">
              <h3 class="text-sm font-semibold" style="color: var(--accent-green);" data-i18n="admin.token_created">Token Created</h3>
              <p class="text-xs mt-0.5" style="color: var(--text-muted);" data-i18n="admin.token_copy_warning">Copy it now — it will not be shown again!</p>
            </div>
            <div class="relative">
              <input type="text" id="token-value" readonly
                class="w-full px-4 py-3 pr-24 rounded font-mono text-sm" style="background: var(--bg-sunken); border: 1px solid rgba(45,125,70,0.2); color: var(--accent-green);">
              <button onclick="copyToken()" id="copy-token-btn"
                class="absolute right-2 top-1/2 -translate-y-1/2 px-3 py-1.5 rounded text-xs font-medium transition-all" style="background: rgba(45,125,70,0.1); color: var(--accent-green);">
                <span data-i18n="admin.token_copy">Copy</span>
              </button>
            </div>
            <div class="mt-3 p-3 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
              <p class="text-xs mb-1" style="color: var(--text-muted);" data-i18n="admin.token_usage">Usage:</p>
              <code class="text-xs font-mono" style="color: var(--accent);">curl -H "Authorization: Bearer <span id="token-value-curl"></span>" http://bankoffer.local/offers/1</code>
            </div>
          </div>

          <!-- Token List -->
          <div class="p-6" style="background: var(--bg-raised); border: 1px solid var(--border);">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-sm font-semibold" style="color: var(--text-primary);" data-i18n="admin.token_list">Active Tokens</h3>
              <button onclick="loadApiTokens()" class="text-xs transition flex items-center gap-1" style="color: var(--accent);">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                <span data-i18n="common.refresh">Refresh</span>
              </button>
            </div>
            <div id="tokens-table-container">
              <p class="text-sm" style="color: var(--text-muted);" data-i18n="common.loading">Loading...</p>
            </div>
          </div>
        </section>

        <!-- ===== PRODUCTS SECTION ===== -->
        <section id="section-products" class="p-4 md:p-8 space-y-6 hidden">
          <!-- Add / Edit Product Form -->
          <div class="p-6 fade-in" style="background: var(--bg-raised); border: 1px solid var(--border);">
            <div class="mb-5">
              <h3 class="text-sm font-semibold" style="color: var(--text-primary);" id="product-form-title" data-i18n="admin.product_add">Add New Product</h3>
              <p class="text-xs mt-0.5" style="color: var(--text-muted);" data-i18n="admin.product_add_desc">Add or edit products in the recommendation catalog</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-4">
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.product_id">Product ID</label>
                <input type="text" id="prod-id" class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);" placeholder="e.g. prod_savings_plus">
              </div>
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.product_name">Product Name</label>
                <input type="text" id="prod-name" class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);" placeholder="e.g. Savings Plus">
              </div>
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.product_type">Type</label>
                <select id="prod-type" class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);">
                  <option value="investment">Investment</option>
                  <option value="savings">Savings</option>
                  <option value="bond">Bond</option>
                  <option value="retirement">Retirement</option>
                  <option value="personal_loan">Personal Loan</option>
                  <option value="mortgage">Mortgage</option>
                  <option value="credit_card">Credit Card</option>
                  <option value="insurance">Insurance</option>
                </select>
              </div>
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.product_risk">Risk Level</label>
                <select id="prod-risk" class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);">
                  <option value="low">Low</option>
                  <option value="moderate" selected>Moderate</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.product_category">Category</label>
                <input type="text" id="prod-category" class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);" placeholder="e.g. savings">
              </div>
              <div>
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.product_priority">Priority</label>
                <select id="prod-priority" class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);">
                  <option value="">—</option>
                  <option value="high">High</option>
                  <option value="medium">Medium</option>
                  <option value="low">Low</option>
                </select>
              </div>
              <div class="md:col-span-2 lg:col-span-3">
                <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="admin.product_description">Short Description</label>
                <input type="text" id="prod-desc" class="w-full px-4 py-2.5 rounded text-sm focus:outline-none transition-colors" style="background: var(--bg-sunken); border: 1px solid var(--border); color: var(--text-primary);" placeholder="Brief description of the product">
              </div>
              <div class="flex items-center gap-6">
                <label class="flex items-center gap-2 text-sm cursor-pointer" style="color: var(--text-secondary);">
                  <input type="checkbox" id="prod-credit" class="w-4 h-4 rounded" style="accent-color: var(--accent);">
                  <span data-i18n="admin.product_credit">Credit Product</span>
                </label>
                <label class="flex items-center gap-2 text-sm cursor-pointer" style="color: var(--text-secondary);">
                  <input type="checkbox" id="prod-active" checked class="w-4 h-4 rounded" style="accent-color: var(--accent);">
                  <span data-i18n="admin.product_active">Active</span>
                </label>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <button onclick="saveProduct()" id="save-product-btn"
                class="px-5 py-2.5 rounded text-sm font-medium transition-all flex items-center gap-2" style="background: var(--accent); color: #fff;">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                <span data-i18n="admin.product_save">Save Product</span>
              </button>
              <button onclick="resetProductForm()" class="px-5 py-2.5 rounded text-sm font-medium transition-all" style="border: 1px solid var(--border); color: var(--text-secondary);">
                <span data-i18n="common.cancel">Cancel</span>
              </button>
            </div>
          </div>

          <!-- Product List -->
          <div class="p-6" style="background: var(--bg-raised); border: 1px solid var(--border);">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-sm font-semibold" style="color: var(--text-primary);" data-i18n="admin.product_list">Product Catalog</h3>
              <button onclick="loadProducts()" class="text-xs transition flex items-center gap-1" style="color: var(--accent);">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                <span data-i18n="common.refresh">Refresh</span>
              </button>
            </div>
            <div id="products-table-container">
              <p class="text-sm" style="color: var(--text-muted);" data-i18n="common.loading">Loading...</p>
            </div>
          </div>
        </section>

        <!-- ===== CONSENT REGISTRY SECTION ===== -->
        <section id="section-consent" class="p-4 md:p-8 space-y-6 hidden">

          <!-- Regulatory Change Alert Banner (hidden by default) -->
          <div id="consent-change-alert" class="hidden p-5 fade-in" style="background: rgba(193,64,61,0.05); border: 1px solid rgba(193,64,61,0.3);">
            <div class="flex flex-col md:flex-row md:items-center gap-4">
              <div class="flex items-center gap-3 flex-1">
                <div>
                  <h3 class="text-sm font-medium" style="color: var(--accent-red);" data-i18n="admin.consent_source_alert">Regulatory Source Change Detected</h3>
                  <p class="text-xs" style="color: var(--text-muted);" id="consent-alert-detail">One or more regulatory source pages have changed since last review. Legal/DPO review recommended.</p>
                </div>
              </div>
              <button onclick="scrollToSourceChecks()" class="px-4 py-2 rounded text-xs font-medium transition-all whitespace-nowrap" style="background: rgba(193,64,61,0.1); color: var(--accent-red); border: 1px solid rgba(193,64,61,0.3);">
                <span data-i18n="admin.consent_review_changes">Review Changes</span>
              </button>
            </div>
          </div>

          <!-- Sync Status -->
          <div id="consent-sync-card" class="p-6 fade-in" style="background: var(--bg-raised); border: 1px solid var(--border);">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-5">
              <div>
                <h3 class="text-sm font-semibold" style="color: var(--text-primary);" data-i18n="admin.consent_sync_status">Sync Status</h3>
                <p class="text-xs mt-0.5" style="color: var(--text-muted);" data-i18n="admin.consent_sync_desc">Regulatory consent data synchronized from audit workbook</p>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="triggerConsentSync(false)" class="px-4 py-2 rounded text-xs font-medium transition-all flex items-center gap-2" style="background: var(--accent); color: #fff;">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                  <span data-i18n="admin.consent_sync_now">Sync Now</span>
                </button>
                <button onclick="triggerConsentSync(true)" class="px-4 py-2 rounded text-xs font-medium transition-all" style="border: 1px solid var(--border); color: var(--text-secondary);" title="Force re-sync even if file unchanged">
                  <span data-i18n="admin.consent_force_sync">Force Sync</span>
                </button>
              </div>
            </div>
            <div id="consent-sync-info" class="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div class="p-3 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
                <p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);" data-i18n="admin.consent_version">Version</p>
                <p class="text-lg font-bold" style="color: var(--text-primary);" id="consent-version">—</p>
              </div>
              <div class="p-3 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
                <p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);" data-i18n="admin.consent_last_sync">Last Sync</p>
                <p class="text-sm font-medium" style="color: var(--text-primary);" id="consent-last-sync">—</p>
              </div>
              <div class="p-3 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
                <p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);" data-i18n="admin.consent_records">Records</p>
                <p class="text-lg font-bold" style="color: var(--text-primary);" id="consent-records">—</p>
              </div>
              <div class="p-3 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
                <p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);" data-i18n="admin.consent_next_sync">Next Sync</p>
                <p class="text-sm font-medium" style="color: var(--text-primary);" id="consent-next-sync">—</p>
              </div>
            </div>
            <div class="mt-3 flex flex-wrap items-center gap-4 text-xs" style="color: var(--text-muted);">
