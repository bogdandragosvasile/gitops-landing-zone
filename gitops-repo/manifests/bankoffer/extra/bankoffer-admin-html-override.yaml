      clearTimeout(_actionLogDebounce);
      _actionLogDebounce = setTimeout(async () => {
        const action = document.getElementById('action-log-filter-action').value;
        const resource = document.getElementById('action-log-filter-resource').value;
        const actor = document.getElementById('action-log-filter-actor').value;
        const params = new URLSearchParams({ limit: 100 });
        if (action) params.set('action', action);
        if (resource) params.set('resource_type', resource);
        if (actor) params.set('actor', actor);

        const container = document.getElementById('action-log-container');
        container.innerHTML = '<p class="text-sm" style="color:var(--text-muted);">Loading…</p>';
        try {
          const resp = await fetch(`${API}/compliance/action-log?${params}`);
          const data = await resp.json();
          if (!data.length) {
            container.innerHTML = '<p class="text-sm" style="color:var(--text-muted);">No action log entries match your filters.</p>';
            return;
          }
          const actionColors = {
            login: 'var(--accent-green)', login_failed: 'var(--accent-red)',
            create: 'var(--accent-blue)', update: 'var(--accent-yellow)',
            delete: 'var(--accent-red)', approve: 'var(--accent-green)',
            reject: 'var(--accent-red)', toggle: 'var(--accent-yellow)',
            implement: 'var(--accent-blue)', kill_switch_toggle: 'var(--accent-red)',
            consent_update: 'var(--accent-blue)',
          };
          let html = `<div class="overflow-x-auto"><table class="w-full text-sm">
            <thead><tr class="text-left text-xs uppercase tracking-wider border-b" style="color:var(--text-secondary);border-color:var(--border);">
              <th class="pb-2 pr-3">Time</th><th class="pb-2 pr-3">Action</th>
              <th class="pb-2 pr-3">Actor</th><th class="pb-2 pr-3">Resource</th>
              <th class="pb-2 pr-3">Status</th><th class="pb-2">IP</th>
            </tr></thead><tbody>`;
          data.forEach(r => {
            const color = actionColors[r.action] || 'var(--text-primary)';
            const ts = r.created_at ? new Date(r.created_at).toLocaleString() : '—';
            const resource = [r.resource_type, r.resource_id].filter(Boolean).join('/');
