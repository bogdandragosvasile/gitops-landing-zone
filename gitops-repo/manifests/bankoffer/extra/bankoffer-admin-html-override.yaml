              <td class="py-2 pr-3 text-xs" style="color:var(--text-primary);">${r.actor || '—'}</td>
              <td class="py-2 pr-3 text-xs font-mono" style="color:var(--text-secondary);">${resource || '—'}</td>
              <td class="py-2 pr-3 text-xs" style="color:${r.http_status >= 400 ? 'var(--accent-red)' : 'var(--accent-green)'};">${r.http_status || '—'}</td>
              <td class="py-2 text-xs" style="color:var(--text-muted);">${r.ip_address || '—'}</td>
            </tr>`;
          });
          html += '</tbody></table></div>';
          container.innerHTML = html;
        } catch (e) {
          container.innerHTML = `<p class="text-sm" style="color:var(--accent-red);">Failed to load: ${e.message}</p>`;
