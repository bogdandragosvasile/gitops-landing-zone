        <!-- ===== AUDIT DETAIL MODAL ===== -->
        <div id="audit-detail-modal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4" style="background: rgba(0,0,0,0.35);">
          <div class="w-full max-w-3xl max-h-[90vh] overflow-y-auto" style="background: var(--bg-raised); border: 1px solid var(--border);">
            <div class="flex items-center justify-between px-6 py-4" style="border-bottom: 1px solid var(--border);">
              <div>
                <h2 class="text-sm font-semibold" style="color: var(--text-primary);">Audit Record Detail</h2>
                <p id="audit-detail-id" class="font-mono text-xs mt-0.5" style="color: var(--text-muted);"></p>
              </div>
              <button onclick="closeAuditDetail()" class="text-xl leading-none transition" style="color: var(--text-muted);">&times;</button>
            </div>
            <div id="audit-detail-body" class="px-6 py-5 space-y-5 text-sm" style="color: var(--text-primary);">
              <p style="color: var(--text-muted);">Loading...</p>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script>
    const API = window.location.origin;
    // Use global t() from i18n.js — do NOT redeclare

    // ===== ADMIN AUTH =====
    const STAFF_SESSION_KEY = 'boai_staff_session_admin';
    let _ssoAuthenticated = false;

    function getStaffSession() {
      try {
        const raw = localStorage.getItem(STAFF_SESSION_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (Date.now() - data.ts > 8 * 60 * 60 * 1000) {
          localStorage.removeItem(STAFF_SESSION_KEY);
          return null;
        }
        return data;
      } catch (e) { return null; }
    }

    function saveStaffSession(data) {
      localStorage.setItem(STAFF_SESSION_KEY, JSON.stringify({ ...data, ts: Date.now() }));
    }

    function clearStaffSession() {
      localStorage.removeItem(STAFF_SESSION_KEY);
    }

    function fillAdminDemo(email, pwd) {
      document.getElementById('admin-login-email').value = email;
      document.getElementById('admin-login-password').value = pwd;
    }

    // SSO login via Keycloak
    function ssoAdminLogin() {
      if (window.BOAI_AUTH) {
        window.BOAI_AUTH.keycloakLogin();
      }
    }

    // Email/password login
    async function handleAdminLogin() {
      const email = document.getElementById('admin-login-email').value.trim();
      const password = document.getElementById('admin-login-password').value;
      const errorEl = document.getElementById('admin-login-error');
      const btn = document.getElementById('admin-login-btn');

      if (!email || !password) {
        errorEl.textContent = t('sauth.login_error');
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';
      errorEl.classList.add('hidden');

      try {
        const resp = await fetch('/staff-auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || t('sauth.login_error'));
        }
        const data = await resp.json();
        saveStaffSession(data);

        if (data.role !== 'admin') {
          window.location.href = '/';
          return;
        }

        enterAdminPortal(data);
      } catch (e) {
        errorEl.textContent = e.message || t('sauth.login_error');
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="sauth.login_btn">${t('sauth.login_btn')}</span>`;
      }
    }

    function adminLogout() {
      if (_ssoAuthenticated && window.BOAI_AUTH) {
        window.BOAI_AUTH.logout();
        return;
      }
      clearStaffSession();
      window.location.reload();
    }

    function enterAdminPortal(session) {
      const gate = document.getElementById('auth-gate');
      const app = document.getElementById('admin-app');

      // Determine role — works for both SSO (session.roles) and email/pwd (session.role)
      const role = session.role || ((session.roles || []).includes('admin') ? 'admin' : '');
      const displayName = session.display_name || session.name || session.email || 'User';

      if (role !== 'admin') {
        gate.innerHTML = `<div class="fixed inset-0 z-[100] flex items-center justify-center" style="background:var(--bg)">
          <div class="glass-card rounded-none p-8 max-w-md text-center">
            <h2 class="text-xl font-bold text-ink mb-2">${t('auth.unauthorized')}</h2>
            <p class="text-ink-secondary mb-4">${t('sauth.wrong_role')}</p>
            <div class="flex gap-3 justify-center">
              <a href="/" class="px-4 py-2 bg-accent hover:bg-accent-blue text-ink rounded text-sm font-medium transition">${t('sauth.go_employee')}</a>
              <button onclick="adminLogout()" class="px-4 py-2 border border-border text-ink-secondary rounded text-sm font-medium transition " style="color: var(--text-secondary);">${t('sauth.logout')}</button>
            </div>
          </div>
        </div>`;
        return;
      }

      gate.style.display = 'none';
      app.classList.remove('hidden');

      document.getElementById('theme-toggle').innerHTML = window.BOAI_THEME.renderToggle();
      if (window.BOAI_I18N) {
        document.getElementById('lang-selector').innerHTML = window.BOAI_I18N.renderLanguageSelector();
      }
      const ub = document.getElementById('user-badge');
      const ssoTag = _ssoAuthenticated ? '<span class="text-accent text-[10px] ml-1">(SSO)</span>' : '';
      if (ub) {
        ub.innerHTML = `<div class="flex items-center gap-2">
          <div class="flex items-center gap-2 px-3 py-1.5 rounded border border-border/50">
            <div class="w-7 h-7 rounded rounded flex items-center justify-center text-xs font-bold" style="background: var(--bg-sunken); color: var(--text-secondary);">${displayName.charAt(0)}</div>
            <div class="text-xs">
              <div class="font-medium text-ink">${displayName}${ssoTag}</div>
              <span class="px-1.5 py-0.5 rounded text-[10px] font-medium " style="background: var(--bg-sunken); color: var(--text-secondary);">Admin</span>
            </div>
          </div>
          <button onclick="adminLogout()" class="p-1.5 rounded hover:bg-surface-sunken text-ink-secondary transition-colors" title="${t('sauth.logout')}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>`;
      }

      loadOverview();
    }

    // Init: check session or show login
    (function initAdminAuth() {
      const als = document.getElementById('auth-lang-selector-adm');
      const att = document.getElementById('auth-theme-toggle-adm');
      if (als && window.BOAI_I18N) als.innerHTML = window.BOAI_I18N.renderLanguageSelector();
      if (att && window.BOAI_THEME) att.innerHTML = window.BOAI_THEME.renderToggle();

      // Check email/password session first
      const session = getStaffSession();
      if (session) {
        enterAdminPortal(session);
      }

      // Listen for Keycloak SSO auth
      if (window.BOAI_AUTH) {
        window.BOAI_AUTH.onAuthChange(function(user) {
          if (user && !_ssoAuthenticated) {
            const roles = user.roles || [];
            if (!roles.includes('admin')) {
              // Non-admin session — clear and stay on admin login (session isolation)
              window.BOAI_AUTH.logout();
              return;
            }
            _ssoAuthenticated = true;
            enterAdminPortal(user);
          }
        });
      }

      // Enter key handlers
      const pwdEl = document.getElementById('admin-login-password');
      if (pwdEl) pwdEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleAdminLogin(); });
      const emailEl = document.getElementById('admin-login-email');
      if (emailEl) emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('admin-login-password').focus(); });
    })();

    function showSection(name) {
      document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
      document.getElementById('section-' + name).classList.remove('hidden');
      document.querySelectorAll('.admin-nav').forEach(n => n.classList.remove('active'));
      document.querySelector(`[data-section="${name}"]`).classList.add('active');

      const titleKeys = { overview: 'admin.overview', users: 'admin.users', security: 'admin.security', aiact: 'admin.aiact', tokens: 'admin.api_tokens', products: 'admin.products', consent: 'admin.consent_registry', connectors: 'Connectors', intelligence: 'Intelligence Hub', config: 'admin.system_config', audit: 'admin.audit_log', pnl: 'Product P&L' };
      const titleEl = document.getElementById('sectionTitle');
      titleEl.dataset.i18n = titleKeys[name] || '';
      titleEl.textContent = t(titleKeys[name] || name);

      if (name === 'audit') loadAuditLog();
      if (name === 'aiact') loadAiActCompliance();
      if (name === 'tokens') loadApiTokens();
      if (name === 'products') loadProducts();
      if (name === 'consent') loadConsentRegistry();
      if (name === 'connectors') loadConnectors();
      if (name === 'intelligence') loadIntelligence();
      if (name === 'pnl') loadPnL();
    }

    async function loadOverview() {
      try {
        const resp = await fetch(`${API}/health`);
        const data = await resp.json();

        document.getElementById('stat-health').textContent = data.status === 'healthy' ? 'OK' : 'Down';
        document.getElementById('stat-health-detail').textContent = data.status;
        document.getElementById('stat-demo').textContent = data.demo_mode ? 'Active' : 'Off';
        document.getElementById('stat-demo-detail').textContent = data.demo_mode ? 'Auth bypassed' : 'Production mode';
        document.getElementById('stat-kc').textContent = data.keycloak_configured ? 'Active' : 'N/A';
        document.getElementById('stat-kc-detail').textContent = data.keycloak_configured ? 'JWT validation enabled' : 'Using demo mode';

        document.getElementById('system-info').innerHTML = `
          <div class="space-y-2">
