    function renderConsentStats(consent) {
      if (!consent) return;
      const total = consent.total || 1;
      const items = [
        { key: 'profiling', label: 'admin.aiact_consent_profiling', fallback: 'Profiling Consent', color: 'accent' },
        { key: 'automated', label: 'admin.aiact_consent_automated', fallback: 'Automated Decisions', color: 'accent-blue' },
        { key: 'family', label: 'admin.aiact_consent_family', fallback: 'Family Context', color: 'accent-blue' },
        { key: 'mkt_push', label: 'admin.aiact_consent_push', fallback: 'Marketing (Push)', color: 'accent-green' },
        { key: 'mkt_email', label: 'admin.aiact_consent_email', fallback: 'Marketing (Email)', color: 'accent-yellow' }
      ];

      const grid = document.getElementById('aiact-consent-grid');
      let html = '';
      for (const item of items) {
        const count = consent[item.key] || 0;
        const pct = Math.round((count / total) * 100);
        html += `
          <div class="p-4 rounded bg-surface-sunken border border-border">
            <p class="text-xs text-ink-secondary mb-2" data-i18n="${item.label}">${t(item.label) || item.fallback}</p>
