              <span class="text-2xl font-bold text-ink">${count}</span>
              <span class="text-sm text-ink-secondary mb-0.5">/ ${total}</span>
            </div>
            <div class="w-full h-2 rounded bg-surface-sunken overflow-hidden">
              <div class="h-full rounded bg-${item.color}" style="width: ${pct}%"></div>
            </div>
            <p class="text-xs text-ink-secondary mt-1">${pct}%</p>
          </div>`;
      }
      grid.innerHTML = html;
    }

