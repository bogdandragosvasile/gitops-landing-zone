    function closeAuditDetail() {
      document.getElementById('auditSlideoutPanel').classList.remove('open');
      setTimeout(() => document.getElementById('auditSlideout').classList.add('hidden'), 300);
    }

    // ===== PRODUCTS PAGE =====
    let eligibilityData = null;
    let eligibilityLoading = false;

    async function fetchEligibility() {
      if (eligibilityLoading) return;
      eligibilityLoading = true;
      try {
        const resp = await _authFetch(`${API}/offers/eligibility/all`);
        if (resp.ok) {
          eligibilityData = await resp.json();
          renderEligibilityBadges();
        }
      } catch (e) { console.error('Eligibility fetch failed:', e); }
      eligibilityLoading = false;
    }

    function renderEligibilityBadges() {
      if (!eligibilityData) return;
      PRODUCTS.forEach(p => {
        const badge = document.getElementById(`elig-${p.id}`);
        if (!badge) return;
        const d = eligibilityData.products[p.id];
        if (!d) return;
        const pct = d.total > 0 ? Math.round((d.eligible / d.total) * 100) : 0;
        const barColor = pct >= 70 ? '#2D7D46' : pct >= 40 ? '#D4A843' : '#C1403D';
        badge.innerHTML = `
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[10px] font-medium uppercase tracking-wider" style="color: var(--text-muted);" data-i18n="products.eligibility">Client Eligibility</span>
            <span class="text-[10px] font-bold" style="color:${barColor}">${pct}%</span>
          </div>
          <div class="w-full h-1 rounded-sm mb-2" style="background: var(--bg-sunken);">
            <div class="h-1 rounded-sm transition-all duration-700" style="width:${pct}%;background:${barColor}"></div>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-1">
              <div class="w-1.5 h-1.5 rounded-full bg-accent-green"></div>
              <span class="text-[10px]" style="color: var(--text-muted);"><span class="font-medium text-accent-green">${d.eligible}</span> eligible</span>
            </div>
            <div class="flex items-center gap-1">
              <div class="w-1.5 h-1.5 rounded-full bg-accent-red"></div>
              <span class="text-[10px]" style="color: var(--text-muted);"><span class="font-medium text-accent-red">${d.ineligible}</span> excluded</span>
            </div>
            ${d.no_consent > 0 ? `<div class="flex items-center gap-1">
              <div class="w-1.5 h-1.5 rounded-full bg-accent-yellow"></div>
              <span class="text-[10px]" style="color: var(--text-muted);"><span class="font-medium text-accent-yellow">${d.no_consent}</span> no consent</span>
            </div>` : ''}
          </div>`;
      });
    }

    function renderProductsPage() {
      const el = document.getElementById('productGrid');
      el.innerHTML = PRODUCTS.map(p => {
        const c = COLORS[p.type];
        return `<div class="border border-border rounded-none p-4 cursor-pointer offer-card" style="background: var(--bg-raised);" onclick="openProductDetail('${p.id}')">
          <div class="flex items-start gap-4 mb-4"><div class="w-12 h-12 rounded-none ${c.bg} ${c.text} flex items-center justify-center flex-shrink-0">${ICONS[p.type]}</div><div><h3 class="text-base font-medium" style="color: var(--text-primary);">${p.name}</h3><span class="text-xs ${c.text}">${p.cat} &middot; ${p.priority} priority</span></div></div>
          <p class="text-xs leading-relaxed mb-4" style="color: var(--text-secondary);">${p.desc}</p>
          <div id="elig-${p.id}" class="mb-3 p-3 rounded-none border" style="background: var(--bg-sunken); border-color: var(--border);">
            <div class="flex items-center gap-2 text-[10px]" style="color: var(--text-muted);">
              <div class="w-3 h-3 border-2 border-border-strong border-t-accent-blue rounded-full animate-spin"></div>
              Loading eligibility...
            </div>
          </div>
          <div class="flex flex-wrap gap-1.5 mb-3">${p.triggers.split(', ').slice(0,3).map(t=>`<span class="px-2 py-0.5 rounded text-[10px]" style="background: var(--bg-sunken); color: var(--text-muted);">${t}</span>`).join('')}</div>
          <div class="flex items-center justify-between pt-3" style="border-top: 1px solid var(--border);"><span class="text-[10px]" style="color: var(--text-muted);">Channel: ${p.channel}</span><span class="text-[10px]" style="color: var(--text-muted);">Stage: ${p.stage}</span></div>
        </div>`;
      }).join('');
      // Fetch real-time eligibility data
      fetchEligibility();
    }

    // ===== CUSTOMERS PAGE =====
    async function renderCustomersPage() {
      const tbody = document.getElementById('customersTableBody');
      if (tbody.children.length > 0) return;
      tbody.innerHTML = '<tr><td colspan="9" class="py-8 text-center text-xs" style="color: var(--text-muted);">Loading...</td></tr>';
      const rows = [];
      for (const i of allCustomerIds) {
        try {
          const [profResp, offResp] = await Promise.all([_authFetch(`${API}/profiles/${i}`), _authFetch(`${API}/offers/${i}?top_n=1`)]);
          const prof = profResp.ok ? await profResp.json() : null;
          const off = offResp.ok ? await offResp.json() : null;
          if (prof) profileCache[i] = prof;
          const topOffer = off?.offers?.[0]?.product_name || '--';
          const ls = (prof?.life_stage||'').replace(/_/g,' ');
          const segs = (prof?.segments||[]).join(', ');
          rows.push(`<tr class="table-row cursor-pointer" style="border-bottom: 1px solid var(--border);" onclick="navigateTo('dashboard');selectCustomer(${i})">
            <td class="py-3 px-4 font-medium" style="color: var(--text-primary);">${i}</td>
            <td class="py-3 px-4" style="color: var(--text-secondary);">--</td>
            <td class="py-3 px-4" style="color: var(--text-secondary);">--</td>
            <td class="py-3 px-4" style="color: var(--text-secondary);">--</td>
            <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-[10px] font-medium ${prof?.risk_score<4?'bg-accent-green/10 text-accent-green':prof?.risk_score<7?'bg-accent-yellow/10 text-accent-yellow':'bg-accent-red/10 text-accent-red'}">${prof?.risk_score?.toFixed(1)||'--'}</span></td>
            <td class="py-3 px-4 capitalize" style="color: var(--text-secondary);">${ls}</td>
            <td class="py-3 px-4 text-xs" style="color: var(--text-muted);">${segs}</td>
            <td class="py-3 px-4 text-xs" style="color: var(--text-secondary);">${topOffer}</td>
            <td class="py-3 px-4"><span class="text-xs text-accent-blue hover:underline">View &rarr;</span></td>
          </tr>`);
          if (rows.length % 10 === 0) { tbody.innerHTML = rows.join(''); }
        } catch(e) { console.error(e); }
      }
      tbody.innerHTML = rows.join('');
    }

    // ===== ANALYTICS PAGE =====
    async function renderAnalyticsPage() {
      if (analyticsCharts.built) return;
      analyticsCharts.built = true;
      const profiles = [];
      const allOffers = {};
      for (const i of allCustomerIds) {
        try {
          const [pr, of] = await Promise.all([
            profileCache[i] ? Promise.resolve(profileCache[i]) : _authFetch(`${API}/profiles/${i}`).then(r=>r.json()),
            _authFetch(`${API}/offers/${i}?top_n=3`).then(r=>r.json())
          ]);
          profiles.push(pr);
          (of.offers||[]).forEach(o => { allOffers[o.product_name] = (allOffers[o.product_name]||0) + 1; });
        } catch(e) {}
      }
      // Life stage chart
      const lsCounts = {};
      profiles.forEach(p => { const ls = (p.life_stage||'unknown'); lsCounts[ls]=(lsCounts[ls]||0)+1; });
      new Chart(document.getElementById('analyticsLifeStage'),{type:'doughnut',data:{labels:Object.keys(lsCounts).map(s=>s.replace(/_/g,' ')),datasets:[{data:Object.values(lsCounts),backgroundColor:['#2D5F9A','#2D7D46','#D4A843','#C1403D','#6B6B6B','#999999'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:'#6B6B6B',font:{size:11},padding:12}}}}});
      // Risk distribution
      const riskBuckets = {'1-3':0,'3-5':0,'5-7':0,'7-10':0};
      profiles.forEach(p => { const r=p.risk_score||0; if(r<3) riskBuckets['1-3']++; else if(r<5) riskBuckets['3-5']++; else if(r<7) riskBuckets['5-7']++; else riskBuckets['7-10']++; });
      new Chart(document.getElementById('analyticsRisk'),{type:'bar',data:{labels:Object.keys(riskBuckets),datasets:[{label:'Customers',data:Object.values(riskBuckets),backgroundColor:['#2D7D46','#D4A843','#C1403D','#C1403D'],borderRadius:0,barThickness:40}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{grid:{color:'#E8E6E1'},ticks:{color:'#6B6B6B'}},x:{grid:{display:false},ticks:{color:'#6B6B6B'}}},plugins:{legend:{display:false}}}});
      // Income
      const incCounts = {};
      profiles.forEach(p => { const b=p.income_bracket||'unknown'; incCounts[b]=(incCounts[b]||0)+1; });
      new Chart(document.getElementById('analyticsIncome'),{type:'doughnut',data:{labels:Object.keys(incCounts),datasets:[{data:Object.values(incCounts),backgroundColor:['#C1403D','#D4A843','#2D7D46','#2D5F9A'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:'#6B6B6B',font:{size:11},padding:12}}}}});
      // Top products
      const sorted = Object.entries(allOffers).sort((a,b)=>b[1]-a[1]).slice(0,8);
      new Chart(document.getElementById('analyticsProducts'),{type:'bar',data:{labels:sorted.map(s=>s[0]),datasets:[{label:'Times recommended',data:sorted.map(s=>s[1]),backgroundColor:'rgba(45,95,154,0.6)',borderRadius:0,barThickness:20}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{grid:{color:'#E8E6E1'},ticks:{color:'#6B6B6B'}},y:{grid:{display:false},ticks:{color:'#6B6B6B',font:{size:11}}}},plugins:{legend:{display:false}}}});
    }

    // ===== COMPLIANCE PAGE =====
    let complianceLoaded = false;

    function switchComplianceTab(tab) {
      document.querySelectorAll('.compliance-tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`compliance-tab-${tab}`).classList.remove('hidden');
      document.querySelectorAll('.compliance-tab').forEach(el => el.classList.remove('active'));
      document.querySelector(`.compliance-tab[data-tab="${tab}"]`).classList.add('active');
    }

    function renderCompliancePage() {
      if (!complianceLoaded) {
        complianceLoaded = true;
        loadAuditTrail();
        loadConsentOverview();
      }
    }

    async function loadAuditTrail() {
      const tbody = document.getElementById('auditTableBody');
      tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center" style="color: var(--text-muted);"><div class="w-6 h-6 border-2 border-accent-blue/30 border-t-accent-blue rounded-full animate-spin mx-auto"></div></td></tr>';

      const filterVal = document.getElementById('auditFilterCustomer').value.trim();
      let url = `${API}/compliance/audit?limit=50`;
      if (filterVal) url += `&customer_id=${filterVal}`;

      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const entries = Array.isArray(data) ? data : (data.entries || data.audits || []);

        if (entries.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="py-12 text-center text-sm" style="color: var(--text-muted);">No audit entries found.</td></tr>';
          return;
        }

        tbody.innerHTML = entries.map(entry => {
          const ts = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : '--';
          const custId = entry.customer_id || '--';
          const numOffers = entry.num_offers ?? (entry.offers || []).length ?? '--';
          const numExcluded = entry.num_excluded ?? (entry.excluded_products || []).length ?? '--';
          const modelVersion = entry.model_version || '--';
          const recId = entry.recommendation_id || entry.id || '--';

          return `<tr class="table-row" style="border-bottom: 1px solid var(--border);">
            <td class="py-3 px-4 text-xs" style="color: var(--text-secondary);">${ts}</td>
            <td class="py-3 px-4 font-medium" style="color: var(--text-primary);">${custId}</td>
            <td class="py-3 px-4" style="color: var(--text-secondary);">${numOffers}</td>
            <td class="py-3 px-4" style="color: var(--text-secondary);">${numExcluded}</td>
            <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-[10px] font-medium bg-accent-blue/10 text-accent-blue">${modelVersion}</span></td>
            <td class="py-3 px-4"><button onclick="openAuditDetail('${recId}')" class="text-xs text-accent-blue hover:underline transition">View Detail</button></td>
          </tr>`;
        }).join('');
      } catch (err) {
        console.error('Audit trail load error:', err);
        tbody.innerHTML = `<tr><td colspan="6" class="py-12 text-center text-sm" style="color: var(--text-muted);">Failed to load audit trail: ${err.message}</td></tr>`;
      }
    }

    async function loadCustomerFeedback() {
      const custId = document.getElementById('feedbackCustomerId').value.trim();
      const tbody = document.getElementById('feedbackTableBody');

      if (!custId) {
        tbody.innerHTML = '<tr><td colspan="6" class="py-12 text-center text-sm" style="color: var(--text-muted);">Please enter a customer ID.</td></tr>';
        return;
      }

      tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center" style="color: var(--text-muted);"><div class="w-6 h-6 border-2 border-accent-blue/30 border-t-accent-blue rounded-full animate-spin mx-auto"></div></td></tr>';

      try {
        const resp = await fetch(`${API}/compliance/feedback/${custId}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const entries = Array.isArray(data) ? data : (data.feedback || data.entries || []);

        if (entries.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="py-12 text-center text-sm" style="color: var(--text-muted);">No feedback entries for customer #${custId}.</td></tr>`;
          return;
        }

        tbody.innerHTML = entries.map(entry => {
          const ts = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : '--';
          const action = entry.action || entry.status || '--';
          const actionColor = action === 'accepted' ? 'bg-accent-green/10 text-accent-green' : action === 'rejected' ? 'bg-accent-red/10 text-accent-red' : action === 'flagged' ? 'bg-accent-yellow/10 text-accent-yellow' : '';
          return `<tr class="table-row" style="border-bottom: 1px solid var(--border);">
            <td class="py-3 px-4 text-xs" style="color: var(--text-secondary);">${ts}</td>
            <td class="py-3 px-4 font-medium" style="color: var(--text-primary);">${entry.customer_id || custId}</td>
            <td class="py-3 px-4 text-xs" style="color: var(--text-secondary);">${entry.offer_name || entry.product_name || entry.offer_id || '--'}</td>
            <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-[10px] font-medium ${actionColor}" ${!actionColor ? 'style="background: var(--bg-sunken); color: var(--text-secondary);"' : ''}>${action}</span></td>
            <td class="py-3 px-4 text-xs" style="color: var(--text-muted);">${entry.reason || '--'}</td>
            <td class="py-3 px-4 text-xs" style="color: var(--text-muted);">${entry.actor_type || entry.actor || '--'}</td>
          </tr>`;
        }).join('');
      } catch (err) {
        console.error('Feedback load error:', err);
        tbody.innerHTML = `<tr><td colspan="6" class="py-12 text-center text-sm" style="color: var(--text-muted);">Failed to load feedback: ${err.message}</td></tr>`;
      }
    }

    async function loadConsentOverview() {
      const tbody = document.getElementById('consentTableBody');
      tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center" style="color: var(--text-muted);"><div class="w-6 h-6 border-2 border-accent-blue/30 border-t-accent-blue rounded-full animate-spin mx-auto"></div></td></tr>';

      let profilingCount = 0, sensitiveCount = 0, withdrawnCount = 0;
      const rows = [];

      // Fetch consent + profile data in parallel batches
      const batchSize = 10;
      for (let batch = 0; batch < allCustomerIds.length; batch += batchSize) {
        const promises = [];
        for (let idx = batch; idx < Math.min(batch + batchSize, allCustomerIds.length); idx++) {
          const i = allCustomerIds[idx];
          promises.push((async (cid) => {
            try {
              const [consentResp, profResp] = await Promise.all([
                fetch(`${API}/compliance/consent/${cid}`),
                profileCache[cid] ? Promise.resolve(null) : fetch(`${API}/profiles/${cid}`)
              ]);
              const consent = consentResp.ok ? await consentResp.json() : {};
              if (profResp && profResp.ok) { profileCache[cid] = await profResp.json(); }
              const d = profileCache[cid] ? (profileCache[cid].data || profileCache[cid]) : {};

              const profilingConsent = consent.profiling_consent === true;
              const sensitiveConsent = consent.sensitive_data_consent === true;
              const withdrawn = !profilingConsent;

              if (profilingConsent) profilingCount++;
              if (sensitiveConsent) sensitiveCount++;
              if (withdrawn) withdrawnCount++;

              const ls = (d.life_stage || '').replace(/_/g, ' ');
              const risk = d.risk_score ? parseFloat(d.risk_score).toFixed(1) : '--';

              return `<tr class="table-row" style="border-bottom: 1px solid var(--border);">
                <td class="py-3 px-4 font-medium" style="color: var(--text-primary);">${cid}</td>
                <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-[10px] font-medium ${profilingConsent ? 'bg-accent-green/10 text-accent-green' : 'bg-accent-red/10 text-accent-red'}">${profilingConsent ? 'Active' : 'Inactive'}</span></td>
                <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-[10px] font-medium ${sensitiveConsent ? 'bg-accent-green/10 text-accent-green' : ''}" ${!sensitiveConsent ? 'style="background: var(--bg-sunken); color: var(--text-muted);"' : ''}>${sensitiveConsent ? 'Granted' : 'Not Granted'}</span></td>
                <td class="py-3 px-4 capitalize text-xs" style="color: var(--text-secondary);">${ls}</td>
                <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-[10px] font-medium ${d.risk_score<4?'bg-accent-green/10 text-accent-green':d.risk_score<7?'bg-accent-yellow/10 text-accent-yellow':'bg-accent-red/10 text-accent-red'}">${risk}</span></td>
              </tr>`;
            } catch (e) { console.error(e); return ''; }
          })(i));
        }
        const batchRows = await Promise.all(promises);
        rows.push(...batchRows.filter(Boolean));
      }

      document.getElementById('consentProfilingCount').textContent = profilingCount;
      document.getElementById('consentSensitiveCount').textContent = sensitiveCount;
      document.getElementById('consentWithdrawnCount').textContent = withdrawnCount;
      tbody.innerHTML = rows.length > 0 ? rows.join('') : '<tr><td colspan="5" class="py-12 text-center text-sm" style="color: var(--text-muted);">No consent data available.</td></tr>';
    }

    // ===== EXCLUDED PRODUCTS (DASHBOARD) =====
    function toggleExcludedProducts() {
      const list = document.getElementById('excludedProductsList');
      const header = list.previousElementSibling;
      excludedProductsVisible = !excludedProductsVisible;
      if (excludedProductsVisible) {
        list.classList.remove('hidden');
        header.classList.add('open');
      } else {
        list.classList.add('hidden');
        header.classList.remove('open');
      }
    }

    function renderExcludedProducts(excluded) {
      const card = document.getElementById('excludedProductsCard');
      const list = document.getElementById('excludedProductsList');
      const countEl = document.getElementById('excludedCount');

      if (!excluded || excluded.length === 0) {
        card.classList.add('hidden');
        return;
      }

      card.classList.remove('hidden');
      countEl.textContent = `${excluded.length} product${excluded.length !== 1 ? 's' : ''}`;

      list.innerHTML = excluded.map(ep => {
        const name = ep.product_name || ep.product_id || 'Unknown Product';
        const reason = ep.reason || 'Suitability check failed';
        return `<div class="excluded-card rounded-none p-4 flex items-start gap-3">
          <div class="flex-1 min-w-0">
            <h4 class="text-sm font-medium" style="color: var(--text-secondary);">${name}</h4>
            <p class="text-xs mt-0.5 leading-relaxed" style="color: var(--text-muted);">${reason}</p>
          </div>
          <span class="px-2 py-0.5 rounded text-[10px] font-medium" style="background: var(--bg-sunken); color: var(--text-muted);">Excluded</span>
        </div>`;
      }).join('');

      // Show by default when new data arrives
      excludedProductsVisible = true;
      list.classList.remove('hidden');
      document.querySelector('#excludedProductsCard .collapsible-header').classList.add('open');
    }

