    // ===== CUSTOMER LIST (dynamic) =====
    let allCustomerIds = [];
    async function loadCustomerIds() {
      try {
        const resp = await fetch(`${API}/customer-auth/customers/list`);
        if (resp.ok) {
          const data = await resp.json();
          allCustomerIds = data.customer_ids || [];
        }
      } catch(e) { console.error('Failed to load customer IDs:', e); }
      if (!allCustomerIds.length) {
        allCustomerIds = [];
        for (let i = 1; i <= 50; i++) allCustomerIds.push(String(i));
      }
    }

    // ===== DASHBOARD LOGIC =====
    function renderCustomerGrid() {
      const grid = document.getElementById('customerGrid');
      let html = '';
      allCustomerIds.forEach(id => {
        html += `<button onclick="selectCustomer(${id})" id="custBtn${id}" class="customer-btn w-10 h-10 rounded border text-sm font-medium transition-all flex items-center justify-center" style="border-color: var(--border); background: var(--bg); color: var(--text-secondary);">${id}</button>`;
      });
      grid.innerHTML = html;
    }

    async function selectCustomer(id) {
      if (selectedCustomerId) { const prev=document.getElementById(`custBtn${selectedCustomerId}`); if(prev) prev.classList.remove('active'); }
      selectedCustomerId = id;
      const btn = document.getElementById(`custBtn${id}`);
      if (btn) btn.classList.add('active');
      document.getElementById('selectedCustomerInfo').textContent = `Customer #${id} selected`;
      const offersGrid = document.getElementById('offersGrid');
      offersGrid.innerHTML = '<div class="flex items-center justify-center py-8"><div class="w-6 h-6 border-2 border-accent-blue/30 border-t-accent-blue rounded-full animate-spin"></div></div>';
      // Hide excluded products and consent status while loading
      document.getElementById('excludedProductsCard').classList.add('hidden');
      document.getElementById('consentStatusCard').classList.add('hidden');
      try {
        const [offResp, profResp] = await Promise.all([_authFetch(`${API}/offers/${id}?top_n=8`), _authFetch(`${API}/profiles/${id}`)]);
        if (offResp.ok) {
          const data = await offResp.json();
          lastOffersResponse = data;
          renderOffers(data.offers, data);
          updateDistributionChart(data.offers);
          updateScoreChart(data.offers);
          document.getElementById('offersCount').textContent = `${data.offers.length} offers`;
          const avg = data.offers.reduce((a,o) => a + o.relevance_score, 0) / Math.max(data.offers.length, 1);
          document.getElementById('statAvgScore').textContent = (avg * 100).toFixed(0) + '%';
          // Render excluded products
          renderExcludedProducts(data.excluded_products);
        } else {
          offersGrid.innerHTML = '<p class="text-center text-accent-red py-8 text-sm">Failed to load offers</p>';
        }
        if (profResp.ok) { const prof=await profResp.json(); profileCache[id]=prof; renderProfile(prof); }
        // Load granular consent status for AI Act transparency
        loadConsentStatus(id);
      } catch(e) { console.error(e); offersGrid.innerHTML='<p class="text-center text-accent-red py-8 text-sm">Error connecting to API</p>'; }
    }

    function renderProfile(profile) {
      document.getElementById('profileCard').classList.remove('hidden');
      const d = profile.data||profile;
      document.getElementById('profileLifeStage').textContent=(d.life_stage||'').replace(/_/g,' ');
      document.getElementById('profileDetails').innerHTML = [
        {l:'Risk Score',v:d.risk_score?parseFloat(d.risk_score).toFixed(1)+'/10':'--'},
        {l:'Income',v:d.income_bracket||'--'},
        {l:'Segments',v:(d.segments||[]).length},
        {l:'Life Stage',v:(d.life_stage||'').replace(/_/g,' ')},
      ].map(f=>`<div class="rounded-none p-3" style="background: var(--bg-sunken);"><p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);">${f.l}</p><p class="text-sm font-medium" style="color: var(--text-primary); font-feature-settings: 'tnum';">${f.v}</p></div>`).join('');
    }

    function renderOffers(offers, responseData) {
      const grid = document.getElementById('offersGrid');
      if (!offers.length) { grid.innerHTML='<p class="text-center py-8 text-sm" style="color: var(--text-muted);">No offers matched</p>'; return; }
      const recId = responseData ? (responseData.recommendation_id || '') : '';
      const modelVersion = responseData ? (responseData.model_version || '') : '';

      grid.innerHTML = offers.map((o,i) => {
        const c=COLORS[o.product_type]||COLORS.investment, pct=(o.relevance_score*100).toFixed(0), conf=(o.confidence_score*100).toFixed(0);
        const prod = PRODUCTS.find(p => p.name.startsWith(o.product_name) || o.product_name.startsWith(p.name.replace(' Portfolio','')));
        const onclick = prod ? `onclick="openProductDetail('${prod.id}')"` : '';
        const productId = prod ? prod.id : (o.product_id || o.product_name);

        // Suitability badge
        const suitabilityBadge = o.suitability_status === 'passed'
          ? `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-medium bg-accent-green/10 text-accent-green"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Suitable</span>`
          : '';

        // Human review required badge (AI Act Art.22)
        const humanReviewBadge = o.human_review_required
          ? `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-medium bg-accent-yellow/10 text-accent-yellow" title="Customer has not given Art. 22 automated decision consent" data-i18n="compliance.requires_review">Requires Review</span>`
          : '';

        // MiFID II suitability confirmation badge
        const mifidBadge = o.requires_suitability_confirmation
          ? `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-medium bg-accent-blue/10 text-accent-blue" title="MiFID II suitability confirmation required" data-i18n="compliance.mifid_ii">MiFID II</span>`
          : '';

        // Explanation (GDPR art.22)
        const explanation = o.explanation
          ? `<p class="text-[11px] mt-1.5 leading-relaxed italic border-l-2 border-accent-blue/20 pl-2" style="color: var(--text-muted);">${tExplanation(o.explanation)}</p>`
          : '';

        // Recommendation ID reference
        const recRef = recId
          ? `<span class="text-[9px] font-mono mt-1 block" style="color: var(--text-muted);">ref: ${recId.substring(0, 12)}...</span>`
          : '';

        // Override button and inline form
        const overrideId = `override-${i}`;
        const overrideBtn = `<button onclick="event.stopPropagation();toggleOverrideForm('${overrideId}')" class="text-[10px] text-accent-yellow hover:text-accent-yellow/80 font-medium px-2 py-0.5 rounded border border-accent-yellow/20 hover:border-accent-yellow/40 transition" data-i18n="compliance.override">Override</button>`;
        const overrideForm = `<div id="${overrideId}" class="hidden override-form mt-3 p-3 rounded-none border" style="background: var(--bg-sunken); border-color: var(--border);" onclick="event.stopPropagation()">
          <div class="flex items-center gap-2 mb-2">
            <select id="${overrideId}-type" class="border rounded px-2 py-1.5 text-[11px] focus:outline-none flex-shrink-0" style="background: var(--bg-raised); border-color: var(--border); color: var(--text-primary);">
              <option value="reject">Reject</option>
              <option value="suppress">Suppress</option>
              <option value="escalate">Escalate</option>
            </select>
            <input type="text" id="${overrideId}-reason" placeholder="Reason (required)..." class="border rounded px-2 py-1.5 text-[11px] focus:outline-none flex-1 min-w-0" style="background: var(--bg-raised); border-color: var(--border); color: var(--text-primary);"/>
            <button onclick="submitOverride('${recId}', ${selectedCustomerId}, '${productId}', '${overrideId}')" class="bg-accent-yellow/20 hover:bg-accent-yellow/30 text-accent-yellow text-[11px] font-medium px-3 py-1.5 rounded transition flex-shrink-0" data-i18n="common.submit">Submit</button>
          </div>
        </div>`;

        return `<div class="offer-card border border-border rounded-none p-4 fade-in cursor-pointer" style="animation-delay:${i*0.06}s; background: var(--bg-raised);" ${onclick}>
          <div class="flex items-start gap-4">
            <div class="w-11 h-11 rounded-none ${c.bg} ${c.text} flex items-center justify-center flex-shrink-0 mt-0.5">${ICONS[o.product_type]||''}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-1">
                <h3 class="text-sm font-medium" style="color: var(--text-primary);">${tProductName(o.product_name)}</h3>
                <div class="flex items-center gap-1.5 flex-wrap justify-end">${humanReviewBadge}${mifidBadge}${suitabilityBadge}<span class="text-xs font-bold ${c.text}">${pct}%</span><span class="px-2 py-0.5 rounded text-[10px] font-medium" style="background: var(--bg-sunken); color: var(--text-muted);">#${i+1}</span></div>
              </div>
              <p class="text-xs mb-2.5 leading-relaxed" style="color: var(--text-secondary);">${tExplanation(o.personalization_reason)}</p>
              ${explanation}
              <div class="flex items-center gap-3 mt-2"><div class="flex-1"><div class="score-bar-bg"><div class="score-bar" style="width:${pct}%"></div></div></div><span class="text-[10px]" style="color: var(--text-muted);">conf: ${conf}%</span><span class="ml-1">${overrideBtn}</span></div>
              ${recRef}
              ${overrideForm}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // ===== AI ACT HUMAN OVERSIGHT =====
    function toggleOverrideForm(overrideId) {
      const form = document.getElementById(overrideId);
      if (form) form.classList.toggle('hidden');
    }

    async function submitOverride(recommendationId, customerId, productId, overrideId) {
      const typeEl = document.getElementById(`${overrideId}-type`);
      const reasonEl = document.getElementById(`${overrideId}-reason`);
      if (!reasonEl || !typeEl) return;
      const reason = reasonEl.value.trim();
      if (!reason) {
        reasonEl.style.borderColor = 'var(--accent-red)';
        reasonEl.placeholder = 'Reason is required!';
        return;
      }
      const overrideType = typeEl.value;
      const employeeId = (window.BOAI_AUTH && window.BOAI_AUTH.getUser) ? (window.BOAI_AUTH.getUser()?.id || 'employee-demo') : 'employee-demo';

      try {
        const resp = await fetch(`${API}/compliance/override`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            recommendation_id: recommendationId,
            customer_id: customerId,
            employee_id: employeeId,
            product_id: productId,
            override_type: overrideType,
            reason: reason
          })
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const result = await resp.json();
        showNotification(`Override ${overrideType}d successfully (ID: ${result.id || 'ok'})`, 'success');
        const form = document.getElementById(overrideId);
        if (form) form.innerHTML = `<p class="text-[11px] text-accent-green flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Override recorded: ${overrideType}</p>`;
      } catch (err) {
        console.error('Override error:', err);
        showNotification(`Override failed: ${err.message}`, 'error');
      }
    }

    function showNotification(message, type) {
      const existing = document.getElementById('aiActNotification');
      if (existing) existing.remove();
      const colors = type === 'success' ? 'bg-accent-green/10 border-accent-green/30 text-accent-green' : 'bg-accent-red/10 border-accent-red/30 text-accent-red';
      const notif = document.createElement('div');
      notif.id = 'aiActNotification';
      notif.className = `fixed bottom-6 right-6 z-[200] px-4 py-3 rounded border ${colors} text-sm font-medium fade-in`;
      notif.textContent = message;
      document.body.appendChild(notif);
      setTimeout(() => { notif.style.opacity = '0'; notif.style.transition = 'opacity 0.3s'; setTimeout(() => notif.remove(), 300); }, 4000);
    }

    async function fetchKillSwitchStatus() {
      try {
        const resp = await fetch(`${API}/compliance/kill-switch`);
        if (!resp.ok) return;
        const data = await resp.json();
        const banner = document.getElementById('killSwitchBanner');
        const indicator = document.getElementById('killSwitchIndicator');
        if (data.active) {
          banner.classList.remove('hidden');
          indicator.classList.remove('hidden');
          indicator.classList.add('flex');
          const reasonEl = document.getElementById('killSwitchReason');
          if (reasonEl && data.reason) reasonEl.textContent = `- ${data.reason}`;
          // Update system status to reflect suspended state
          const dot = document.getElementById('systemStatusDot');
          const text = document.getElementById('systemStatusText');
          if (dot) { dot.classList.remove('bg-accent-green'); dot.classList.add('bg-accent-red'); }
          if (text) text.textContent = 'Model Suspended';
        }
      } catch (err) {
        console.error('Kill-switch check failed:', err);
      }
    }

