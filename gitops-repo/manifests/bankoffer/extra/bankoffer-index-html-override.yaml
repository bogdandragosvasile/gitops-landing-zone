        <div class="p-8" id="productDetailContent"></div>
      </div>
    </div>

    <!-- Audit Detail Slideout -->
    <div id="auditSlideout" class="fixed inset-0 z-[60] hidden">
      <div class="absolute inset-0 bg-black/30" onclick="closeAuditDetail()"></div>
      <div class="slideout absolute right-0 top-0 h-full w-full md:w-[600px] border-l overflow-y-auto" style="background: var(--bg-raised); border-color: var(--border);" id="auditSlideoutPanel">
        <div class="p-8" id="auditDetailContent">
          <div class="flex items-center justify-center py-16"><div class="w-6 h-6 border-2 border-accent-blue/30 border-t-accent-blue rounded-full animate-spin"></div></div>
        </div>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="fixed inset-0 z-[100] flex items-center justify-center transition-opacity duration-500" style="background: var(--bg);">
      <div class="text-center">
        <div class="w-16 h-16 rounded-none bg-accent-blue flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-ink-inverse animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        </div>
        <p class="font-medium text-lg" style="color: var(--text-primary);" data-i18n="app.name">BankOffer AI</p>
        <p class="text-sm mt-1" style="color: var(--text-secondary);" data-i18n="common.initializing">Initializing scoring engine...</p>
      </div>
    </div>

    <script>
    const API = '';
    function _authFetch(url, opts) {
      const auth = window.BOAI_AUTH ? window.BOAI_AUTH.getAuthHeader() : {};
      const merged = Object.assign({}, opts);
      merged.headers = Object.assign({}, auth, opts && opts.headers);
      return fetch(url, merged);
    }
    const ICONS = {
      investment: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>',
      bond: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>',
      savings: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>',
      retirement: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
      personal_loan: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
      mortgage: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>',
      credit_card: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>',
      insurance: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>',
    };
    const COLORS = {
      investment: { bg:'bg-accent-blue/10', text:'text-accent-blue', bar:'#2D5F9A', hex:'#2D5F9A' },
      bond: { bg:'bg-accent-blue/10', text:'text-accent-blue', bar:'#2D5F9A', hex:'#2D5F9A' },
      savings: { bg:'bg-accent-green/10', text:'text-accent-green', bar:'#2D7D46', hex:'#2D7D46' },
      retirement: { bg:'bg-accent-yellow/10', text:'text-accent-yellow', bar:'#D4A843', hex:'#D4A843' },
      personal_loan: { bg:'bg-accent-red/10', text:'text-accent-red', bar:'#C1403D', hex:'#C1403D' },
      mortgage: { bg:'bg-accent-blue/10', text:'text-accent-blue', bar:'#2D5F9A', hex:'#2D5F9A' },
      credit_card: { bg:'bg-accent-red/10', text:'text-accent-red', bar:'#C1403D', hex:'#C1403D' },
      insurance: { bg:'bg-accent-green/10', text:'text-accent-green', bar:'#2D7D46', hex:'#2D7D46' },
    };

    const PRODUCTS = [
      { id:'prod_etf_starter', name:'ETF Starter Portfolio', type:'investment', cat:'Investments', channel:'app', priority:'high', stage:'onboarding',
        desc:'Entry-level investing with diversified ETFs. Ideal for first-time investors seeking broad market exposure with low fees.',
        target:'First-time investors', eligibility:'Age >= 18, income > 3,000, active account',
        suitability:'Savings > 5,000, monthly savings > 300, debt-to-income < 1, risk = moderate/high',
        triggers:'idle_cash_high, salary_increase, monthly_savings_consistent' },
      { id:'prod_etf_growth', name:'ETF Growth Portfolio', type:'investment', cat:'Investments', channel:'app', priority:'high', stage:'growth',
        desc:'High-return investment strategy targeting capital appreciation through growth-oriented ETFs.',
        target:'Experienced investors', eligibility:'Income > 5,000, investment experience > 1 year',
        suitability:'High idle cash, high income, investment gap detected',
        triggers:'high_idle_cash, high_income, investment_gap' },
      { id:'prod_mutual_funds', name:'Mutual Funds', type:'investment', cat:'Investments', channel:'app', priority:'medium', stage:'growth',
        desc:'Actively managed funds providing diversified exposure across asset classes with professional management.',
        target:'Moderate-risk investors', eligibility:'Age >= 18, income > 3,000',
        suitability:'Moderate risk profile, some savings, stable income',
        triggers:'idle_cash_high, salary_increase, investment_gap' },
      { id:'prod_managed_portfolio', name:'Managed Portfolio', type:'investment', cat:'Investments', channel:'advisor', priority:'high', stage:'growth',
        desc:'Premium professional portfolio management service with personalized asset allocation and quarterly rebalancing.',
        target:'High-net-worth clients', eligibility:'Income > 8,000, savings > 20,000',
        suitability:'High income, substantial savings, growth-oriented',
        triggers:'high_income, high_savings, investment_gap' },
      { id:'prod_state_bonds', name:'State Bonds', type:'bond', cat:'Investments', channel:'app', priority:'medium', stage:'retention',
        desc:'Government-backed fixed-income securities offering stable, predictable returns with minimal risk.',
        target:'Conservative investors', eligibility:'Age >= 18, active account',
        suitability:'Low/moderate risk, savings available, seeking stability',
        triggers:'idle_cash_high, monthly_savings_consistent, risk_averse' },
      { id:'prod_savings_deposit', name:'Savings Deposit', type:'savings', cat:'Savings', channel:'app', priority:'high', stage:'onboarding',
        desc:'High-yield savings account with competitive interest rates and flexible access to your funds.',
        target:'All customers', eligibility:'Active account',
        suitability:'Any financial health, ideal for building emergency fund',
        triggers:'idle_cash_high, no_savings, monthly_savings_consistent' },
      { id:'prod_private_pension', name:'Private Pension', type:'retirement', cat:'Retirement', channel:'advisor', priority:'high', stage:'retention',
        desc:'Tax-advantaged retirement savings plan with employer matching and diversified fund options.',
        target:'Working professionals 30+', eligibility:'Age >= 25, stable employment',
        suitability:'Stable income, long-term planning mindset, tax optimization needed',
        triggers:'monthly_savings_consistent, age_approaching_retirement, salary_increase' },
      { id:'prod_personal_loan', name:'Personal Loan', type:'personal_loan', cat:'Lending', channel:'app', priority:'medium', stage:'growth',
        desc:'Flexible personal financing with competitive rates for debt consolidation, home improvement, or major purchases.',
        target:'Employed individuals', eligibility:'Income > 2,500, employment verified',
        suitability:'Moderate debt-to-income, good payment history',
        triggers:'debt_high, large_expense_detected, salary_increase' },
      { id:'prod_mortgage', name:'Mortgage', type:'mortgage', cat:'Lending', channel:'advisor', priority:'high', stage:'growth',
        desc:'Home purchase or refinancing with fixed or variable rates, up to 30-year terms, and competitive LTV ratios.',
        target:'Home buyers / refinancers', eligibility:'Income > 3,500, stable employment 2+ years',
        suitability:'Renter status, stable income, savings for down payment',
        triggers:'rent_as_top_expense, salary_increase, savings_milestone' },
      { id:'prod_credit_card', name:'Credit Card', type:'credit_card', cat:'Credit', channel:'app', priority:'medium', stage:'onboarding',
        desc:'Rewards-based credit card with cashback on everyday purchases, travel perks, and purchase protection.',
        target:'Active spenders', eligibility:'Age >= 18, income > 2,000',
        suitability:'Regular spending patterns, good credit history',
        triggers:'travel_spike, shopping_dominant, first_time_credit' },
      { id:'prod_life_insurance', name:'Life Insurance', type:'insurance', cat:'Insurance', channel:'email', priority:'high', stage:'retention',
        desc:'Term life coverage providing financial protection for your family with flexible coverage amounts and terms.',
        target:'Parents / breadwinners', eligibility:'Age 18-65, dependents >= 1',
        suitability:'Has dependents, is primary income earner',
        triggers:'new_dependent, salary_increase, mortgage_taken' },
      { id:'prod_travel_insurance', name:'Travel Insurance', type:'insurance', cat:'Insurance', channel:'app', priority:'low', stage:'growth',
        desc:'Comprehensive travel protection covering trip cancellation, medical emergencies, and lost luggage worldwide.',
        target:'Frequent travelers', eligibility:'Active account',
        suitability:'Travel spending pattern detected, frequent trips',
        triggers:'travel_spike, travel_booking_detected' },
    ];

    let distributionChart=null, scoreChart=null, selectedCustomerId=null;
    let analyticsCharts = {};
    let profileCache = {};
    let lastOffersResponse = null;
    let excludedProductsVisible = false;

    // ===== NAVIGATION =====
    function navigateTo(section) {
      document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
      const target = document.getElementById(`page-${section}`);
      if (!target) return;
      target.classList.remove('hidden');
      document.querySelectorAll('.sidebar-link[data-section]').forEach(l => l.classList.remove('active'));
      const link = document.querySelector(`.sidebar-link[data-section="${section}"]`);
      if (link) link.classList.add('active');
      const titleKeys = { dashboard:['dashboard.title','dashboard.subtitle'], products:['products.title','products.subtitle'], customers:['customers.title','customers.subtitle'], analytics:['analytics.title','analytics.subtitle'], compliance:['compliance.title','compliance.subtitle'] };
      const keys = titleKeys[section] || titleKeys.dashboard;
      const pageTitle = document.getElementById('pageTitle');
      const pageSubtitle = document.getElementById('pageSubtitle');
      pageTitle.textContent = t(keys[0]);
      pageTitle.setAttribute('data-i18n', keys[0]);
      pageSubtitle.textContent = t(keys[1]);
      pageSubtitle.setAttribute('data-i18n', keys[1]);
      if (section === 'products') renderProductsPage();
      if (section === 'customers') renderCustomersPage();
      if (section === 'analytics') renderAnalyticsPage();
      if (section === 'compliance') renderCompliancePage();
    }

    // ===== PRODUCT DETAIL SLIDEOUT =====
    function openProductDetail(productId) {
      const p = PRODUCTS.find(x => x.id === productId);
      if (!p) return;
      const c = COLORS[p.type];
      document.getElementById('productDetailContent').innerHTML = `
        <button onclick="closeProductDetail()" class="absolute top-6 right-6 transition" style="color: var(--text-muted);"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        <div class="w-14 h-14 rounded-none ${c.bg} ${c.text} flex items-center justify-center mb-5">${ICONS[p.type]}</div>
        <h2 class="text-2xl font-bold mb-1" style="color: var(--text-primary);">${p.name}</h2>
        <div class="flex items-center gap-2 mb-5">
          <span class="px-2.5 py-1 rounded text-[11px] font-medium ${c.bg} ${c.text}">${p.cat}</span>
          <span class="px-2.5 py-1 rounded text-[11px] font-medium" style="background: var(--bg-sunken); color: var(--text-secondary);">${p.priority} priority</span>
          <span class="px-2.5 py-1 rounded text-[11px] font-medium" style="background: var(--bg-sunken); color: var(--text-secondary);">${p.channel}</span>
        </div>
        <p class="text-sm leading-relaxed mb-8" style="color: var(--text-secondary);">${p.desc}</p>
        <div class="space-y-5">
          <div><p class="text-[10px] uppercase tracking-wider mb-1.5" style="color: var(--text-muted);">Target Customer</p><p class="text-sm" style="color: var(--text-primary);">${p.target}</p></div>
          <div><p class="text-[10px] uppercase tracking-wider mb-1.5" style="color: var(--text-muted);">Eligibility Criteria</p><p class="text-sm" style="color: var(--text-primary);">${p.eligibility}</p></div>
          <div><p class="text-[10px] uppercase tracking-wider mb-1.5" style="color: var(--text-muted);">Suitability Criteria</p><p class="text-sm" style="color: var(--text-primary);">${p.suitability}</p></div>
          <div><p class="text-[10px] uppercase tracking-wider mb-1.5" style="color: var(--text-muted);">Lifecycle Stage</p><p class="text-sm capitalize" style="color: var(--text-primary);">${p.stage}</p></div>
          <div><p class="text-[10px] uppercase tracking-wider mb-1.5" style="color: var(--text-muted);">Trigger Signals</p><div class="flex flex-wrap gap-1.5">${p.triggers.split(', ').map(t=>`<span class="px-2 py-0.5 rounded text-[11px]" style="background: var(--bg-sunken); color: var(--text-secondary);">${t}</span>`).join('')}</div></div>
        </div>
        <div id="detailEligibility" class="mt-6 p-4 rounded-none border" style="background: var(--bg-sunken); border-color: var(--border);"></div>
        <div class="mt-6 pt-6" style="border-top: 1px solid var(--border);"><p class="text-xs mb-3" style="color: var(--text-muted);">Try this product for a customer:</p><div class="flex gap-2"><input type="number" id="detailCustId" min="1" max="50" value="1" class="border rounded px-3 py-2 text-sm w-24 focus:outline-none" style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"/><button onclick="tryProductForCustomer('${p.id}')" class="bg-accent-blue hover:bg-accent-blue/90 text-ink-inverse text-sm font-medium px-4 py-2 rounded transition">View Offers</button></div></div>`;
      // Render eligibility in detail panel
      if (eligibilityData && eligibilityData.products[productId]) {
        const d = eligibilityData.products[productId];
        const pct = d.total > 0 ? Math.round((d.eligible / d.total) * 100) : 0;
        const barColor = pct >= 70 ? '#2D7D46' : pct >= 40 ? '#D4A843' : '#C1403D';
        document.getElementById('detailEligibility').innerHTML = `
          <p class="text-xs font-medium uppercase tracking-wider mb-3" style="color: var(--text-muted);">Real-Time Client Eligibility</p>
          <div class="flex items-center gap-4 mb-3">
            <div class="text-3xl font-bold" style="color:${barColor}">${pct}%</div>
            <div class="flex-1">
              <div class="w-full h-1 rounded-sm" style="background: var(--bg-sunken);">
                <div class="h-1 rounded-sm transition-all duration-700" style="width:${pct}%;background:${barColor}"></div>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <div class="text-center p-2 rounded-none border" style="background: var(--bg-raised); border-color: var(--border);">
              <div class="text-lg font-bold text-accent-green">${d.eligible}</div>
              <div class="text-[10px]" style="color: var(--text-muted);">Eligible</div>
            </div>
            <div class="text-center p-2 rounded-none border" style="background: var(--bg-raised); border-color: var(--border);">
              <div class="text-lg font-bold text-accent-red">${d.ineligible}</div>
              <div class="text-[10px]" style="color: var(--text-muted);">Excluded</div>
            </div>
            <div class="text-center p-2 rounded-none border" style="background: var(--bg-raised); border-color: var(--border);">
              <div class="text-lg font-bold" style="color: var(--text-secondary);">${d.total}</div>
              <div class="text-[10px]" style="color: var(--text-muted);">Total</div>
            </div>
          </div>`;
      }
      const overlay = document.getElementById('productSlideout');
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => document.getElementById('slideoutPanel').classList.add('open'));
    }
    function closeProductDetail() {
      document.getElementById('slideoutPanel').classList.remove('open');
      setTimeout(() => document.getElementById('productSlideout').classList.add('hidden'), 300);
    }
    function tryProductForCustomer(pid) {
      const cid = parseInt(document.getElementById('detailCustId').value);
      if (cid >= 1 && cid <= 50) { closeProductDetail(); navigateTo('dashboard'); selectCustomer(cid); }
    }

    // ===== AUDIT DETAIL SLIDEOUT =====
    function openAuditDetail(recommendationId) {
      const overlay = document.getElementById('auditSlideout');
      const content = document.getElementById('auditDetailContent');
      content.innerHTML = '<div class="flex items-center justify-center py-16"><div class="w-6 h-6 border-2 border-accent-blue/30 border-t-accent-blue rounded-full animate-spin"></div></div>';
      overlay.classList.remove('hidden');
      requestAnimationFrame(() => document.getElementById('auditSlideoutPanel').classList.add('open'));

      fetch(`${API}/compliance/audit/${recommendationId}`)
        .then(r => { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
        .then(data => {
          const ts = data.timestamp ? new Date(data.timestamp).toLocaleString() : '--';
          const offersHtml = (data.offers || []).map((o, i) => {
            const c = COLORS[o.product_type] || COLORS.investment;
            return `<div class="flex items-center gap-3 py-2 px-3 rounded-none mb-1.5" style="background: var(--bg-sunken);">
              <div class="w-8 h-8 rounded-none ${c.bg} ${c.text} flex items-center justify-center flex-shrink-0">${ICONS[o.product_type] || ''}</div>
              <div class="flex-1"><p class="text-xs font-medium" style="color: var(--text-primary);">${tProductName(o.product_name)}</p><p class="text-[10px]" style="color: var(--text-muted);">${(o.relevance_score * 100).toFixed(0)}% ${t('portal.relevance_label')}</p></div>
              <span class="text-[10px] px-2 py-0.5 rounded ${c.bg} ${c.text}">#${i + 1}</span>
            </div>`;
          }).join('');

          const excludedHtml = (data.excluded_products || []).map(ep => {
            return `<div class="flex items-center gap-3 py-2 px-3 rounded-none bg-accent-red/5 border border-accent-red/10 mb-1.5">
              <svg class="w-4 h-4 text-accent-red flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
              <div class="flex-1"><p class="text-xs font-medium" style="color: var(--text-secondary);">${tProductName(ep.product_name || ep.product_id || 'Unknown')}</p><p class="text-[10px] text-accent-red/80">${ep.reason || 'Suitability check failed'}</p></div>
            </div>`;
          }).join('') || '<p class="text-xs" style="color: var(--text-muted);">No excluded products</p>';

          const suitabilityEntries = Array.isArray(data.suitability_checks)
            ? data.suitability_checks
            : Object.entries(data.suitability_checks || {}).map(([pid, sc]) => ({ product_id: pid, ...sc }));
          const suitabilityHtml = suitabilityEntries.map(sc => {
            const passed = sc.suitable !== undefined ? sc.suitable : (sc.passed || sc.status === 'passed');
            return `<div class="flex items-center gap-2 py-1.5">
              <span class="w-5 h-5 rounded-full flex items-center justify-center ${passed ? 'bg-accent-green/10' : 'bg-accent-red/10'}">
                ${passed
                  ? '<svg class="w-3 h-3 text-accent-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>'
                  : '<svg class="w-3 h-3 text-accent-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>'
                }
              </span>
              <span class="text-xs ${passed ? '' : 'text-accent-red/80'}" style="${passed ? 'color: var(--text-secondary);' : ''}">${sc.product_name || sc.product_id || 'Product'}: ${sc.reason || (passed ? 'Passed' : 'Failed')}</span>
            </div>`;
          }).join('') || '<p class="text-xs" style="color: var(--text-muted);">No suitability check data available</p>';

          const inputFeaturesHtml = data.input_features
            ? Object.entries(data.input_features).map(([k, v]) => `<div class="flex justify-between py-1" style="border-bottom: 1px solid var(--border);"><span class="text-[10px]" style="color: var(--text-muted);">${k}</span><span class="text-[10px]" style="color: var(--text-secondary);">${typeof v === 'object' ? JSON.stringify(v) : v}</span></div>`).join('')
            : '<p class="text-xs" style="color: var(--text-muted);">No input features data</p>';

          const profileHtml = data.profile_result
            ? Object.entries(data.profile_result).map(([k, v]) => `<div class="flex justify-between py-1" style="border-bottom: 1px solid var(--border);"><span class="text-[10px]" style="color: var(--text-muted);">${k}</span><span class="text-[10px]" style="color: var(--text-secondary);">${Array.isArray(v) ? v.join(', ') : (typeof v === 'object' ? JSON.stringify(v) : v)}</span></div>`).join('')
            : '<p class="text-xs" style="color: var(--text-muted);">No profile data</p>';

          const consentHtml = data.consent_snapshot
            ? Object.entries(data.consent_snapshot).map(([k, v]) => `<div class="flex justify-between py-1" style="border-bottom: 1px solid var(--border);"><span class="text-[10px]" style="color: var(--text-muted);">${k}</span><span class="text-[10px] ${v === true ? 'text-accent-green' : v === false ? 'text-accent-red' : ''}" style="${v !== true && v !== false ? 'color: var(--text-secondary);' : ''}">${v}</span></div>`).join('')
            : '<p class="text-xs" style="color: var(--text-muted);">No consent snapshot</p>';

          content.innerHTML = `
            <button onclick="closeAuditDetail()" class="absolute top-6 right-6 transition" style="color: var(--text-muted);"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            <div class="flex items-center gap-3 mb-6">
              <div>
                <h2 class="text-lg font-bold" style="color: var(--text-primary);">Audit Detail</h2>
                <p class="text-xs font-mono" style="color: var(--text-muted);">${recommendationId}</p>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6">
              <div class="rounded-none p-3" style="background: var(--bg-sunken);"><p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);">Customer ID</p><p class="text-sm font-medium" style="color: var(--text-primary);">${data.customer_id || '--'}</p></div>
              <div class="rounded-none p-3" style="background: var(--bg-sunken);"><p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);">Timestamp</p><p class="text-sm font-medium" style="color: var(--text-primary);">${ts}</p></div>
              <div class="rounded-none p-3" style="background: var(--bg-sunken);"><p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);">Model Version</p><p class="text-sm font-medium font-mono" style="color: var(--text-primary);">${data.model_version || '--'}</p></div>
              <div class="rounded-none p-3" style="background: var(--bg-sunken);"><p class="text-[10px] uppercase tracking-wider mb-1" style="color: var(--text-muted);">Consent Valid</p><p class="text-sm font-medium ${data.consent_valid ? 'text-accent-green' : 'text-accent-red'}">${data.consent_valid ? 'Yes' : 'No'}</p></div>
            </div>

            <div class="space-y-5">
              <div>
                <p class="text-xs font-medium uppercase tracking-wider mb-2" style="color: var(--text-muted);">Input Features</p>
                <div class="rounded-none p-3 max-h-40 overflow-y-auto" style="background: var(--bg-sunken);">${inputFeaturesHtml}</div>
              </div>
              <div>
                <p class="text-xs font-medium uppercase tracking-wider mb-2" style="color: var(--text-muted);">Profile Result</p>
                <div class="rounded-none p-3 max-h-40 overflow-y-auto" style="background: var(--bg-sunken);">${profileHtml}</div>
              </div>
              <div>
                <p class="text-xs font-medium uppercase tracking-wider mb-2" style="color: var(--text-muted);">Suitability Checks</p>
                <div class="rounded-none p-3 max-h-48 overflow-y-auto" style="background: var(--bg-sunken);">${suitabilityHtml}</div>
              </div>
              <div>
                <p class="text-xs font-medium uppercase tracking-wider mb-2" style="color: var(--text-muted);">Scored Products (${(data.offers || []).length} offers)</p>
                <div class="max-h-48 overflow-y-auto">${offersHtml || '<p class="text-xs" style="color: var(--text-muted);">No offers</p>'}</div>
              </div>
              <div>
                <p class="text-xs font-medium uppercase tracking-wider mb-2" style="color: var(--text-muted);">Excluded Products (${(data.excluded_products || []).length})</p>
                <div class="max-h-40 overflow-y-auto">${excludedHtml}</div>
              </div>
              <div>
                <p class="text-xs font-medium uppercase tracking-wider mb-2" style="color: var(--text-muted);">Consent Snapshot</p>
                <div class="rounded-none p-3" style="background: var(--bg-sunken);">${consentHtml}</div>
              </div>
            </div>`;
        })
        .catch(err => {
          content.innerHTML = `
            <button onclick="closeAuditDetail()" class="absolute top-6 right-6 transition" style="color: var(--text-muted);"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            <div class="flex flex-col items-center justify-center py-16" style="color: var(--text-muted);">
              <svg class="w-12 h-12 mb-3 text-accent-red/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
              <p class="text-sm">Failed to load audit detail</p>
              <p class="text-xs mt-1" style="color: var(--text-muted);">${err.message}</p>
            </div>`;
        });
