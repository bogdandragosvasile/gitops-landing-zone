apiVersion: v1
kind: ConfigMap
metadata:
  name: bankoffer-index-html-override
  namespace: bankoffer
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankOffer AI - Smart Banking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Satoshi', 'system-ui', 'sans-serif'] },
          colors: {
            surface: { DEFAULT:'#FAFAF8', raised:'#FFFFFF', sunken:'#F2F0EB' },
            ink: { DEFAULT:'#1A1A1A', secondary:'#6B6B6B', muted:'#999999', inverse:'#FFFFFF' },
            border: { DEFAULT:'#E8E6E1', strong:'#D1CFC9', focus:'#2D5F9A' },
            accent: { blue:'#2D5F9A', red:'#C1403D', yellow:'#D4A843', green:'#2D7D46' },
          }
        }
      }
    }
    </script>
    <style>
      :root {
        --bg: #FAFAF8;
        --bg-raised: #FFFFFF;
        --bg-sunken: #F2F0EB;
        --border: #E8E6E1;
        --border-strong: #D1CFC9;
        --text-primary: #1A1A1A;
        --text-secondary: #6B6B6B;
        --text-muted: #999999;
        --accent: #2D5F9A;
        --accent-red: #C1403D;
        --accent-yellow: #D4A843;
        --accent-green: #2D7D46;
        --focus-ring: rgba(45,95,154,0.4);
      }
      [data-theme="dark"] {
        --bg: #1A1A1A;
        --bg-raised: #242424;
        --bg-sunken: #141414;
        --border: #333333;
        --border-strong: #444444;
        --text-primary: #E8E6E1;
        --text-secondary: #999999;
        --text-muted: #6B6B6B;
        --accent: #5B8EC9;
        --accent-red: #D4645F;
        --accent-yellow: #E0BD6A;
        --accent-green: #4A9D64;
        --focus-ring: rgba(91,142,201,0.4);
      }
      * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
      body { background: var(--bg); color: var(--text-primary); }
      .sidebar-link { transition: all 0.2s; }
      .sidebar-link:hover, .sidebar-link.active { background: var(--bg-sunken); color: var(--accent); }
      .sidebar-link.active { background: var(--bg-sunken); color: var(--accent); font-weight: 500; }
      .offer-card { transition: all 0.2s ease; }
      .score-bar { background: var(--accent); border-radius: 2px; height: 4px; transition: width 0.8s ease; }
      .score-bar-bg { background: var(--bg-sunken); border-radius: 2px; height: 4px; }
      .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
      @keyframes fadeIn { to { opacity: 1; } }
      .pulse-dot { animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      .customer-btn { transition: all 0.15s; }
      .customer-btn:hover { background: var(--bg-sunken); }
      .customer-btn.active { background: var(--bg-sunken); border-color: var(--accent); }
      .product-item { cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
      .product-item:hover { background: var(--bg-sunken); border-color: var(--border); }
      .slideout { transform: translateX(100%); transition: transform 0.3s ease; }
      .slideout.open { transform: translateX(0); }
      .table-row { transition: background 0.15s; }
      .table-row:hover { background: var(--bg-sunken); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
      .excluded-card { background: var(--bg-raised); border: 1px solid var(--border); }
      .collapsible-header { cursor: pointer; user-select: none; }
      .collapsible-header .chevron { transition: transform 0.2s; }
      .collapsible-header.open .chevron { transform: rotate(180deg); }
      .compliance-tab { transition: all 0.15s; }
      .compliance-tab:hover { background: var(--bg-sunken); }
      .compliance-tab.active { background: var(--bg-sunken); border-color: var(--accent); color: var(--accent); }
      .override-form { animation: fadeIn 0.2s ease forwards; }
      .kill-switch-banner { background: var(--bg-sunken); border-bottom: 1px solid var(--border); }
      a:focus-visible, button:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
      @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
    </head>
    <body class="font-sans min-h-screen flex" style="color: var(--text-primary);">

    <!-- Auth + Theme + i18n scripts -->
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/keycloak-js@26.2.0/dist/keycloak.min.js"></script>
    <script src="/static/js/auth.js"></script>

    <!-- Auth gate — Staff login screen -->
    <div id="auth-gate" class="fixed inset-0 z-[100] flex items-center justify-center p-4 overflow-y-auto" style="background: var(--bg);">
      <div class="max-w-md w-full">
        <div class="text-center mb-8 fade-in">
          <div class="text-xs font-medium uppercase tracking-widest mb-6" style="color: var(--text-muted); letter-spacing: 0.2em;">BankOffer</div>
          <h1 class="text-2xl font-semibold mb-1" style="color: var(--text-primary); letter-spacing: -0.02em;">Employee Portal</h1>
        </div>
        <div class="fixed top-4 right-4 z-[110] flex items-center gap-2">
          <div id="auth-lang-selector-emp"></div>
          <div id="auth-theme-toggle-emp"></div>
        </div>
        <div class="bg-white border border-border rounded-none p-6 fade-in" style="animation-delay:0.1s; background: var(--bg-raised);">
          <h2 class="text-xl font-medium mb-1" style="color: var(--text-primary);" data-i18n="sauth.login_title_employee">Employee Portal</h2>
          <p class="text-sm mb-5" style="color: var(--text-secondary);" data-i18n="sauth.login_subtitle_employee">Sign in with your employee credentials</p>
          <div id="staff-login-error" class="hidden mb-4 p-3 rounded bg-accent-red/10 border border-accent-red/30 text-accent-red text-sm"></div>
          <!-- SSO Button -->
          <button onclick="ssoLogin()" id="sso-login-btn"
            class="w-full py-2.5 bg-accent-blue hover:bg-accent-blue/90 text-ink-inverse rounded font-medium text-sm transition-colors flex items-center justify-center gap-2 mb-4">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <span data-i18n="sauth.sso_login">Sign in with SSO (Keycloak)</span>
          </button>
          <!-- Divider -->
          <div class="flex items-center gap-3 mb-4">
            <div class="flex-1 h-px" style="background: var(--border);"></div>
            <span class="text-xs uppercase" style="color: var(--text-muted);">or</span>
            <div class="flex-1 h-px" style="background: var(--border);"></div>
          </div>
          <!-- Email/Password form -->
          <div class="space-y-4">
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="sauth.email">Email address</label>
              <input type="email" id="staff-login-email" autocomplete="email"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="manager@bankofferai.com">
            </div>
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="sauth.password">Password</label>
              <input type="password" id="staff-login-password" autocomplete="current-password"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="********">
            </div>
            <button onclick="handleStaffLogin()" id="staff-login-btn"
              class="w-full py-2.5 border rounded font-medium text-sm transition-colors" style="border-color: var(--border); color: var(--text-primary);">
              <span data-i18n="sauth.login_btn">Sign In</span>
            </button>
          </div>
          <details class="mt-5 pt-5" style="border-top: 1px solid var(--border);">
            <summary class="text-xs font-medium cursor-pointer select-none" style="color: var(--text-muted);">Demo credentials</summary>
            <div class="mt-3">
              <div class="space-y-1.5">
                <button onclick="fillStaffDemo('manager@bankofferai.com','Employee1234!')" class="w-full text-left px-3 py-2 rounded transition-colors group" style="background: var(--bg-sunken);">
                  <span class="text-xs" style="color: var(--text-secondary);">manager@bankofferai.com</span>
                  <span class="text-xs ml-2" style="color: var(--text-muted);">/ Employee1234!</span>
                  <span class="text-[10px] ml-1 px-1.5 py-0.5 rounded bg-accent-blue/10 text-accent-blue">Employee</span>
                </button>
              </div>
            </div>
          </details>
        </div>
        <div class="text-center mt-6">
          <span class="text-xs" style="color: var(--text-muted);">
            <a href="http://bankoffer.local/portal" class="hover:underline" style="color: var(--text-secondary);">Customer Portal</a>
            <span style="margin: 0 8px; color: var(--border-strong);">&middot;</span>
            <a href="/admin" class="hover:underline" style="color: var(--text-secondary);">Admin</a>
          </span>
        </div>
      </div>
    </div>

    <!-- Mobile menu button -->
    <button onclick="document.getElementById('emp-sidebar').classList.toggle('hidden');document.getElementById('emp-sidebar').classList.toggle('flex')" class="fixed top-4 left-4 z-[60] md:hidden w-10 h-10 rounded border flex items-center justify-center" style="background: var(--bg-raised); border-color: var(--border); color: var(--text-secondary);" id="emp-hamburger">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <!-- Sidebar -->
    <aside id="emp-sidebar" class="w-[72px] hover:w-[240px] transition-all duration-300 flex-col items-center py-6 fixed h-full z-50 overflow-hidden group hidden md:flex" style="background: var(--bg-raised); border-right: 1px solid var(--border);">
      <div class="flex items-center gap-3 mb-10 px-4 w-full cursor-pointer" onclick="navigateTo('dashboard')">
        <div class="w-10 h-10 rounded-none bg-accent-blue flex items-center justify-center flex-shrink-0">
          <svg class="w-6 h-6 text-ink-inverse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <span class="text-lg font-bold whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity" style="color: var(--text-primary);">BankOffer</span>
      </div>
      <nav class="flex flex-col w-full gap-1 px-3 flex-1">
        <a href="#" onclick="navigateTo('dashboard');return false" class="sidebar-link active flex items-center gap-3 px-3 py-3 rounded text-ink-secondary" data-section="dashboard">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zm0 7a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1h-4a1 1 0 01-1-1v-5zM4 13a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1v-2z"/></svg>
          <span class="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium" data-i18n="nav.dashboard">Dashboard</span>
        </a>
        <a href="#" onclick="navigateTo('products');return false" class="sidebar-link flex items-center gap-3 px-3 py-3 rounded text-ink-secondary" data-section="products">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          <span class="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium" data-i18n="nav.products">Products</span>
        </a>
        <a href="#" onclick="navigateTo('customers');return false" class="sidebar-link flex items-center gap-3 px-3 py-3 rounded text-ink-secondary" data-section="customers">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium" data-i18n="nav.customers">Customers</span>
        </a>
        <a href="#" onclick="navigateTo('analytics');return false" class="sidebar-link flex items-center gap-3 px-3 py-3 rounded text-ink-secondary" data-section="analytics">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          <span class="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium" data-i18n="nav.analytics">Analytics</span>
        </a>
        <a href="#" onclick="navigateTo('compliance');return false" class="sidebar-link flex items-center gap-3 px-3 py-3 rounded text-ink-secondary" data-section="compliance">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <span class="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium" data-i18n="nav.compliance">Compliance</span>
        </a>
        <a href="/docs" target="_blank" class="sidebar-link flex items-center gap-3 px-3 py-3 rounded text-ink-secondary">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
          <span class="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium" data-i18n="nav.api_docs">API Docs</span>
        </a>
      </nav>
      <div class="px-3 w-full mt-auto">
        <div class="flex items-center gap-3 px-3 py-3">
          <div class="w-2 h-2 rounded-full bg-accent-green pulse-dot flex-shrink-0"></div>
          <span class="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity text-xs" style="color: var(--text-muted);">v2.9</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-0 md:ml-[72px] flex-1 min-h-screen">
      <!-- Kill-switch banner (AI Act human oversight) -->
      <div id="killSwitchBanner" class="kill-switch-banner hidden sticky top-0 z-50 px-8 py-3 flex items-center justify-center gap-3">
        <svg class="w-5 h-5 text-accent-red animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        <span class="text-sm font-bold text-accent-red tracking-wide" data-i18n="compliance.model_suspended">MODEL SUSPENDED</span>
        <span class="text-xs text-accent-red/70" id="killSwitchReason"></span>
      </div>
      <!-- Top Bar -->
      <header class="sticky top-0 z-40 px-4 md:px-8 py-3 md:py-4 flex items-center justify-between" style="background: var(--bg-raised); border-bottom: 1px solid var(--border);">
        <div>
          <h1 class="text-xl font-medium" style="color: var(--text-primary);" id="pageTitle" data-i18n="dashboard.title">Dashboard</h1>
          <p class="text-xs mt-0.5" style="color: var(--text-muted);" id="pageSubtitle" data-i18n="dashboard.subtitle">Offer management &amp; customer analytics</p>
        </div>
        <div class="flex items-center gap-4">
          <a href="http://bankoffer.local/portal" target="_blank" rel="noopener" class="text-xs text-accent-blue hover:underline transition flex items-center gap-1"><span data-i18n="nav.customer_portal">Customer Portal</span> <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>
          <a href="/admin" class="text-xs transition flex items-center gap-1" style="color: var(--text-secondary);"><span data-i18n="nav.admin">Admin</span> <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></a>
          <div class="relative" id="notifBellWrapper">
            <button onclick="toggleNotifications()" class="relative p-2 rounded hover:bg-surface-sunken transition-colors" title="Notifications">
              <svg class="w-5 h-5" style="color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
              <span id="notifBadge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-accent-red text-ink-inverse text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
            </button>
            <div id="notifDropdown" class="hidden absolute right-0 top-12 w-96 max-h-[500px] overflow-y-auto rounded-none border z-[100] p-0" style="background: var(--bg-raised); border-color: var(--border);">
              <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--border);">
                <h3 class="text-sm font-medium" style="color: var(--text-primary);">Notifications</h3>
                <button onclick="markAllNotificationsRead()" class="text-xs text-accent-blue hover:underline transition">Mark all read</button>
              </div>
              <div id="notifList" class="divide-y" style="--tw-divide-opacity: 1; border-color: var(--border);">
                <div class="px-4 py-8 text-center text-sm" style="color: var(--text-muted);">No notifications</div>
              </div>
            </div>
          </div>
          <div class="relative">
            <input type="text" id="searchInput" placeholder="Search customer ID..." data-i18n-placeholder="dashboard.search_customer" class="border rounded pl-10 pr-4 py-2.5 text-sm focus:outline-none w-40 md:w-56 transition-all focus:w-48 md:focus:w-72" style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"/>
            <svg class="w-4 h-4 absolute left-3.5 top-3" style="color: var(--text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
          <div id="lang-selector-emp"></div>
          <div id="theme-toggle-emp"></div>
          <div id="user-badge-emp"></div>
          <div id="killSwitchIndicator" class="hidden flex items-center gap-1.5 px-2.5 py-1 rounded bg-accent-red/10 border border-accent-red/20"><div class="w-2 h-2 rounded-full bg-accent-red pulse-dot"></div><span class="text-[10px] font-medium text-accent-red" data-i18n="compliance.model_suspended_short">SUSPENDED</span></div>
          <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-accent-green pulse-dot" id="systemStatusDot"></div><span class="text-xs" style="color: var(--text-muted);" id="systemStatusText" data-i18n="common.online">System Online</span></div>
        </div>
      </header>

      <!-- ==================== DASHBOARD SECTION ==================== -->
      <section id="page-dashboard" class="p-4 md:p-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
          <div class="border-b border-border pb-4 fade-in" style="animation-delay:0.1s;">
            <span class="text-[11px] font-medium uppercase tracking-wider block mb-2" style="color: var(--text-muted);" data-i18n="dashboard.total_customers">Total Customers</span>
            <p class="text-3xl font-bold" style="color: var(--text-primary); font-feature-settings: 'tnum';" id="statCustomers">50</p>
