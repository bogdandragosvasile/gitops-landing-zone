    // ===== CHARTS =====
    function initDistributionChart() {
      distributionChart = new Chart(document.getElementById('distributionChart'),{type:'doughnut',data:{labels:['Investment','Savings','Insurance','Lending','Credit'],datasets:[{data:[4,1,2,2,1],backgroundColor:['#2D5F9A','#2D7D46','#2D7D46','#2D5F9A','#C1403D'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false}}}});
      updateChartLegend(['Investment','Savings','Insurance','Lending','Credit'],[4,1,2,2,1],['#2D5F9A','#2D7D46','#2D7D46','#2D5F9A','#C1403D']);
    }
    function updateDistributionChart(offers) {
      const tc={}; offers.forEach(o=>{tc[o.product_type]=(tc[o.product_type]||0)+1;});
      const l=Object.keys(tc),d=Object.values(tc),c=l.map(x=>(COLORS[x]||{}).bar||'#2D5F9A');
      distributionChart.data.labels=l; distributionChart.data.datasets[0].data=d; distributionChart.data.datasets[0].backgroundColor=c; distributionChart.update(); updateChartLegend(l,d,c);
    }
    function updateChartLegend(labels,data,colors) {
      document.getElementById('chartLegend').innerHTML=labels.map((l,i)=>`<div class="flex items-center justify-between"><div class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full" style="background:${colors[i]}"></div><span class="text-xs capitalize" style="color: var(--text-secondary);">${l.replace(/_/g,' ')}</span></div><span class="text-xs font-medium" style="color: var(--text-primary);">${data[i]}</span></div>`).join('');
    }
    function initScoreChart() {
      scoreChart = new Chart(document.getElementById('scoreChart'),{type:'bar',data:{labels:[],datasets:[{label:'Relevance',data:[],backgroundColor:'rgba(45,95,154,0.6)',borderRadius:0,barThickness:14},{label:'Confidence',data:[],backgroundColor:'rgba(45,95,154,0.2)',borderRadius:0,barThickness:14}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{max:1,grid:{color:'#E8E6E1'},ticks:{color:'#6B6B6B',font:{size:10},callback:v=>(v*100)+'%'}},y:{grid:{display:false},ticks:{color:'#6B6B6B',font:{size:10}}}},plugins:{legend:{display:true,position:'top',labels:{color:'#6B6B6B',font:{size:10},boxWidth:10,padding:15}}}}});
    }
    function updateScoreChart(offers) {
      const t=offers.slice(0,5);
      scoreChart.data.labels=t.map(o=>o.product_name.length>14?o.product_name.slice(0,14)+'...':o.product_name);
      scoreChart.data.datasets[0].data=t.map(o=>o.relevance_score); scoreChart.data.datasets[1].data=t.map(o=>o.confidence_score); scoreChart.update();
    }

    // ===== SEARCH =====
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key==='Enter') { const v=parseInt(e.target.value); if(v>=1&&v<=50){navigateTo('dashboard');selectCustomer(v);} }
    });

    // ===== STAFF AUTH =====
    const STAFF_SESSION_KEY = 'boai_staff_session_employee';
    let _ssoAuthenticated = false;

    function saveStaffSession(data) {
      localStorage.setItem(STAFF_SESSION_KEY, JSON.stringify({ ...data, ts: Date.now() }));
    }

    function getStaffSession() {
      try {
        const raw = localStorage.getItem(STAFF_SESSION_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (Date.now() - data.ts > 8 * 60 * 60 * 1000) {
          localStorage.removeItem(STAFF_SESSION_KEY);
          return null;
        }
        return data;
      } catch (e) { return null; }
    }

    function clearStaffSession() {
      localStorage.removeItem(STAFF_SESSION_KEY);
    }

    function fillStaffDemo(email, pwd) {
      document.getElementById('staff-login-email').value = email;
      document.getElementById('staff-login-password').value = pwd;
    }

    // SSO login via Keycloak
    function ssoLogin() {
      if (window.BOAI_AUTH) {
        window.BOAI_AUTH.keycloakLogin();
      }
    }

    // Email/password login
    async function handleStaffLogin() {
      const email = document.getElementById('staff-login-email').value.trim();
      const password = document.getElementById('staff-login-password').value;
      const errorEl = document.getElementById('staff-login-error');
      const btn = document.getElementById('staff-login-btn');

      if (!email || !password) {
        errorEl.textContent = t('sauth.login_error');
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';
      errorEl.classList.add('hidden');

      try {
        const resp = await fetch('/staff-auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || t('sauth.login_error'));
        }
        const data = await resp.json();
        saveStaffSession(data);

        if (data.role === 'admin') {
          window.location.href = '/admin';
        } else {
          enterStaffPortal(data);
        }
      } catch (e) {
        errorEl.textContent = e.message || t('sauth.login_error');
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="sauth.login_btn">${t('sauth.login_btn')}</span>`;
      }
    }

    function staffLogout() {
      if (_ssoAuthenticated && window.BOAI_AUTH) {
        window.BOAI_AUTH.logout();
        return;
      }
      clearStaffSession();
      window.location.reload();
    }

    function enterStaffPortal(session) {
      const gate = document.getElementById('auth-gate');
      const sidebar = document.querySelector('aside');
      const mainEl = document.querySelector('main');

      // Determine role — works for both SSO (session.roles) and email/pwd (session.role)
      const role = session.role || ((session.roles || []).includes('admin') ? 'admin' : (session.roles || []).includes('employee') ? 'employee' : '');
      const displayName = session.display_name || session.name || session.email || 'User';

      if (role !== 'employee' && role !== 'admin') {
        gate.innerHTML = `<div class="fixed inset-0 z-[100] flex items-center justify-center" style="background: var(--bg);">
          <div class="border border-border rounded-none p-8 max-w-md text-center" style="background: var(--bg-raised);">
            <h2 class="text-xl font-bold mb-2" style="color: var(--text-primary);">${t('auth.unauthorized')}</h2>
            <p class="mb-4" style="color: var(--text-secondary);">${t('sauth.wrong_role')}</p>
            <div class="flex gap-3 justify-center">
              <a href="http://bankoffer.local/portal" class="px-4 py-2 bg-accent-blue hover:bg-accent-blue/90 text-ink-inverse rounded text-sm font-medium transition">${t('sauth.go_customer')}</a>
              <button onclick="staffLogout()" class="px-4 py-2 border rounded text-sm font-medium transition hover:text-accent-red" style="border-color: var(--border); color: var(--text-secondary);">${t('sauth.logout')}</button>
            </div>
          </div>
        </div>`;
        return;
      }

      gate.style.display = 'none';
      sidebar.style.display = '';
      mainEl.style.display = '';

      const tt = document.getElementById('theme-toggle-emp');
      const ls = document.getElementById('lang-selector-emp');
      const ub = document.getElementById('user-badge-emp');
      if (tt) tt.innerHTML = window.BOAI_THEME.renderToggle();
      if (ls && window.BOAI_I18N) ls.innerHTML = window.BOAI_I18N.renderLanguageSelector();
      if (ub) {
        const roleClass = role === 'admin' ? 'bg-accent-red/20 text-accent-red' : 'bg-accent-blue/20 text-accent-blue';
        const roleName = role.charAt(0).toUpperCase() + role.slice(1);
        const ssoTag = _ssoAuthenticated ? '<span class="text-accent-blue text-[10px] ml-1">(SSO)</span>' : '';
        ub.innerHTML = `<div class="flex items-center gap-2">
          <div class="flex items-center gap-2 px-3 py-1.5 rounded border" style="border-color: var(--border);">
            <div class="w-7 h-7 rounded-none bg-accent-blue/20 flex items-center justify-center text-accent-blue text-xs font-medium">${displayName.charAt(0)}</div>
            <div class="text-xs">
              <div class="font-medium" style="color: var(--text-primary);">${displayName}${ssoTag}</div>
              <span class="px-1.5 py-0.5 rounded text-[10px] font-medium ${roleClass}">${roleName}</span>
            </div>
          </div>
          <button onclick="staffLogout()" class="p-1.5 rounded hover:bg-accent-red/10 transition-colors" style="color: var(--text-muted);" title="${t('sauth.logout')}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>`;
      }
    }

    function setupAuthGate() {
      // Render lang/theme on auth screen
      const als = document.getElementById('auth-lang-selector-emp');
      const att = document.getElementById('auth-theme-toggle-emp');
      if (als && window.BOAI_I18N) als.innerHTML = window.BOAI_I18N.renderLanguageSelector();
      if (att && window.BOAI_THEME) att.innerHTML = window.BOAI_THEME.renderToggle();

      // Check for existing email/password session
      const session = getStaffSession();
      if (session) {
        enterStaffPortal(session);
        return;
      }

      // Listen for Keycloak SSO auth
      if (window.BOAI_AUTH) {
        window.BOAI_AUTH.onAuthChange(function(user) {
          if (user && !_ssoAuthenticated) {
            const roles = user.roles || [];
            if (!roles.includes('employee') && !roles.includes('admin')) {
              // Non-staff session — clear and stay on employee login (session isolation)
              window.BOAI_AUTH.logout();
              return;
            }
            _ssoAuthenticated = true;
            enterStaffPortal(user);
          }
        });
      }

      // Enter key handlers
      const pwdEl = document.getElementById('staff-login-password');
      if (pwdEl) pwdEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleStaffLogin(); });
      const emailEl = document.getElementById('staff-login-email');
      if (emailEl) emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('staff-login-password').focus(); });
    }

    // ===== INIT =====
    async function init() {
      setupAuthGate();
      await loadCustomerIds();
      renderCustomerGrid();
      renderProductCatalogSidebar();
      initDistributionChart();
      initScoreChart();
      fetchKillSwitchStatus();
      updateNotifBadge();
      const firstId = allCustomerIds[0] || '1';
      try { const r=await _authFetch(`${API}/offers/${firstId}?top_n=5`); if(r.ok){const d=await r.json(); const avg=d.offers.reduce((a,o)=>a+o.relevance_score,0)/Math.max(d.offers.length,1); document.getElementById('statAvgScore').textContent=(avg*100).toFixed(0)+'%';} } catch(e){}
      document.getElementById('loadingOverlay').style.opacity='0';
      setTimeout(()=>document.getElementById('loadingOverlay').style.display='none',500);
    }
    init();

    // ===== WORKFLOW: Notifications + Forms =====
    let _notifOpen = false;
    let _sendFormMeta = {};

    const FORM_TEMPLATES = {
      standard: [
        { name: 'full_name', label: 'Full Legal Name', type: 'text', required: true },
        { name: 'date_of_birth', label: 'Date of Birth', type: 'date', required: true },
        { name: 'address', label: 'Residential Address', type: 'text', required: true },
        { name: 'phone', label: 'Phone Number', type: 'tel', required: true },
        { name: 'employer', label: 'Employer / Occupation', type: 'text', required: false },
        { name: 'monthly_income', label: 'Monthly Income (EUR)', type: 'number', required: true },
        { name: 'purpose', label: 'Purpose of Application', type: 'textarea', required: false },
      ],
      investment: [
        { name: 'full_name', label: 'Full Legal Name', type: 'text', required: true },
        { name: 'date_of_birth', label: 'Date of Birth', type: 'date', required: true },
        { name: 'investment_experience', label: 'Investment Experience (years)', type: 'number', required: true },
        { name: 'risk_tolerance', label: 'Risk Tolerance (1-10)', type: 'number', required: true },
        { name: 'investment_horizon', label: 'Investment Horizon', type: 'text', required: true },
        { name: 'source_of_funds', label: 'Source of Funds', type: 'text', required: true },
        { name: 'annual_income', label: 'Annual Income (EUR)', type: 'number', required: true },
        { name: 'mifid_acknowledge', label: 'I understand the risks involved', type: 'checkbox', required: true },
      ],
      loan: [
        { name: 'full_name', label: 'Full Legal Name', type: 'text', required: true },
        { name: 'date_of_birth', label: 'Date of Birth', type: 'date', required: true },
        { name: 'employer', label: 'Current Employer', type: 'text', required: true },
        { name: 'employment_duration', label: 'Employment Duration (months)', type: 'number', required: true },
        { name: 'monthly_income', label: 'Monthly Net Income (EUR)', type: 'number', required: true },
        { name: 'existing_loans', label: 'Existing Monthly Loan Payments (EUR)', type: 'number', required: false },
        { name: 'loan_amount', label: 'Requested Loan Amount (EUR)', type: 'number', required: true },
        { name: 'loan_purpose', label: 'Loan Purpose', type: 'textarea', required: true },
      ],
      insurance: [
        { name: 'full_name', label: 'Full Legal Name', type: 'text', required: true },
        { name: 'date_of_birth', label: 'Date of Birth', type: 'date', required: true },
        { name: 'beneficiary', label: 'Beneficiary Name', type: 'text', required: true },
        { name: 'coverage_amount', label: 'Desired Coverage Amount (EUR)', type: 'number', required: true },
        { name: 'health_conditions', label: 'Pre-existing Health Conditions', type: 'textarea', required: false },
        { name: 'smoking_status', label: 'Smoking Status', type: 'text', required: true },
      ],
    };

    function toggleNotifications() {
      const dd = document.getElementById('notifDropdown');
      _notifOpen = !_notifOpen;
      if (_notifOpen) {
        dd.classList.remove('hidden');
        dd.classList.add('flex', 'flex-col');
        loadNotifications();
      } else {
        dd.classList.add('hidden');
        dd.classList.remove('flex', 'flex-col');
      }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const wrapper = document.getElementById('notifBellWrapper');
      if (wrapper && !wrapper.contains(e.target) && _notifOpen) {
        toggleNotifications();
      }
    });

    async function loadNotifications() {
      try {
        const resp = await fetch(`${API}/workflow/notifications?limit=20`);
        if (!resp.ok) return;
        const notifs = await resp.json();
        const list = document.getElementById('notifList');
        if (notifs.length === 0) {
          list.innerHTML = '<div class="px-4 py-8 text-center text-sm" style="color: var(--text-muted);">No notifications yet</div>';
          return;
        }
        list.innerHTML = notifs.map(n => {
          const isAccepted = n.action === 'accepted';
          const isSubmitted = n.action === 'submitted';
          const iconColor = isAccepted ? 'text-accent-green' : isSubmitted ? 'text-accent-blue' : 'text-accent-red';
          const actionLabel = isAccepted ? 'accepted' : isSubmitted ? 'submitted form for' : 'rejected';
          const icon = isAccepted ? '&#10003;' : isSubmitted ? '&#128203;' : '&#10005;';
          const readClass = n.read ? 'opacity-60' : '';
          const ago = timeAgo(n.created_at);
          const sendBtn = isAccepted && !n.read
            ? `<button onclick="event.stopPropagation();openSendFormModal('${n.customer_id}','${escAttr(n.product_name)}','${n.offer_id}',${n.id})" class="mt-2 px-3 py-1.5 rounded bg-accent-blue/10 text-accent-blue text-xs font-medium hover:bg-accent-blue/20 transition">Send Form</button>`
            : '';
          return `<div class="px-4 py-3 transition cursor-pointer ${readClass}" style="border-bottom: 1px solid var(--border);" onclick="markNotifRead(${n.id}, this)">
            <div class="flex items-start gap-3">
              <span class="${iconColor} text-lg flex-shrink-0">${icon}</span>
              <div class="flex-1 min-w-0">
                <p class="text-sm" style="color: var(--text-primary);"><span class="font-medium">Customer ${n.customer_id}</span> ${actionLabel} <span class="font-medium">${escHtml(n.product_name)}</span></p>
                <p class="text-xs mt-0.5" style="color: var(--text-muted);">${ago}</p>
                ${sendBtn}
              </div>
              ${!n.read ? '<div class="w-2 h-2 rounded-full bg-accent-blue flex-shrink-0 mt-1.5"></div>' : ''}
            </div>
          </div>`;
        }).join('');
      } catch (err) {
        console.error('Failed to load notifications:', err);
      }
    }

    function timeAgo(dateStr) {
      const d = new Date(dateStr);
      const s = Math.floor((Date.now() - d.getTime()) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s/60) + 'm ago';
      if (s < 86400) return Math.floor(s/3600) + 'h ago';
      return Math.floor(s/86400) + 'd ago';
    }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function escAttr(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    async function updateNotifBadge() {
      try {
        const resp = await fetch(`${API}/workflow/notifications/count`);
        if (!resp.ok) return;
        const data = await resp.json();
        const badge = document.getElementById('notifBadge');
        if (data.unread > 0) {
          badge.textContent = data.unread > 99 ? '99+' : data.unread;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }
      } catch (e) {}
    }

    async function markNotifRead(id, el) {
      try {
        await fetch(`${API}/workflow/notifications/${id}/read`, { method: 'PUT' });
        if (el) el.classList.add('opacity-60');
        const dot = el?.querySelector('.bg-accent-blue');
        if (dot) dot.remove();
        updateNotifBadge();
      } catch (e) {}
    }

    async function markAllNotificationsRead() {
      try {
        await fetch(`${API}/workflow/notifications/read-all`, { method: 'PUT' });
        loadNotifications();
        updateNotifBadge();
      } catch (e) {}
    }

    // Poll for new notifications
    setInterval(updateNotifBadge, 15000);

    // ===== Send Form Modal =====
    function openSendFormModal(customerId, productName, offerId, notifId) {
      _sendFormMeta = { customerId, productName, offerId, notifId };
      document.getElementById('formModalCustomer').value = `Customer ${customerId}`;
      document.getElementById('formModalProduct').value = productName;
      updateFormPreview();
      const modal = document.getElementById('sendFormModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeSendFormModal() {
      const modal = document.getElementById('sendFormModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      _sendFormMeta = {};
    }

    function updateFormPreview() {
      const tpl = document.getElementById('formModalTemplate').value;
      const fields = FORM_TEMPLATES[tpl] || FORM_TEMPLATES.standard;
      document.getElementById('formFieldsPreview').innerHTML = fields.map(f =>
        `<div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ${f.required ? 'bg-accent-green' : ''}" style="${!f.required ? 'background: var(--border-strong);' : ''}"></span><span>${f.label}</span><span class="ml-auto" style="color: var(--text-muted);">${f.type}</span></div>`
      ).join('');
    }

    async function sendFormToCustomer() {
      const tpl = document.getElementById('formModalTemplate').value;
      const fields = FORM_TEMPLATES[tpl] || FORM_TEMPLATES.standard;
      const session = getStaffSession();
      const employeeId = session?.email || session?.name || 'employee';

      try {
        const resp = await fetch(`${API}/workflow/forms`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_id: _sendFormMeta.customerId,
            employee_id: employeeId,
            notification_id: _sendFormMeta.notifId || null,
            product_name: _sendFormMeta.productName,
            offer_id: _sendFormMeta.offerId || null,
            form_type: tpl,
            fields: fields,
          }),
        });
        if (!resp.ok) throw new Error('Failed to send');
        showNotification('Application form sent to customer ' + _sendFormMeta.customerId, 'success');
        closeSendFormModal();
        updateNotifBadge();
        loadNotifications();
      } catch (err) {
        showNotification('Failed to send form: ' + err.message, 'error');
      }
    }
    </script>
    </body>
    </html>
