                    <div id="toggle-marketing-sms" class="toggle-track off" data-consent="marketing_sms">
                      <div class="toggle-thumb"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Consent #4: Family Context -->
            <div id="consent-family-wrapper" class="bg-white border border-border rounded-none p-4 md:p-6 mb-6 transition-opacity duration-300" style="background: var(--bg-raised); border-color: var(--border);">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 sm:gap-4">
