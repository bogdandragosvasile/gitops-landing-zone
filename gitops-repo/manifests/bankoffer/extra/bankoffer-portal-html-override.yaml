                    <h4 class="text-base font-medium" style="color: var(--text-primary);" data-i18n="consent.profiling">General Financial Profiling</h4>
                  </div>
                  <p class="text-xs font-medium mb-2" style="color: var(--text-secondary);">GDPR Art. 6(1)(a)</p>
                  <p class="text-sm mb-2" style="color: var(--text-secondary);" data-i18n="consent.profiling_desc">Allow analysis of your financial data to generate personalized offers.</p>
                  <p class="text-xs" style="color: var(--text-muted);" data-i18n="portal.profiling_detail">When enabled, the system analyzes your transaction patterns, savings rate, and balance trends to find products that best match your financial situation. When disabled, you will not receive any personalized offers.</p>
                  <div class="mt-2 flex items-center gap-2">
                    <svg class="w-4 h-4 text-accent-yellow flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                    <p class="text-accent-yellow text-xs font-medium" data-i18n="consent.profiling_warning">Without this consent, no offers can be generated</p>
                  </div>
                  <p class="text-xs mt-2" style="color: var(--text-muted);" id="profiling-timestamp"></p>
                </div>
                <div class="flex-shrink-0 pt-1">
                  <div id="toggle-profiling" class="toggle-track off" data-consent="profiling">
                    <div class="toggle-thumb"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Consent #2: Automated Decisions -->
