apiVersion: v1
kind: ConfigMap
metadata:
  name: bankoffer-portal-html-override
  namespace: bankoffer
data:
  portal.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankOffer - Customer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Satoshi', 'system-ui', 'sans-serif'] },
          colors: {
            surface: { DEFAULT:'#FAFAF8', raised:'#FFFFFF', sunken:'#F2F0EB' },
            ink: { DEFAULT:'#1A1A1A', secondary:'#6B6B6B', muted:'#999999', inverse:'#FFFFFF' },
            border: { DEFAULT:'#E8E6E1', strong:'#D1CFC9', focus:'#2D5F9A' },
            accent: { blue:'#2D5F9A', red:'#C1403D', yellow:'#D4A843', green:'#2D7D46' },
          }
        }
      }
    }
    </script>
    <style>
      :root {
        --bg: #FAFAF8;
        --bg-raised: #FFFFFF;
        --bg-sunken: #F2F0EB;
        --border: #E8E6E1;
        --border-strong: #D1CFC9;
        --text-primary: #1A1A1A;
        --text-secondary: #6B6B6B;
        --text-muted: #999999;
        --accent: #2D5F9A;
        --accent-red: #C1403D;
        --accent-yellow: #D4A843;
        --accent-green: #2D7D46;
        --focus-ring: rgba(45,95,154,0.4);
      }
      [data-theme="dark"] {
        --bg: #1A1A1A;
        --bg-raised: #242424;
        --bg-sunken: #141414;
        --border: #333333;
        --border-strong: #444444;
        --text-primary: #E8E6E1;
        --text-secondary: #999999;
        --text-muted: #6B6B6B;
        --accent: #5B8EC9;
        --accent-red: #D4645F;
        --accent-yellow: #E0BD6A;
        --accent-green: #4A9D64;
        --focus-ring: rgba(91,142,201,0.4);
      }
      * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
      body { background: var(--bg); color: var(--text-primary); }
      .offer-card { transition: border-color 0.2s ease; }
      .offer-card:hover { border-color: var(--border-strong); }
      .score-bar { background: var(--accent); border-radius: 2px; height: 4px; transition: width 0.8s ease; }
      .score-bar-bg { background: var(--bg-sunken); border-radius: 2px; height: 4px; }
      .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
      @keyframes fadeIn { to { opacity: 1; } }
      .pulse-dot { animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      .customer-btn { transition: all 0.15s; }
      .customer-btn:hover { background: rgba(45,95,154,0.08); border-color: var(--accent); }
      .customer-btn.selected { background: rgba(45,95,154,0.1); border-color: var(--accent); }
      .nav-link { transition: all 0.2s; }
      .nav-link:hover { color: var(--accent); background: rgba(45,95,154,0.05); }
      .nav-link.active { color: var(--accent); background: rgba(45,95,154,0.05); border-bottom: 2px solid var(--accent); }
      .toggle-track { width: 44px; height: 24px; border-radius: 12px; transition: background 0.3s; cursor: pointer; position: relative; display: block; }
      .toggle-track.on { background: var(--accent) !important; }
      .toggle-track.off { background: var(--border-strong) !important; }
      .toggle-thumb { width: 20px; height: 20px; border-radius: 50%; background: white !important; position: absolute; top: 2px; transition: left 0.3s; pointer-events: none; }
      .toggle-track.on .toggle-thumb { left: 22px !important; }
      .toggle-track.off .toggle-thumb { left: 2px !important; }
      .table-row { transition: background 0.15s; }
      .table-row:hover { background: var(--bg-sunken); }
      .consent-banner { background: rgba(212,168,67,0.1); border: 1px solid rgba(212,168,67,0.3); color: var(--text-primary); }
      .health-bar { height: 6px; border-radius: 2px; transition: width 0.8s ease; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
      .loading-pulse { animation: loadPulse 1.5s infinite; }
      @keyframes loadPulse { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
      a:focus-visible, button:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
      @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
    </head>
    <body class="font-sans min-h-screen" style="background: var(--bg); color: var(--text-primary);">

    <!-- Auth + Theme + i18n scripts -->
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/auth.js"></script>

    <!-- ==================== CUSTOMER LOGIN/REGISTER SCREEN ==================== -->
    <div id="screen-auth" class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto" style="background: var(--bg);">
      <!-- Language/theme selectors — fixed top-right -->
      <div class="fixed top-4 right-4 z-[110] flex items-center gap-2">
        <div id="auth-lang-selector"></div>
        <div id="auth-theme-toggle"></div>
      </div>

      <div class="max-w-md w-full">
        <!-- Header -->
        <div class="text-center mb-8 fade-in">
          <div class="text-xs font-medium uppercase tracking-widest mb-6" style="color: var(--text-muted); letter-spacing: 0.2em;">BankOffer</div>
          <h1 class="text-2xl font-semibold mb-1" style="color: var(--text-primary); letter-spacing: -0.02em;">Customer Portal</h1>
        </div>

        <!-- LOGIN FORM -->
        <div id="auth-login-form" class="bg-white border border-border rounded-none p-6 fade-in" style="animation-delay:0.1s; background: var(--bg-raised); border-color: var(--border);">
          <h2 class="text-xl font-medium mb-1" style="color: var(--text-primary);" data-i18n="cauth.login_title">Customer Login</h2>
          <p class="text-sm mb-5" style="color: var(--text-secondary);" data-i18n="cauth.login_subtitle">Sign in to your banking portal</p>

          <!-- SSO Button (outline style) -->
          <button onclick="ssoCustomerLogin()" id="sso-customer-btn"
            class="w-full py-2.5 mb-4 border rounded font-medium text-sm transition-colors flex items-center justify-center gap-2" style="border-color: var(--border); color: var(--text-primary); background: transparent;">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            <span data-i18n="sauth.sso_login">Sign in with SSO (Keycloak)</span>
          </button>

          <div class="flex items-center gap-3 mb-4">
            <div class="flex-1 h-px" style="background: var(--border);"></div>
            <span class="text-xs" style="color: var(--text-muted);">or</span>
            <div class="flex-1 h-px" style="background: var(--border);"></div>
          </div>

          <div id="login-error" class="hidden mb-4 p-3 rounded bg-accent-red/10 border border-accent-red/30 text-accent-red text-sm"></div>

          <div class="space-y-4">
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="cauth.email">Email address</label>
              <input type="email" id="login-email" autocomplete="email"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none focus:border-accent-blue transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="demo@bankofferai.com">
            </div>
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="cauth.password">Password</label>
              <input type="password" id="login-password" autocomplete="current-password"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none focus:border-accent-blue transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="********">
            </div>
            <button onclick="handleLogin()" id="login-btn"
              class="w-full py-2.5 bg-accent-blue hover:bg-accent-blue/90 text-ink-inverse rounded font-medium text-sm transition-colors">
              <span data-i18n="cauth.login_btn">Sign In</span>
            </button>
          </div>

          <div class="mt-5 text-center text-sm" style="color: var(--text-secondary);">
            <span data-i18n="cauth.no_account">Don't have an account?</span>
            <button onclick="showRegisterForm()" class="text-accent-blue hover:underline ml-1 font-medium" data-i18n="cauth.sign_up">Register here</button>
          </div>

          <!-- Demo accounts hint -->
          <details class="mt-5 pt-5" style="border-top: 1px solid var(--border);">
            <summary class="text-xs font-medium cursor-pointer select-none" style="color: var(--text-muted);" data-i18n="cauth.demo_hint">Demo credentials</summary>
            <div class="mt-3 space-y-1.5">
              <button onclick="fillDemo('demo@bankofferai.com','Demo1234!')" class="w-full text-left px-3 py-2 rounded border border-border hover:border-border-strong transition-colors group" style="background: var(--bg-sunken);">
                <span class="text-xs group-hover:text-accent-blue" style="color: var(--text-secondary);">demo@bankofferai.com</span>
                <span class="text-xs ml-2" style="color: var(--text-muted);">/ Demo1234!</span>
              </button>
              <button onclick="fillDemo('maria.johnson@example.com','Customer1!')" class="w-full text-left px-3 py-2 rounded border border-border hover:border-border-strong transition-colors group" style="background: var(--bg-sunken);">
                <span class="text-xs group-hover:text-accent-blue" style="color: var(--text-secondary);">maria.johnson@example.com</span>
                <span class="text-xs ml-2" style="color: var(--text-muted);">/ Customer1!</span>
              </button>
            </div>
          </details>

          <!-- Data protection badge -->
          <div class="mt-5 p-3 rounded" style="background: var(--bg-sunken); border: 1px solid var(--border);">
            <span class="text-xs" style="color: var(--text-secondary);" data-i18n="cauth.anonymization_notice">Your email is stored as an irreversible hash only. Your data will be automatically anonymized after 2 years (GDPR Art. 5(1)(e)).</span>
          </div>
        </div>

        <!-- Portal navigation footer (hidden on customer domain for security isolation) -->
        <div id="portalNav" class="text-center mt-6" style="display:none">
          <span class="text-xs" style="color: var(--text-muted);">
            <a href="http://bankoffer.local" class="hover:underline" style="color: var(--text-secondary);" data-i18n="nav.employee_portal">Employee Portal</a>
            <span style="margin: 0 8px; color: var(--border-strong);">&middot;</span>
            <a href="http://bankoffer.local/admin" class="hover:underline" style="color: var(--text-secondary);" data-i18n="nav.admin">Admin</a>
          </span>
        </div>
        <script>
          // Only show internal nav links on the employee domain (staff testing).
          // Use BOAI_AUTH.isCustomerDomain() so this works for all customer hostnames
          // (bankoffer-customer.local, bankoffer-customer.local, etc.).
          if (window.BOAI_AUTH && !window.BOAI_AUTH.isCustomerDomain()) {
            document.getElementById('portalNav').style.display = '';
          }
        </script>

        <!-- REGISTER FORM (hidden by default) -->
        <div id="auth-register-form" class="bg-white border border-border rounded-none p-6 fade-in hidden" style="background: var(--bg-raised); border-color: var(--border);">
          <h2 class="text-xl font-medium mb-1" style="color: var(--text-primary);" data-i18n="cauth.register_title">Create Account</h2>
          <p class="text-sm mb-5" style="color: var(--text-secondary);" data-i18n="cauth.register_subtitle">Register for personalized banking offers</p>

          <div id="register-error" class="hidden mb-4 p-3 rounded bg-accent-red/10 border border-accent-red/30 text-accent-red text-sm"></div>

          <div class="space-y-4">
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="cauth.email">Email address</label>
              <input type="email" id="register-email" autocomplete="email"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none focus:border-accent-blue transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="your.email@example.com">
            </div>
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="cauth.display_name">Display name (optional)</label>
              <input type="text" id="register-name" autocomplete="name"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none focus:border-accent-blue transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="Your Name">
            </div>
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="cauth.password">Password</label>
              <input type="password" id="register-password" autocomplete="new-password"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none focus:border-accent-blue transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="Min. 8 characters">
            </div>
            <div>
              <label class="block text-xs mb-1.5 font-medium" style="color: var(--text-secondary);" data-i18n="cauth.confirm_password">Confirm password</label>
              <input type="password" id="register-confirm" autocomplete="new-password"
                class="w-full px-4 py-2.5 rounded border text-sm focus:outline-none focus:border-accent-blue transition-colors"
                style="background: var(--bg); border-color: var(--border); color: var(--text-primary);"
                placeholder="Repeat password">
            </div>

            <!-- GDPR Consent -->
            <label class="flex items-start gap-3 cursor-pointer p-3 rounded border" style="background: var(--bg-sunken); border-color: var(--border);">
              <input type="checkbox" id="register-gdpr" class="mt-0.5 accent-accent-blue w-4 h-4">
              <span class="text-xs leading-relaxed" style="color: var(--text-secondary);" data-i18n="cauth.gdpr_consent">I consent to my data being processed for personalized banking recommendations under GDPR Art. 6(1)(a)</span>
            </label>

            <button onclick="handleRegister()" id="register-btn"
              class="w-full py-2.5 bg-accent-blue hover:bg-accent-blue/90 text-ink-inverse rounded font-medium text-sm transition-colors">
              <span data-i18n="cauth.register_btn">Create Account</span>
            </button>
          </div>

          <div class="mt-5 text-center text-sm" style="color: var(--text-secondary);">
            <span data-i18n="cauth.has_account">Already have an account?</span>
            <button onclick="showLoginForm()" class="text-accent-blue hover:underline ml-1 font-medium" data-i18n="cauth.sign_in">Sign in here</button>
          </div>

          <!-- Data protection detail -->
          <div class="mt-5 p-4 rounded border" style="border-color: var(--border); background: var(--bg-sunken);">
            <div class="flex items-start gap-2.5">
              <div>
                <p class="text-sm font-semibold mb-1" style="color: var(--text-primary);" data-i18n="cauth.data_protection">Data Protection</p>
                <p class="text-xs leading-relaxed" style="color: var(--text-secondary);" data-i18n="cauth.data_protection_detail">We apply automatic data anonymization: your email is SHA-256 hashed before storage, internal IDs are replaced with pseudonymized UUIDs, and a storage limitation timer ensures automatic anonymization.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== MAIN PORTAL (after selection) ==================== -->
    <div id="screen-portal" class="min-h-screen hidden">
      <!-- Top Nav -->
      <nav class="sticky top-0 z-50 border-b" style="background: var(--bg-raised); border-color: var(--border);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
          <div class="flex items-center justify-between h-16">
            <!-- Logo + brand -->
            <div class="flex items-center gap-3">
              <span class="text-xs font-medium uppercase tracking-widest hidden sm:inline" style="color: var(--text-muted); letter-spacing: 0.2em;">BankOffer</span>
            </div>
            <!-- Nav links (desktop) -->
            <div class="hidden md:flex items-center gap-1" id="nav-desktop">
              <button onclick="navigateTo('offers')" data-nav="offers" class="nav-link px-4 py-2 rounded text-sm font-medium" style="color: var(--text-secondary);" data-i18n="nav.my_offers">My Offers</button>
              <button onclick="navigateTo('data')" data-nav="data" class="nav-link px-4 py-2 rounded text-sm font-medium" style="color: var(--text-secondary);" data-i18n="nav.my_data">My Data</button>
              <button onclick="navigateTo('consent')" data-nav="consent" class="nav-link px-4 py-2 rounded text-sm font-medium" style="color: var(--text-secondary);" data-i18n="nav.consent">Consent</button>
              <button onclick="navigateTo('history')" data-nav="history" class="nav-link px-4 py-2 rounded text-sm font-medium" style="color: var(--text-secondary);" data-i18n="nav.history">History</button>
              <button onclick="navigateTo('forms')" data-nav="forms" class="nav-link px-4 py-2 rounded text-sm font-medium" style="color: var(--text-secondary);">My Forms</button>
            </div>
            <!-- Controls: language, theme, customer badge, switch -->
            <div class="flex flex-wrap items-center gap-2 md:gap-3">
              <div id="lang-selector-portal"></div>
              <div id="theme-toggle-portal"></div>
              <div id="user-badge-portal"></div>
              <button onclick="switchCustomer()" class="text-xs transition-colors" style="color: var(--text-muted);" title="Switch Customer" data-i18n-title="nav.switch_customer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              </button>
            </div>
          </div>
          <!-- Mobile nav -->
          <div class="md:hidden flex items-center gap-1 pb-2 overflow-x-auto" id="nav-mobile">
            <button onclick="navigateTo('offers')" data-nav="offers" class="nav-link px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap" style="color: var(--text-secondary);" data-i18n="nav.my_offers">Offers</button>
            <button onclick="navigateTo('data')" data-nav="data" class="nav-link px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap" style="color: var(--text-secondary);" data-i18n="nav.my_data">My Data</button>
            <button onclick="navigateTo('consent')" data-nav="consent" class="nav-link px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap" style="color: var(--text-secondary);" data-i18n="nav.consent">Consent</button>
            <button onclick="navigateTo('history')" data-nav="history" class="nav-link px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap" style="color: var(--text-secondary);" data-i18n="nav.history">History</button>
            <button onclick="navigateTo('forms')" data-nav="forms" class="nav-link px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap" style="color: var(--text-secondary);">Forms</button>
          </div>
        </div>
      </nav>

      <!-- Content Area -->
      <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        <!-- Consent Banner (shown when profiling consent is off) -->
        <div id="consent-banner" class="consent-banner rounded p-4 mb-6 hidden">
          <div class="flex items-start gap-3">
            <svg class="w-6 h-6 text-accent-yellow flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
            <div>
              <p class="text-accent-yellow font-medium text-sm" data-i18n="portal.profiling_required">Profiling consent required</p>
              <p class="text-xs mt-1" style="color: var(--text-secondary);"><span data-i18n="portal.profiling_required_desc">Enable profiling consent to receive personalized product recommendations. You can manage your consent in the</span> <button onclick="navigateTo('consent')" class="text-accent-blue underline" data-i18n="portal.consent_settings">Consent settings</button>.</p>
            </div>
          </div>
        </div>

        <!-- ===== MY OFFERS SECTION ===== -->
        <section id="section-offers" class="hidden">
          <!-- Customer info bar -->
          <div class="bg-white border border-border rounded-none p-4 md:p-5 mb-6 fade-in" style="background: var(--bg-raised); border-color: var(--border);">
            <div class="flex flex-wrap items-center gap-4">
              <div class="w-14 h-14 rounded flex items-center justify-center" style="background: var(--bg-sunken);">
                <span class="text-xl font-bold" style="color: var(--text-secondary);" id="info-initials">--</span>
              </div>
              <div class="flex-1 min-w-0">
                <h2 class="text-xl font-bold" style="color: var(--text-primary);" id="info-name">Customer</h2>
                <p class="text-sm" style="color: var(--text-secondary);" id="info-subtitle">Loading...</p>
              </div>
              <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <div class="text-center px-3">
                  <p class="text-xs" style="color: var(--text-muted);" data-i18n="portal.age">Age</p>
                  <p class="text-lg font-medium" style="color: var(--text-primary);" id="info-age">--</p>
                </div>
                <div class="text-center px-3">
                  <p class="text-xs" style="color: var(--text-muted);" data-i18n="portal.income_tier">Income Tier</p>
                  <p class="text-lg font-medium text-accent-green" id="info-income">--</p>
                </div>
                <div class="text-center px-3">
                  <p class="text-xs" style="color: var(--text-muted);" data-i18n="portal.risk_profile">Risk Profile</p>
                  <p class="text-lg font-medium text-accent-blue" id="info-risk">--</p>
                </div>
                <div class="text-center px-3">
                  <p class="text-xs" style="color: var(--text-muted);" data-i18n="portal.life_stage_label">Life Stage</p>
                  <p class="text-lg font-medium" style="color: var(--text-secondary);" id="info-lifestage">--</p>
                </div>
              </div>
            </div>
          </div>

          <!-- AI Act Art. 13 Transparency Disclosure -->
          <div class="bg-white border border-border rounded p-4 mb-6" style="background: var(--bg-raised); border-color: var(--border);">
