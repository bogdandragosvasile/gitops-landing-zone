                  </div>
                  <p class="text-xs font-medium mb-2" style="color: var(--text-secondary);">GDPR Art. 22</p>
                  <p class="text-sm mb-2" style="color: var(--text-secondary);" data-i18n="consent.automated_decision_desc">Allow fully automated offer generation without human review per offer.</p>
                  <p class="text-xs" style="color: var(--text-muted);" data-i18n="consent.automated_decision_note">You can always request an explanation and contest any offer, regardless of this setting.</p>
                  <p class="text-xs mt-2" style="color: var(--text-muted);" id="automated-decision-timestamp"></p>
                </div>
                <div class="flex-shrink-0 pt-1">
