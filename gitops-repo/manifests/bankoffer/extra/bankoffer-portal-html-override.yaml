                  <p class="text-xs mt-2" style="color: var(--text-muted);" id="family-context-timestamp"></p>
                </div>
                <div class="flex-shrink-0 pt-1">
                  <div id="toggle-family-context" class="toggle-track off" data-consent="family_context">
