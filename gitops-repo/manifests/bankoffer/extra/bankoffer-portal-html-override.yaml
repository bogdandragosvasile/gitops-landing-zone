              <p class="text-sm" style="color: var(--text-secondary);"><span class="font-semibold" style="color: var(--text-primary);" data-i18n="consent.legal">Legal basis: GDPR Art. 6(1)(a), Art. 9, Art. 22, ePrivacy Directive, EU AI Act</span> <span data-i18n="portal.consent_legal_text">Under GDPR Article 22, you have the right not to be subject to a decision based solely on automated processing. Under the EU AI Act, you have the right to meaningful explanation of AI-driven decisions. Your consent choices below directly control whether automated profiling is performed.</span></p>
            </div>

            <!-- Consent #1: General Financial Profiling -->
            <div class="bg-white border border-border rounded-none p-4 md:p-6 mb-4" style="background: var(--bg-raised); border-color: var(--border);">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 sm:gap-4">
                <div class="flex-1">
                  <div class="flex items-center gap-2 mb-2">
