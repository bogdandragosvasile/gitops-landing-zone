    };

    const featureDescriptions = {
      annual_income: 'Estimated annual income from transaction analysis',
      idle_cash: 'Average uninvested cash balance over the last 90 days',
      savings_rate: 'Ratio of savings deposits to total income',
      debt_to_income: 'Total debt obligations relative to income',
      balance_trend: 'Direction of account balance over the last 6 months',
      spend_category: 'Dominant spending category by volume',
      investment_gap: 'Whether current investment level is below recommended allocation',
    };

    // ==================== INIT ====================
    function init() {
      // Render language selector and theme toggle on auth screen
      const als = document.getElementById('auth-lang-selector');
      const att = document.getElementById('auth-theme-toggle');
      if (als && window.BOAI_I18N) als.innerHTML = window.BOAI_I18N.renderLanguageSelector();
      if (att && window.BOAI_THEME) att.innerHTML = window.BOAI_THEME.renderToggle();

      // Check for existing customer session
      const session = getCustomerSession();
      if (session) {
        enterPortal(session.customer_id, session.display_name, session.external_id, session.onboarding_complete);
      }
    }

    // ==================== CUSTOMER AUTH SESSION ====================
    const CUSTOMER_SESSION_KEY = 'boai_customer_session';

    function saveCustomerSession(data) {
      localStorage.setItem(CUSTOMER_SESSION_KEY, JSON.stringify({
        token: data.token,
        customer_id: data.customer_id,
        external_id: data.external_id,
        display_name: data.display_name,
        anonymize_after: data.anonymize_after,
        onboarding_complete: data.onboarding_complete === true,
        ts: Date.now()
      }));
    }

    function getCustomerSession() {
      try {
        const raw = localStorage.getItem(CUSTOMER_SESSION_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        // Expire after 24 hours
        if (Date.now() - data.ts > 24 * 60 * 60 * 1000) {
          localStorage.removeItem(CUSTOMER_SESSION_KEY);
          return null;
        }
        return data;
      } catch (e) {
        return null;
      }
    }

    function clearCustomerSession() {
      localStorage.removeItem(CUSTOMER_SESSION_KEY);
    }

    // ==================== LOGIN/REGISTER HANDLERS ====================
    function fillDemo(email, pwd) {
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = pwd;
    }

    function showLoginForm() {
      document.getElementById('auth-login-form').classList.remove('hidden');
      document.getElementById('auth-register-form').classList.add('hidden');
      document.getElementById('login-error').classList.add('hidden');
    }

    function showRegisterForm() {
      document.getElementById('auth-login-form').classList.add('hidden');
      document.getElementById('auth-register-form').classList.remove('hidden');
      document.getElementById('register-error').classList.add('hidden');
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      if (!email || !password) {
        errorEl.textContent = t('cauth.login_error');
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';
      errorEl.classList.add('hidden');

      try {
        const resp = await fetch(API + '/customer-auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || t('cauth.login_error'));
        }

        const data = await resp.json();
        saveCustomerSession(data);
        enterPortal(data.customer_id, data.display_name, data.external_id, data.onboarding_complete);
      } catch (e) {
        errorEl.textContent = e.message || t('cauth.login_error');
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="cauth.login_btn">${t('cauth.login_btn')}</span>`;
      }
    }

    async function handleRegister() {
      const email = document.getElementById('register-email').value.trim();
      const name = document.getElementById('register-name').value.trim();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const gdpr = document.getElementById('register-gdpr').checked;
      const errorEl = document.getElementById('register-error');
      const btn = document.getElementById('register-btn');

      errorEl.classList.add('hidden');

      if (password.length < 8) {
        errorEl.textContent = t('cauth.password_min');
        errorEl.classList.remove('hidden');
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = t('cauth.password_mismatch');
        errorEl.classList.remove('hidden');
        return;
      }
      if (!gdpr) {
        errorEl.textContent = t('cauth.gdpr_consent');
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';

      try {
        const resp = await fetch(API + '/customer-auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        // If login succeeds, the account already exists — just log them in
        if (resp.ok) {
          const data = await resp.json();
          saveCustomerSession(data);
          enterPortal(data.customer_id, data.display_name, data.external_id, data.onboarding_complete);
          return;
        }

        // Otherwise, try to register
        const regResp = await fetch(API + '/customer-auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            password,
            display_name: name || null,
            gdpr_consent: true,
          }),
        });

        if (!regResp.ok) {
          const err = await regResp.json().catch(() => ({}));
          throw new Error(err.detail || t('cauth.register_error'));
        }

        const data = await regResp.json();
        saveCustomerSession(data);
        enterPortal(data.customer_id, data.display_name, data.external_id, data.onboarding_complete);
      } catch (e) {
        errorEl.textContent = e.message || t('cauth.register_error');
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="cauth.register_btn">${t('cauth.register_btn')}</span>`;
      }
    }

    // ==================== PORTAL ENTRY ====================
    async function enterPortal(customerId, displayName, externalId, onboardingComplete) {
      state.customerId = customerId;
      state.feedbackGiven = {};

      // Check onboarding status
      const obComplete = onboardingComplete !== undefined ? onboardingComplete : true;
      state.onboardingComplete = obComplete;

      if (!obComplete) {
        // Show onboarding wizard
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-portal').classList.add('hidden');
        document.getElementById('onboarding-wizard').classList.remove('hidden');
        onboardingNext(1);
        loadOnboardingConsentTexts();
        return;
      }

      // Show portal, hide auth screen
      document.getElementById('screen-auth').classList.add('hidden');
      document.getElementById('onboarding-wizard').classList.add('hidden');
      document.getElementById('screen-portal').classList.remove('hidden');

      // Set loading state
      updateBadge(displayName || `#${customerId}`);
      navigateTo('offers');

      // Render nav controls
      const tt = document.getElementById('theme-toggle-portal');
      const ub = document.getElementById('user-badge-portal');
      const ls = document.getElementById('lang-selector-portal');
      if (tt) tt.innerHTML = window.BOAI_THEME ? window.BOAI_THEME.renderToggle() : '';
      if (ls && window.BOAI_I18N) ls.innerHTML = window.BOAI_I18N.renderLanguageSelector();

      // Render customer badge with anonymization info
      if (ub) {
        const anonBadge = externalId
          ? `<span class="text-[10px] text-accent-green ml-1" title="${t('cauth.external_id')}: ${externalId}">&#128274;</span>`
          : '';
        ub.innerHTML = `<div class="flex items-center gap-2">
          <span class="text-xs" style="color: var(--text-secondary);">${escHtml(displayName || 'Customer')}${anonBadge}</span>
          <button onclick="customerLogout()" class="p-1.5 rounded hover:bg-accent-red/10 transition-colors" style="color: var(--text-muted);" title="${t('cauth.logout')}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
          </button>
        </div>`;
      }

      // Load all data in parallel
      await Promise.all([
        loadCustomerData(),
        loadProfile(),
        loadOffers(),
        loadFeedback(),
      ]);

      // Update UI with loaded data
      renderCustomerInfo();
      renderOffers();

      // Check for pending forms
      try {
        const formsResp = await apiGet(`/workflow/forms/customer/${state.customerId}`);
        if (formsResp && formsResp.length > 0) {
          const pending = formsResp.filter(f => f.status === 'pending').length;
          updateFormsBadge(pending);
        }
      } catch (e) {}
    }

    function customerLogout() {
      clearCustomerSession();
      state.customerId = null;
      state.customerData = null;
      state.profileData = null;
      state.offersData = null;
      state.consentData = null;
      state.feedbackData = null;
      state.recommendationId = null;
      state.feedbackGiven = {};
      state.suitabilityPending = null;

      // If logged in via SSO, do Keycloak logout
      if (_ssoCustomerAuth && window.BOAI_AUTH && !window.BOAI_AUTH.isDemoMode()) {
        _ssoCustomerAuth = false;
        window.BOAI_AUTH.logout();
        return;
      }

      _ssoCustomerAuth = false;
      document.getElementById('screen-portal').classList.add('hidden');
      document.getElementById('screen-auth').classList.remove('hidden');
      showLoginForm();
    }

    function switchCustomer() {
      customerLogout();
    }

    // ==================== API CALLS ====================
    function _authHeaders(extra) {
      const auth = window.BOAI_AUTH ? window.BOAI_AUTH.getAuthHeader() : {};
      return Object.assign({}, auth, extra);
    }

    async function apiGet(url) {
      try {
        const resp = await fetch(API + url, { headers: _authHeaders() });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        return await resp.json();
      } catch (e) {
        console.error(`API GET ${url} failed:`, e);
        return null;
      }
    }

    async function apiPut(url, body) {
      try {
        const resp = await fetch(API + url, {
          method: 'PUT',
          headers: _authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        return await resp.json();
      } catch (e) {
        console.error(`API PUT ${url} failed:`, e);
        return null;
      }
    }

    async function apiPost(url, body) {
      try {
        const resp = await fetch(API + url, {
          method: 'POST',
          headers: _authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        return await resp.json();
      } catch (e) {
        console.error(`API POST ${url} failed:`, e);
        return null;
      }
    }

    async function loadCustomerData() {
      const data = await apiGet(`/compliance/customer/${state.customerId}`);
      if (data) {
        state.customerData = data;
        state.consentLocal.profiling = data.profiling_consent;
        state.consentLocal.automated_decision = data.automated_decision_consent;
        state.consentLocal.marketing_push = data.marketing_push;
        state.consentLocal.marketing_email = data.marketing_email;
        state.consentLocal.marketing_sms = data.marketing_sms;
        state.consentLocal.family_context = data.family_context_consent;
        state.consentLocal.sensitive = data.sensitive_data_consent;
      }
    }

    async function loadProfile() {
      const data = await apiGet(`/profiles/${state.customerId}`);
      if (data) {
        state.profileData = data;
      }
    }

    async function loadOffers() {
      const data = await apiGet(`/offers/${state.customerId}?top_n=5`);
      if (data) {
        state.offersData = data;
        state.recommendationId = data.recommendation_id;
      }
    }

    async function loadFeedback() {
      const data = await apiGet(`/compliance/feedback/${state.customerId}`);
      if (data) {
        state.feedbackData = data;
      }
    }

    // ==================== NAVIGATION ====================
    function navigateTo(section) {
      state.currentSection = section;

      // Hide all sections
      document.querySelectorAll('[id^="section-"]').forEach(el => el.classList.add('hidden'));

      // Show target
      const target = document.getElementById(`section-${section}`);
      if (target) {
        target.classList.remove('hidden');
        // Re-trigger fade-in
        target.querySelectorAll('.fade-in').forEach(el => {
          el.style.animation = 'none';
          el.offsetHeight; // reflow
          el.style.animation = '';
        });
      }

      // Update nav active state
      document.querySelectorAll('[data-nav]').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.nav === section) el.classList.add('active');
      });

      // Render section-specific content
      if (section === 'data') renderDataSection();
      if (section === 'consent') renderConsentSection();
      if (section === 'history') renderHistorySection();
      if (section === 'forms') loadCustomerForms();
    }

    // ==================== BADGE ====================
    function updateBadge(label) {
      // Badge is now rendered by enterPortal() in user-badge-portal
    }

    // ==================== RENDER: CUSTOMER INFO ====================
    function renderCustomerInfo() {
      const c = state.customerData;
      const p = state.profileData;
      if (!c) return;

      const label = `Customer #${c.customer_id}`;
      updateBadge(`#${c.customer_id}`);

      document.getElementById('info-initials').textContent = `#${c.customer_id}`;
      document.getElementById('info-name').textContent = label;

      const riskLabel = (c.risk_profile || 'moderate').charAt(0).toUpperCase() + (c.risk_profile || 'moderate').slice(1);
      const lifeStage = p ? formatLifeStage(p.life_stage) : '--';
      const incomeBracket = p ? (p.income_bracket || '--').toUpperCase() : '--';

      document.getElementById('info-subtitle').textContent = `${riskLabel} risk investor | ${lifeStage}`;
      document.getElementById('info-age').textContent = c.age || '--';
      document.getElementById('info-income').textContent = incomeBracket;
      document.getElementById('info-risk').textContent = riskLabel;
      document.getElementById('info-lifestage').textContent = lifeStage;

      // Show consent banner if needed
      const banner = document.getElementById('consent-banner');
      if (!c.profiling_consent) {
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }
    }

    function formatLifeStage(stage) {
      if (!stage) return '--';
      return stage.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    // ==================== RENDER: OFFERS ====================
    function renderOffers() {
      const container = document.getElementById('offers-list');
      const excludedContainer = document.getElementById('excluded-list');
      const excludedSection = document.getElementById('excluded-section');
      const o = state.offersData;

      if (!o) {
        container.innerHTML = '<div class="bg-white border border-border rounded p-6 text-center" style="background: var(--bg-raised); color: var(--text-secondary);">' + t('portal.load_error') + '</div>';
        return;
      }

      if (!o.consent_valid) {
        container.innerHTML = `
          <div class="bg-white border border-border rounded p-4 md:p-8 text-center" style="background: var(--bg-raised); border-color: var(--border);">
            <svg class="w-12 h-12 text-accent-yellow mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <h4 class="font-medium text-lg mb-2" style="color: var(--text-primary);">${t('portal.consent_required_title')}</h4>
            <p class="text-sm mb-4" style="color: var(--text-secondary);">${t('portal.consent_required_desc')}</p>
            <button onclick="navigateTo('consent')" class="px-5 py-2 rounded bg-accent-blue hover:bg-accent-blue/90 text-ink-inverse font-medium text-sm transition-colors">${t('portal.manage_consent')}</button>
          </div>`;
        excludedSection.classList.add('hidden');
        return;
      }

      if (o.offers.length === 0) {
        container.innerHTML = '<div class="bg-white border border-border rounded p-6 text-center" style="background: var(--bg-raised); color: var(--text-secondary);">' + t('portal.no_offers') + '</div>';
      } else {
        container.innerHTML = o.offers.map((offer, i) => renderOfferCard(offer, i)).join('');
      }

      // Excluded products
      if (o.excluded_products && o.excluded_products.length > 0) {
        excludedSection.classList.remove('hidden');
        excludedContainer.innerHTML = o.excluded_products.map(ep => `
          <div class="bg-white border border-border rounded p-3 flex items-center gap-3" style="background: var(--bg-raised); border-color: var(--border);">
            <div class="w-8 h-8 rounded flex items-center justify-center flex-shrink-0" style="background: var(--bg-sunken); color: var(--text-muted);">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium" style="color: var(--text-secondary);">${escHtml(tProductName(ep.product_name))}</p>
              <p class="text-xs" style="color: var(--text-muted);">${escHtml(ep.reason)}</p>
            </div>
            <span class="text-xs px-2 py-0.5 rounded bg-accent-red/10 text-accent-red font-medium flex-shrink-0">${t('offers.excluded')}</span>
          </div>
        `).join('');
      } else {
        excludedSection.classList.add('hidden');
      }
    }

    function renderOfferCard(offer, index) {
      const ptype = offer.product_type || 'savings';
      const icon = typeIcons[ptype] || typeIcons.savings;
      const colorClass = typeColors[ptype] || 'text-accent-blue';
      const bgClass = typeBgColors[ptype] || 'bg-accent-blue/10';
      const score = Math.round((offer.relevance_score || 0) * 100);
      const offerId = offer.offer_id || `offer_${index}`;
      const alreadyActed = state.feedbackGiven[offerId];
      const needsSuitability = offer.requires_suitability_confirmation || (ptype === 'investment' || ptype === 'bond');

      // AI Act badges
      let badgesHtml = '';
      if (offer.human_review_required) {
        badgesHtml += `<span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded bg-accent-yellow/10 text-accent-yellow" data-i18n="portal.badge_human_review"><span class="text-sm">&#9203;</span> Pending human review</span>`;
      }
      if (offer.requires_suitability_confirmation || needsSuitability) {
        badgesHtml += `<span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded bg-accent-blue/10 text-accent-blue" data-i18n="portal.badge_suitability"><span class="text-sm">&#128203;</span> Suitability confirmation required</span>`;
      }

      let actionHtml = '';
      if (alreadyActed) {
        const actionColor = alreadyActed === 'accepted' ? 'text-accent-green' : 'text-accent-red';
        const actionIcon = alreadyActed === 'accepted'
          ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>'
          : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
        actionHtml = `
          <div class="flex items-center gap-2 ${actionColor} text-sm font-medium mt-3">
            ${actionIcon}
            <span>${alreadyActed === 'accepted' ? t('offers.accepted') : t('offers.rejected')}</span>
          </div>`;
      } else {
        // For investment/bond offers, route through suitability modal
        const acceptFn = needsSuitability
          ? `openSuitabilityModal('${escAttr(offerId)}', '${escAttr(offer.product_name)}', '${escAttr(ptype)}', '${escAttr(offer.product_id || '')}')`
          : `acceptOffer('${escAttr(offerId)}', '${escAttr(offer.product_name)}')`;
        actionHtml = `
          <div class="flex flex-wrap items-center gap-2 mt-3" id="actions-${offerId}">
            <button onclick="${acceptFn}" class="px-4 py-1.5 rounded bg-accent-green/10 text-accent-green text-sm font-medium hover:bg-accent-green/20 transition-colors">${t('offers.accept')}</button>
            <button onclick="showRejectForm('${escAttr(offerId)}')" class="px-4 py-1.5 rounded bg-accent-red/10 text-accent-red text-sm font-medium hover:bg-accent-red/20 transition-colors">${t('offers.reject')}</button>
          </div>
          <div id="reject-form-${offerId}" class="hidden mt-3">
            <div class="flex gap-2">
              <input type="text" id="reject-reason-${offerId}" placeholder="${t('portal.reason_optional')}" class="flex-1 px-3 py-1.5 rounded border text-sm focus:outline-none focus:border-accent-blue" style="background: var(--bg); border-color: var(--border); color: var(--text-primary);">
              <button onclick="rejectOffer('${escAttr(offerId)}', '${escAttr(offer.product_name)}')" class="px-4 py-1.5 rounded bg-accent-red text-ink-inverse text-sm font-medium hover:bg-accent-red/90 transition-colors">${t('common.submit')}</button>
              <button onclick="hideRejectForm('${escAttr(offerId)}')" class="px-3 py-1.5 rounded border border-border text-sm hover:border-border-strong transition-colors" style="color: var(--text-secondary);">${t('common.cancel')}</button>
            </div>
          </div>`;
      }

      return `
        <div class="offer-card bg-white border border-border rounded p-4 md:p-5 fade-in" style="animation-delay:${index * 0.08}s; background: var(--bg-raised); border-color: var(--border);">
          <div class="flex flex-col sm:flex-row items-start gap-3 sm:gap-4">
            <div class="w-12 h-12 rounded ${bgClass} ${colorClass} flex items-center justify-center flex-shrink-0">
              ${icon}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2 mb-1">
                <div>
                  <h4 class="text-base font-medium" style="color: var(--text-primary);">${escHtml(tProductName(offer.product_name))}</h4>
                  <span class="text-xs ${colorClass} font-medium">${tProductType(ptype)}</span>
                  ${badgesHtml ? `<div class="flex flex-wrap gap-1.5 mt-1.5">${badgesHtml}</div>` : ''}
                </div>
                <div class="text-right flex-shrink-0">
                  <p class="text-2xl font-bold" style="color: var(--text-primary);">${score}<span class="text-sm font-normal" style="color: var(--text-muted);">%</span></p>
                  <p class="text-xs" style="color: var(--text-muted);">${t('portal.relevance_label')}</p>
                </div>
              </div>
              <!-- Score bar -->
              <div class="score-bar-bg mt-2 mb-3">
                <div class="score-bar" style="width:${score}%"></div>
              </div>
              <!-- Explanation (GDPR art.22) -->
              <div class="rounded p-3 mb-1" style="background: var(--bg-sunken);">
                <p class="text-xs mb-1 font-medium uppercase tracking-wider" style="color: var(--text-muted);">${t('portal.why_offer')}</p>
                <p class="text-sm leading-relaxed" style="color: var(--text-primary);">${escHtml(tExplanation(offer.explanation || offer.personalization_reason || ''))}</p>
              </div>
              <!-- Actions -->
              ${actionHtml}
            </div>
          </div>
        </div>`;
    }

    function formatType(type) {
      if (!type) return '';
      return type.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    // ==================== OFFER ACTIONS ====================
    function showRejectForm(offerId) {
      document.getElementById(`reject-form-${offerId}`).classList.remove('hidden');
    }

    function hideRejectForm(offerId) {
      document.getElementById(`reject-form-${offerId}`).classList.add('hidden');
    }

    async function acceptOffer(offerId, productName) {
      state.feedbackGiven[offerId] = 'accepted';
      renderOffers(); // Immediate UI update

      await apiPost('/compliance/feedback', {
        recommendation_id: state.recommendationId || '',
        offer_id: offerId,
        customer_id: state.customerId,
        actor_type: 'customer',
        action: 'accepted',
        reason: null,
      });
    }

    async function rejectOffer(offerId, productName) {
      const reasonEl = document.getElementById(`reject-reason-${offerId}`);
      const reason = reasonEl ? reasonEl.value.trim() : '';

      state.feedbackGiven[offerId] = 'rejected';
      renderOffers(); // Immediate UI update

      await apiPost('/compliance/feedback', {
        recommendation_id: state.recommendationId || '',
        offer_id: offerId,
        customer_id: state.customerId,
        actor_type: 'customer',
        action: 'rejected',
        reason: reason || null,
      });
    }

    // ==================== RENDER: DATA SECTION ====================
    function renderDataSection() {
      const c = state.customerData;
      const p = state.profileData;

      if (!c) return;

      // Profile cards
      document.getElementById('data-lifestage').textContent = p ? formatLifeStage(p.life_stage) : '--';
      document.getElementById('data-riskscore').textContent = p && p.risk_score ? `${p.risk_score.toFixed(1)} / 10` : '--';
      document.getElementById('data-income-bracket').textContent = p && p.income_bracket ? p.income_bracket.toUpperCase() : '--';
      document.getElementById('data-segments').textContent = p && p.segments && p.segments.length > 0 ? p.segments.join(', ') : 'None';

      // Financial health
      const healthMap = {
        strong: { pct: 90, color: '#2D7D46', label: 'Strong', desc: 'Your financial indicators show a healthy and stable pattern. Savings rate and debt levels are within recommended ranges.' },
        stable: { pct: 65, color: '#2D5F9A', label: 'Stable', desc: 'Your financial position is stable. There may be opportunities to optimize savings or reduce debt.' },
        fragile: { pct: 30, color: '#C1403D', label: 'Fragile', desc: 'Some financial indicators suggest vulnerability. The system excludes high-risk products to protect your interests.' },
      };
      const health = healthMap[c.financial_health] || healthMap.stable;

      document.getElementById('health-label').textContent = t('portal.financial_health');
      document.getElementById('health-value').textContent = health.label;
      document.getElementById('health-value').style.color = health.color;
      document.getElementById('health-description').textContent = health.desc;

      const bar = document.getElementById('health-bar');
      bar.style.background = health.color;
      setTimeout(() => { bar.style.width = health.pct + '%'; }, 100);

      // Features table
      const features = c.features || {};
      const tableBody = document.getElementById('features-table');
      const rows = [
        { key: 'idle_cash', label: 'Idle Cash', value: features.idle_cash != null ? `$${Number(features.idle_cash).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` : '--' },
        { key: 'savings_rate', label: 'Savings Rate', value: features.savings_rate != null ? `${(features.savings_rate * 100).toFixed(1)}%` : '--' },
        { key: 'debt_to_income', label: 'Debt-to-Income', value: features.debt_to_income != null ? `${features.debt_to_income.toFixed(2)}x` : '--' },
        { key: 'balance_trend', label: 'Balance Trend', value: features.balance_trend ? formatTrend(features.balance_trend) : '--' },
        { key: 'spend_category', label: 'Top Spending Category', value: features.spend_category ? features.spend_category.charAt(0).toUpperCase() + features.spend_category.slice(1) : '--' },
        { key: 'investment_gap', label: 'Investment Gap', value: features.investment_gap ? '<span class="text-accent-yellow">Yes (under-invested)</span>' : '<span class="text-accent-green">No</span>' },
        { key: 'annual_income', label: 'Annual Income (est.)', value: features.annual_income != null ? `$${Number(features.annual_income).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}` : '--' },
      ];

      tableBody.innerHTML = rows.map(r => `
        <tr class="table-row" style="border-bottom: 1px solid var(--border);">
          <td class="py-3 px-4 font-medium" style="color: var(--text-primary);">${r.label}</td>
          <td class="py-3 px-4 font-medium" style="color: var(--text-primary);">${r.value}</td>
          <td class="py-3 px-4 text-xs" style="color: var(--text-muted);">${featureDescriptions[r.key] || ''}</td>
        </tr>
      `).join('');
    }

    function formatTrend(trend) {
      const map = {
        growing: '<span class="text-accent-green flex items-center gap-1"><svg class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg> Growing</span>',
        stable: '<span class="text-accent-blue flex items-center gap-1"><svg class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14"/></svg> Stable</span>',
        declining: '<span class="text-accent-red flex items-center gap-1"><svg class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg> Declining</span>',
      };
      return map[trend.toLowerCase()] || trend;
    }

    // ==================== RENDER: CONSENT SECTION ====================
    function setToggleState(toggleId, isOn) {
      const el = document.getElementById(toggleId);
      if (!el) return;
      const thumb = el.querySelector('.toggle-thumb');
      if (isOn) {
        el.classList.remove('off');
        el.classList.add('on');
        el.style.background = 'var(--accent)';
        if (thumb) thumb.style.left = '22px';
      } else {
        el.classList.remove('on');
        el.classList.add('off');
        el.style.background = 'var(--border-strong)';
        if (thumb) thumb.style.left = '2px';
      }
    }

    function renderConsentSection() {
      const c = state.customerData;
      if (!c) return;

      // Set all toggle states
      setToggleState('toggle-profiling', state.consentLocal.profiling);
      setToggleState('toggle-automated-decision', state.consentLocal.automated_decision);
      setToggleState('toggle-marketing-push', state.consentLocal.marketing_push);
      setToggleState('toggle-marketing-email', state.consentLocal.marketing_email);
      setToggleState('toggle-marketing-sms', state.consentLocal.marketing_sms);
      setToggleState('toggle-family-context', state.consentLocal.family_context);

      // Consent #2 (automated) and #4 (family context) depend on profiling consent
      const automatedWrapper = document.getElementById('consent-automated-wrapper');
      const familyWrapper = document.getElementById('consent-family-wrapper');

      if (state.consentLocal.profiling) {
        automatedWrapper.style.opacity = '1';
        automatedWrapper.style.pointerEvents = 'auto';
        familyWrapper.style.opacity = '1';
        familyWrapper.style.pointerEvents = 'auto';
      } else {
        automatedWrapper.style.opacity = '0.4';
        automatedWrapper.style.pointerEvents = 'none';
        familyWrapper.style.opacity = '0.4';
        familyWrapper.style.pointerEvents = 'none';
        // Also disable dependent consents when profiling is off
        state.consentLocal.automated_decision = false;
        state.consentLocal.family_context = false;
        setToggleState('toggle-automated-decision', false);
        setToggleState('toggle-family-context', false);
      }

      // Timestamps
      const statusText = (val) => val ? 'Granted' : 'Revoked';
      document.getElementById('profiling-timestamp').textContent = c.profiling_consent != null ? `Status: ${statusText(state.consentLocal.profiling)}` : '';
      document.getElementById('automated-decision-timestamp').textContent = c.automated_decision_consent != null ? `Status: ${statusText(state.consentLocal.automated_decision)}` : '';
      document.getElementById('marketing-push-timestamp').textContent = `Status: ${statusText(state.consentLocal.marketing_push)}`;
      document.getElementById('marketing-email-timestamp').textContent = `Status: ${statusText(state.consentLocal.marketing_email)}`;
      document.getElementById('marketing-sms-timestamp').textContent = `Status: ${statusText(state.consentLocal.marketing_sms)}`;
      document.getElementById('family-context-timestamp').textContent = c.family_context_consent != null ? `Status: ${statusText(state.consentLocal.family_context)}` : '';

      // Warning
      const warning = document.getElementById('consent-warning');
      if (!state.consentLocal.profiling) {
        warning.classList.remove('hidden');
      } else {
        warning.classList.add('hidden');
      }
    }

    function toggleConsent(type) {
      switch (type) {
        case 'profiling':
          state.consentLocal.profiling = !state.consentLocal.profiling;
          break;
        case 'automated_decision':
          state.consentLocal.automated_decision = !state.consentLocal.automated_decision;
          break;
        case 'marketing_push':
          state.consentLocal.marketing_push = !state.consentLocal.marketing_push;
          break;
        case 'marketing_email':
          state.consentLocal.marketing_email = !state.consentLocal.marketing_email;
          break;
        case 'marketing_sms':
          state.consentLocal.marketing_sms = !state.consentLocal.marketing_sms;
          break;
        case 'family_context':
          state.consentLocal.family_context = !state.consentLocal.family_context;
          break;
        case 'sensitive':
          state.consentLocal.sensitive = !state.consentLocal.sensitive;
          break;
      }
      renderConsentSection();
    }

    async function saveConsent() {
      const btn = document.getElementById('consent-save-btn');
      const status = document.getElementById('consent-save-status');

      btn.disabled = true;
      btn.textContent = t('portal.saving');
      status.classList.add('hidden');

      const result = await apiPut(`/compliance/consent/${state.customerId}`, {
        profiling_consent: state.consentLocal.profiling,
        automated_decision_consent: state.consentLocal.automated_decision,
        marketing_push: state.consentLocal.marketing_push,
        marketing_email: state.consentLocal.marketing_email,
        marketing_sms: state.consentLocal.marketing_sms,
        family_context_consent: state.consentLocal.family_context,
        sensitive_data_consent: state.consentLocal.family_context, // sync with family_context
      });

      btn.disabled = false;
      btn.textContent = t('portal.save_consent');

      if (result) {
        // Update local state from API response
        if (state.customerData) {
          state.customerData.profiling_consent = state.consentLocal.profiling;
          state.customerData.automated_decision_consent = state.consentLocal.automated_decision;
          state.customerData.marketing_push = state.consentLocal.marketing_push;
          state.customerData.marketing_email = state.consentLocal.marketing_email;
          state.customerData.marketing_sms = state.consentLocal.marketing_sms;
          state.customerData.family_context_consent = state.consentLocal.family_context;
          state.customerData.sensitive_data_consent = state.consentLocal.family_context;
        }

        status.textContent = t('portal.saved_success');
        status.className = 'text-sm text-accent-green';
        status.classList.remove('hidden');

        // Refresh offers to reflect new consent
        await loadOffers();
        renderCustomerInfo();
        renderOffers();

        // Update timestamps
        renderConsentSection();

        setTimeout(() => { status.classList.add('hidden'); }, 4000);
      } else {
        status.textContent = t('portal.saved_error');
        status.className = 'text-sm text-accent-red';
        status.classList.remove('hidden');
        setTimeout(() => { status.classList.add('hidden'); }, 4000);
      }
    }

    // ==================== RENDER: HISTORY SECTION ====================
    function renderHistorySection() {
      const tableBody = document.getElementById('history-table');

      if (!state.feedbackData || state.feedbackData.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" class="text-center py-8" style="color: var(--text-muted);">' + t('portal.no_history') + '</td></tr>';
        return;
      }

      tableBody.innerHTML = state.feedbackData.map(fb => {
        const date = fb.created_at ? new Date(fb.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '--';
        const actionColor = fb.action === 'accepted' ? 'text-accent-green bg-accent-green/10' : fb.action === 'rejected' ? 'text-accent-red bg-accent-red/10' : 'text-accent-yellow bg-accent-yellow/10';

        return `
          <tr class="table-row" style="border-bottom: 1px solid var(--border);">
            <td class="py-3 px-4 text-xs whitespace-nowrap" style="color: var(--text-secondary);">${date}</td>
            <td class="py-3 px-4 text-sm" style="color: var(--text-primary);">${escHtml(fb.offer_id || '--')}</td>
            <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-xs font-medium ${actionColor}">${escHtml(fb.action)}</span></td>
            <td class="py-3 px-4 text-sm" style="color: var(--text-secondary);">${fb.reason ? escHtml(fb.reason) : '<span style="color: var(--text-muted);">--</span>'}</td>
          </tr>`;
      }).join('');
    }

    // ==================== SUITABILITY MODAL (MiFID II) ====================
    function openSuitabilityModal(offerId, productName, productType, productId) {
      state.suitabilityPending = { offerId, productName, productType, productId };

      document.getElementById('suitability-product-name').textContent = productName;
      const riskProfile = state.customerData ? (state.customerData.risk_profile || 'moderate') : 'moderate';
      document.getElementById('suitability-risk-profile').textContent = riskProfile.charAt(0).toUpperCase() + riskProfile.slice(1);

      const checkbox = document.getElementById('suitability-checkbox');
      checkbox.checked = false;
      updateSuitabilityBtn();

      const modal = document.getElementById('suitability-modal');
      modal.classList.remove('hidden');
      modal.style.display = 'flex';
    }

    function closeSuitabilityModal() {
      state.suitabilityPending = null;
      const modal = document.getElementById('suitability-modal');
      modal.classList.add('hidden');
      modal.style.display = '';
    }

    function updateSuitabilityBtn() {
      const checkbox = document.getElementById('suitability-checkbox');
      const btn = document.getElementById('suitability-confirm-btn');
      if (checkbox.checked) {
        btn.disabled = false;
        btn.className = 'flex-1 w-full sm:w-auto px-4 py-2.5 rounded bg-accent-blue text-ink-inverse font-medium text-sm cursor-pointer hover:bg-accent-blue/90 transition-all';
      } else {
        btn.disabled = true;
        btn.className = 'flex-1 w-full sm:w-auto px-4 py-2.5 rounded bg-accent-blue/20 text-accent-blue/50 font-medium text-sm cursor-not-allowed transition-all';
      }
    }

    // Attach checkbox listener after DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      const cb = document.getElementById('suitability-checkbox');
      if (cb) cb.addEventListener('change', updateSuitabilityBtn);
    });
    // Also run immediately in case DOM is already loaded
    if (document.getElementById('suitability-checkbox')) {
      document.getElementById('suitability-checkbox').addEventListener('change', updateSuitabilityBtn);
    }

    async function confirmSuitability() {
      if (!state.suitabilityPending) return;
      const { offerId, productName, productId } = state.suitabilityPending;

      // Call the suitability confirmation API
      await apiPost(`/compliance/suitability-confirm/${state.customerId}`, {
        product_id: productId || offerId,
        recommendation_id: state.recommendationId || '',
        confirmed: true,
      });

      closeSuitabilityModal();

      // Now proceed with the normal accept flow
      await acceptOffer(offerId, productName);
    }

    // ==================== UTILS ====================
    function escHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escAttr(str) {
      if (!str) return '';
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // ==================== SSO LOGIN ====================
    let _ssoCustomerAuth = false;

    function ssoCustomerLogin() {
      if (window.BOAI_AUTH) {
        window.BOAI_AUTH.keycloakLogin();
      }
    }

    // ==================== AUTH GATE ====================
    function setupAuthGate() {
      // Listen for Keycloak SSO auth
      if (window.BOAI_AUTH) {
        window.BOAI_AUTH.onAuthChange(async function(user) {
          if (user && !_ssoCustomerAuth) {
            const roles = user.roles || [];
            // Non-client session — clear and stay on customer login (session isolation)
            if (!roles.includes('client')) {
              window.BOAI_AUTH.logout();
              return;
            }
            // Client SSO user — look up customer_id from database by email
            _ssoCustomerAuth = true;
            try {
              const resp = await fetch(API + '/customer-auth/sso-lookup?email=' + encodeURIComponent(user.email));
              if (resp.ok) {
                const data = await resp.json();
                enterPortal(data.customer_id, data.display_name || user.name, data.external_id, data.onboarding_complete);
              } else {
                // No customer account linked — use SSO name with fallback customer_id
                console.warn('[Portal] No customer account for SSO email:', user.email);
                enterPortal(user.customer_id || '1', user.name || user.email, null, true);
              }
            } catch(e) {
              console.error('[Portal] SSO lookup failed:', e);
              enterPortal(user.customer_id || '1', user.name || user.email, null, true);
            }
          }
        });
      }
    }

    // ==================== LANGUAGE CHANGE HANDLER ====================
    document.addEventListener('languageChanged', () => {
      // Re-render dynamic sections when language changes
      if (state.customerId) {
        renderOffers();
        if (state.currentSection === 'data') renderDataSection();
        if (state.currentSection === 'consent') renderConsentSection();
        if (state.currentSection === 'history') renderHistorySection();
      }
    });

    // ==================== CONSENT TOGGLE LISTENERS ====================
    document.querySelectorAll('.toggle-track[data-consent]').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        const type = this.dataset.consent;
        if (type) toggleConsent(type);
      });
    });

    // ==================== ENTER KEY HANDLERS ====================
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('login-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });
    document.getElementById('register-confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });

    // ==================== ONBOARDING WIZARD ====================
    let onboardingStep = 1;

    function onboardingNext(step) {
      onboardingStep = step;
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById(`onboarding-step-${i}`);
        if (el) el.classList.toggle('hidden', i !== step);
      }
      // Update progress dots
      for (let i = 1; i <= 3; i++) {
        const dot = document.getElementById(`step-dot-${i}`);
        if (dot) {
          if (i < step) {
            dot.className = 'w-8 h-8 rounded-full bg-accent-green flex items-center justify-center text-ink-inverse text-sm font-bold flex-shrink-0';
            dot.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>';
          } else if (i === step) {
            dot.className = 'w-8 h-8 rounded-full bg-accent-blue flex items-center justify-center text-ink-inverse text-sm font-bold flex-shrink-0';
            dot.textContent = i;
          } else {
            dot.className = 'w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0';
            dot.style.background = 'var(--bg-sunken)';
            dot.style.color = 'var(--text-muted)';
            dot.textContent = i;
          }
        }
      }
      // Update progress bars
      const bar1 = document.getElementById('step-bar-1');
      const bar2 = document.getElementById('step-bar-2');
      if (bar1) bar1.style.width = step > 1 ? '100%' : '0%';
      if (bar2) bar2.style.width = step > 2 ? '100%' : '0%';

      // Populate summary on step 3
      if (step === 3) renderOnboardingSummary();
    }

    async function loadOnboardingConsentTexts() {
      try {
        const resp = await fetch(API + '/consent-registry/texts');
        if (!resp.ok) return;
        const texts = await resp.json();
        if (!texts.length) return;

        const wrapper = document.getElementById('onboarding-consent-list');
        const details = document.getElementById('ob-reg-details');
        const countEl = document.getElementById('ob-reg-count');
        if (!wrapper || !details) return;

        wrapper.classList.remove('hidden');
        if (countEl) countEl.textContent = `${texts.length} items`;

        details.innerHTML = texts.map(txt => {
          const lang = (window.BOAI_I18N?.currentLang || 'en').toUpperCase();
          const label = (lang === 'DE' ? txt.text_de : lang === 'RO' ? txt.text_ro : null) || txt.official_text || txt.consent_type;
          return `<div class="flex items-start gap-2 p-2 rounded" style="background: var(--bg-sunken);">
            <span class="text-[10px] text-accent-blue mt-0.5">&#9679;</span>
            <div>
              <span class="text-[11px] font-medium" style="color: var(--text-secondary);">${escHtml(txt.consent_type || '')}</span>
              ${txt.legal_reference ? `<span class="text-[10px] ml-1" style="color: var(--text-muted);">(${escHtml(txt.legal_reference)})</span>` : ''}
              <p class="text-[10px] mt-0.5 leading-relaxed" style="color: var(--text-muted);">${escHtml(label)}</p>
            </div>
          </div>`;
        }).join('');
      } catch (e) {
        console.error('Failed to load consent texts:', e);
      }
    }

    function getOnboardingData() {
      const consent = {
        profiling_consent: document.getElementById('ob-profiling')?.checked || false,
        automated_decision_consent: document.getElementById('ob-automated')?.checked || false,
        marketing_email: document.getElementById('ob-marketing-email')?.checked || false,
        marketing_push: document.getElementById('ob-marketing-push')?.checked || false,
        marketing_sms: document.getElementById('ob-marketing-sms')?.checked || false,
        family_context_consent: document.getElementById('ob-family')?.checked || false,
      };

      const profile = {};
      const age = document.getElementById('ob-age')?.value;
      if (age) profile.age = parseInt(age);
      const income = document.getElementById('ob-income')?.value;
      if (income) profile.annual_income = parseFloat(income);
      const deps = document.getElementById('ob-dependents')?.value;
      if (deps !== '' && deps !== undefined) profile.dependents = parseInt(deps);
      const employment = document.getElementById('ob-employment')?.value;
      if (employment) profile.employment_status = employment;
      const risk = document.getElementById('ob-risk')?.value;
      if (risk) profile.risk_tolerance = risk;
      const homeowner = document.getElementById('ob-homeowner')?.value;
      if (homeowner) profile.homeowner_status = homeowner;

      const existingChecked = document.querySelectorAll('#ob-existing-products input:checked');
      if (existingChecked.length) {
        profile.existing_products = Array.from(existingChecked).map(c => c.value).join(',');
      }

      return { consent, profile };
    }

    function renderOnboardingSummary() {
      const { consent, profile } = getOnboardingData();

      // Consent summary
      const consentEl = document.getElementById('ob-summary-consent');
      if (consentEl) {
        const items = [
          { key: 'profiling_consent', label: t('onboarding.consent_profiling') },
          { key: 'automated_decision_consent', label: t('onboarding.consent_automated') },
          { key: 'marketing_email', label: t('onboarding.consent_marketing_email') },
          { key: 'marketing_push', label: t('onboarding.consent_marketing_push') },
          { key: 'marketing_sms', label: t('onboarding.consent_marketing_sms') },
          { key: 'family_context_consent', label: t('onboarding.consent_family') },
        ];
        consentEl.innerHTML = items.map(i => `
          <div class="flex items-center gap-2">
            <span class="w-5 h-5 rounded-full flex items-center justify-center text-xs ${consent[i.key] ? 'bg-accent-green/20 text-accent-green' : 'text-ink-muted'}" style="${!consent[i.key] ? 'background: var(--bg-sunken);' : ''}">
              ${consent[i.key] ? '&#10003;' : '&#10007;'}
            </span>
            <span class="text-sm" style="color: ${consent[i.key] ? 'var(--text-primary)' : 'var(--text-muted)'};">${escHtml(i.label)}</span>
          </div>
        `).join('');
      }

      // Profile summary
      const profileEl = document.getElementById('ob-summary-profile');
      if (profileEl) {
        const fields = [
          { key: 'age', label: t('onboarding.age') },
          { key: 'annual_income', label: t('onboarding.annual_income'), fmt: v => '€' + Number(v).toLocaleString() },
          { key: 'dependents', label: t('onboarding.dependents') },
          { key: 'employment_status', label: t('onboarding.employment') },
          { key: 'risk_tolerance', label: t('onboarding.risk_tolerance') },
          { key: 'homeowner_status', label: t('onboarding.homeowner') },
          { key: 'existing_products', label: t('onboarding.existing_products'), fmt: v => v.replace(/,/g, ', ') },
        ];
        profileEl.innerHTML = fields.filter(f => profile[f.key] !== undefined).map(f => `
          <div class="p-2.5 rounded" style="background: var(--bg-sunken);">
            <p class="text-[10px]" style="color: var(--text-muted);">${escHtml(f.label)}</p>
            <p class="text-sm font-medium" style="color: var(--text-primary);">${escHtml(f.fmt ? f.fmt(profile[f.key]) : String(profile[f.key]))}</p>
          </div>
        `).join('');

        if (!profileEl.innerHTML.trim()) {
          profileEl.innerHTML = '<p class="text-sm col-span-2" style="color: var(--text-muted);">' + t('onboarding.no_profile_data') + '</p>';
        }
      }
    }

    async function submitOnboarding() {
      const btn = document.getElementById('ob-submit-btn');
      const errorEl = document.getElementById('ob-submit-error');
      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const data = getOnboardingData();
        const resp = await fetch(API + '/customer-auth/onboarding/' + state.customerId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || 'Onboarding submission failed');
        }

        // Update session
        state.onboardingComplete = true;
        const session = getCustomerSession();
        if (session) {
          session.onboarding_complete = true;
          localStorage.setItem(CUSTOMER_SESSION_KEY, JSON.stringify(session));
        }

        // Transition to portal
        document.getElementById('onboarding-wizard').classList.add('hidden');
        document.getElementById('screen-portal').classList.remove('hidden');
        updateBadge(session?.display_name || `#${state.customerId}`);
        navigateTo('offers');

        // Load data
        await Promise.all([loadCustomerData(), loadProfile(), loadOffers(), loadFeedback()]);
        renderCustomerInfo();
        renderOffers();
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="onboarding.complete">${t('onboarding.complete')}</span>`;
      }
    }

    // ===== MY FORMS (Customer-facing) =====
    async function loadCustomerForms() {
      const container = document.getElementById('formsContainer');
      if (!container || !state.customerId) return;

      container.innerHTML = '<div class="text-center py-8"><div class="loading-pulse w-full h-20 rounded mb-3" style="background: var(--bg-sunken);"></div><div class="loading-pulse w-full h-20 rounded" style="background: var(--bg-sunken);"></div></div>';

      try {
        const resp = await apiGet(`/workflow/forms/customer/${state.customerId}`);
        if (!resp || resp.length === 0) {
          container.innerHTML = `<div class="text-center py-12" style="color: var(--text-muted);">
            <svg class="w-12 h-12 mx-auto mb-3" style="color: var(--border-strong);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <p class="text-sm">No application forms yet</p>
            <p class="text-xs mt-1" style="color: var(--text-muted);">When you accept an offer, your advisor may send you a form to complete.</p>
          </div>`;
          return;
        }

        // Update forms badge
        const pendingCount = resp.filter(f => f.status === 'pending').length;
        updateFormsBadge(pendingCount);

        container.innerHTML = resp.map(form => renderFormCard(form)).join('');
      } catch (err) {
        console.error('Failed to load forms:', err);
        container.innerHTML = '<div class="text-center py-8 text-accent-red text-sm">Failed to load forms</div>';
      }
    }

    function updateFormsBadge(count) {
      // Add/update badge on Forms nav buttons
      document.querySelectorAll('[data-nav="forms"]').forEach(btn => {
        let badge = btn.querySelector('.forms-badge');
        if (count > 0) {
          if (!badge) {
            badge = document.createElement('span');
            badge.className = 'forms-badge ml-1.5 px-1.5 py-0.5 rounded text-[10px] font-bold bg-accent-blue/20 text-accent-blue';
            btn.appendChild(badge);
          }
          badge.textContent = count;
        } else if (badge) {
          badge.remove();
        }
      });
    }

    function renderFormCard(form) {
      const statusColors = {
        pending: 'bg-accent-yellow/10 text-accent-yellow border-accent-yellow/20',
        submitted: 'bg-accent-blue/10 text-accent-blue border-accent-blue/20',
        approved: 'bg-accent-green/10 text-accent-green border-accent-green/20',
        rejected: 'bg-accent-red/10 text-accent-red border-accent-red/20',
      };
      const statusLabels = { pending: 'Pending', submitted: 'Submitted', approved: 'Approved', rejected: 'Rejected' };
      const sc = statusColors[form.status] || statusColors.pending;
      const sl = statusLabels[form.status] || form.status;
      const created = new Date(form.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

      let actionHtml = '';
      if (form.status === 'pending') {
        const fields = form.fields || [];
        actionHtml = `
          <div id="form-fields-${form.id}" class="mt-4 space-y-3">
            ${fields.map(f => renderFormField(f, form.id)).join('')}
            <div class="flex gap-3 mt-4">
              <button onclick="submitApplicationForm(${form.id})" class="px-5 py-2 rounded bg-accent-blue hover:bg-accent-blue/90 text-ink-inverse font-medium text-sm transition-colors">Submit Application</button>
            </div>
          </div>`;
      } else if (form.status === 'submitted' && form.submitted_data) {
        actionHtml = `
          <div class="mt-4 rounded p-3" style="background: var(--bg-sunken);">
            <p class="text-xs mb-2 font-medium uppercase tracking-wider" style="color: var(--text-muted);">Your Submission</p>
            ${Object.entries(form.submitted_data).map(([k, v]) => `<div class="flex justify-between text-sm py-1 last:border-0" style="border-bottom: 1px solid var(--border);"><span style="color: var(--text-secondary);">${k.replace(/_/g, ' ')}</span><span class="font-medium" style="color: var(--text-primary);">${v}</span></div>`).join('')}
          </div>`;
      }

      return `
        <div class="bg-white border border-border rounded p-4 md:p-5 mb-4 fade-in" style="background: var(--bg-raised); border-color: var(--border);">
          <div class="flex items-start justify-between gap-3 mb-2">
            <div>
              <h3 class="text-base font-medium" style="color: var(--text-primary);">${escHtml(form.product_name)}</h3>
              <p class="text-xs mt-0.5" style="color: var(--text-muted);">Sent by your advisor &middot; ${created}</p>
            </div>
            <span class="px-2.5 py-1 rounded text-xs font-medium border ${sc}">${sl}</span>
          </div>
          <p class="text-xs" style="color: var(--text-secondary);">Form type: <span class="font-medium" style="color: var(--text-primary);">${form.form_type.replace(/_/g, ' ')}</span></p>
          ${actionHtml}
        </div>`;
    }

    function renderFormField(field, formId) {
      const req = field.required ? '<span class="text-accent-red">*</span>' : '';
      const id = `formfield-${formId}-${field.name}`;

      if (field.type === 'textarea') {
        return `<div><label class="block text-xs mb-1" style="color: var(--text-secondary);">${escHtml(field.label)} ${req}</label><textarea id="${id}" class="w-full px-3 py-2 rounded border text-sm resize-y focus:outline-none focus:border-accent-blue" style="background: var(--bg); border-color: var(--border); color: var(--text-primary);" rows="2" placeholder="${escAttr(field.label)}"></textarea></div>`;
      }
      if (field.type === 'checkbox') {
        return `<div class="flex items-center gap-2"><input type="checkbox" id="${id}" class="w-4 h-4 rounded accent-accent-blue"><label for="${id}" class="text-sm" style="color: var(--text-secondary);">${escHtml(field.label)} ${req}</label></div>`;
      }
      return `<div><label class="block text-xs mb-1" style="color: var(--text-secondary);">${escHtml(field.label)} ${req}</label><input type="${field.type || 'text'}" id="${id}" class="w-full px-3 py-2 rounded border text-sm focus:outline-none focus:border-accent-blue" style="background: var(--bg); border-color: var(--border); color: var(--text-primary);" placeholder="${escAttr(field.label)}"></div>`;
    }

    function showPortalNotification(message, type) {
      const colors = { success: 'bg-accent-green/20 text-accent-green border-accent-green/30', error: 'bg-accent-red/20 text-accent-red border-accent-red/30' };
      const cls = colors[type] || colors.success;
      const el = document.createElement('div');
      el.className = `fixed top-4 right-4 z-[100] px-4 py-3 rounded border text-sm font-medium ${cls} fade-in`;
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    async function submitApplicationForm(formId) {
      const container = document.getElementById(`form-fields-${formId}`);
      if (!container) return;

      const inputs = container.querySelectorAll('input, textarea');
      const data = {};

      inputs.forEach(el => {
        const name = el.id.replace(`formfield-${formId}-`, '');
        if (el.type === 'checkbox') {
          data[name] = el.checked;
        } else {
          data[name] = el.value.trim();
        }
      });

      try {
        const resp = await fetch(`${API}/workflow/forms/${formId}/submit`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${state.token}`,
          },
          body: JSON.stringify({ data }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || 'Submission failed');
        }
        showPortalNotification('Application submitted successfully!', 'success');
        loadCustomerForms();
      } catch (err) {
        showPortalNotification('Failed to submit: ' + err.message, 'error');
      }
    }

    // ==================== START ====================
    setupAuthGate();
    init();
    </script>
    </body>
    </html>

