## BankOffer AI — Landing Zone Helm values
## Overrides for local k3d environment
## Source chart: platform/bankoffer-platform (infra/helm/bankoffer)

global:
  imagePullSecrets: []
  security:
    allowInsecureImages: true

api:
  replicaCount: 1

  image:
    repository: bankoffer-api
    pullPolicy: Never
    tag: "dev"

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  config:
    demoMode: "true"
    logLevel: "info"
    keycloakRealm: gitops

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # Override static files — replace all external lupulup.com URLs with local equivalents
  extraVolumes:
    - name: auth-js-override
      configMap:
        name: bankoffer-auth-js-override
    - name: index-html-override
      configMap:
        name: bankoffer-index-html-override
    - name: admin-html-override
      configMap:
        name: bankoffer-admin-html-override
    - name: portal-html-override
      configMap:
        name: bankoffer-portal-html-override
  extraVolumeMounts:
    - name: auth-js-override
      mountPath: /app/services/api/static/js/auth.js
      subPath: auth.js
    - name: index-html-override
      mountPath: /app/services/api/static/index.html
      subPath: index.html
    - name: admin-html-override
      mountPath: /app/services/api/static/admin.html
      subPath: admin.html
    - name: portal-html-override
      mountPath: /app/services/api/static/portal.html
      subPath: portal.html

seed:
  enabled: true
  image:
    repository: bankoffer-api
    pullPolicy: Never
    tag: "dev"
  initImage: postgres:16-alpine

keycloakSync:
  enabled: false

# Disable embedded Keycloak — use landing zone Keycloak instead
keycloak:
  enabled: false

# PostgreSQL sub-chart (Bitnami) — use locally imported image (bitnami/postgresql:latest imported as bankoffer-postgresql:dev)
postgresql:
  enabled: true
  image:
    registry: ""
    repository: bankoffer-postgresql
    tag: "dev"
    pullPolicy: Never
  auth:
    database: bankofferingai
    username: bankofferuser
    password: bankoffer123
    postgresPassword: bankoffer-pg-admin123
  primary:
    pgHbaConfiguration: |
      local all all trust
      host  all all 0.0.0.0/0 md5
    persistence:
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Redis sub-chart (Bitnami)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis123
  master:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Employee-facing ingress — local override
ingressEmployee:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  host: bankoffer.local
  tls: false

ingressCustomer:
  enabled: false

# Disable built-in NetworkPolicy — it's hardcoded for nginx; landing zone uses Traefik (kube-system)
networkPolicy:
  enabled: false
