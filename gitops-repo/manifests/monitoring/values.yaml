# kube-prometheus-stack values — lightweight local dev config
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

# Grafana
grafana:
  adminUser: admin
  adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
  persistence:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.local
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Prometheus
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    storageSpec: {}
    # Scrape all namespaces
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.local
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web

# Alertmanager — disabled for local dev
alertmanager:
  enabled: false

# Admission webhooks — disabled for local dev (hook-succeeded delete policy
# races with ArgoCD's job completion polling)
prometheusOperator:
  admissionWebhooks:
    enabled: false

# Node exporter — lightweight host metrics
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

# Kube-state-metrics — K8s object metrics
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Disable components that don't work well in k3d
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
