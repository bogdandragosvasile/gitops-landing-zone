---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: careerforge-slides
  namespace: careerforge-slides
  labels:
    app: careerforge-slides
spec:
  replicas: 1
  selector:
    matchLabels:
      app: careerforge-slides
  template:
    metadata:
      labels:
        app: careerforge-slides
    spec:
      containers:
        - name: careerforge-slides
          image: careerforge-slides:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: careerforge-slides
  namespace: careerforge-slides
spec:
  selector:
    app: careerforge-slides
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careerforge-slides
  namespace: careerforge-slides
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: cf-slides.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: careerforge-slides
                port:
                  number: 80
