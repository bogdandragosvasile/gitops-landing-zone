## ArgoCD Helm values for local GitOps environment
## Chart: argo/argo-cd v9.4.17

global:
  domain: argocd.local

server:
  extraArgs:
    - --insecure
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.local
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web

configs:
  params:
    server.insecure: true

  cm:
    url: "http://argocd.local"
    admin.enabled: "true"
    oidc.config: |
      name: Keycloak
      issuer: http://keycloak.local/realms/gitops
      clientID: argocd
      clientSecret: 457c90e982c099e5b76276f4248f3cd1483174aae98d6826
      requestedScopes:
        - openid
        - profile
        - email

  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, admin, role:admin

  repositories:
    gitea-gitops-infra:
      url: http://gitea:3000/platform/gitops-infra.git
      name: gitops-infra
      type: git
      username: "gitea_admin"
      password: "0h6i8DV+2VKGYmNNpDbSypvYHo0BohrR"
    gitea-bankoffer-platform:
      url: http://gitea:3000/platform/bankoffer-platform.git
      name: bankoffer-platform
      type: git
      username: "gitea_admin"
      password: "0h6i8DV+2VKGYmNNpDbSypvYHo0BohrR"
    gitea-careerforge:
      url: http://gitea:3000/platform/careerforge.git
      name: careerforge
      type: git
      username: "gitea_admin"
      password: "0h6i8DV+2VKGYmNNpDbSypvYHo0BohrR"

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true

notifications:
  enabled: false
