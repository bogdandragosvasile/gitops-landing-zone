## ArgoCD Helm values for local GitOps environment
## Chart: argo/argo-cd v9.4.17

global:
  domain: argocd.local

server:
  extraArgs:
    - --insecure
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.local
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web

configs:
  params:
    server.insecure: true

  cm:
    url: "http://${ARGOCD_HOST}"
    admin.enabled: "true"
    oidc.config: |
      name: Keycloak
      issuer: http://${KEYCLOAK_HOST}/realms/${KEYCLOAK_REALM}
      clientID: ${OIDC_ARGOCD_CLIENT_ID}
      clientSecret: ${OIDC_ARGOCD_CLIENT_SECRET}
      requestedScopes:
        - openid
        - profile
        - email

  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, admin, role:admin

  repositories:
    gitea-gitops-infra:
      url: http://gitea:3000/platform/gitops-infra.git
      name: gitops-infra
      type: git
      username: "${GITEA_ADMIN_USER}"
      password: "${GITEA_ADMIN_PASSWORD}"
    gitea-bankoffer-platform:
      url: http://gitea:3000/platform/bankoffer-platform.git
      name: bankoffer-platform
      type: git
      username: "${GITEA_ADMIN_USER}"
      password: "${GITEA_ADMIN_PASSWORD}"
    gitea-careerforge:
      url: http://gitea:3000/platform/careerforge.git
      name: careerforge
      type: git
      username: "${GITEA_ADMIN_USER}"
      password: "${GITEA_ADMIN_PASSWORD}"

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true

notifications:
  enabled: false
