## ArgoCD Helm values for local GitOps environment
## Chart: argo/argo-cd v9.4.17

global:
  domain: argocd.local

server:
  extraArgs:
    - --insecure
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.local
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web

configs:
  params:
    server.insecure: true

  cm:
    url: "http://argocd.local"
    admin.enabled: "true"
    oidc.config: |
      name: Keycloak
      issuer: http://keycloak.local/realms/gitops
      clientID: argocd
      clientSecret: ${OIDC_ARGOCD_CLIENT_SECRET}
      requestedScopes:
        - openid
        - profile
        - email

  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, admin, role:admin

  repositories:
    gitea-gitops-infra:
      url: http://gitea:3000/${GITEA_ORG}/${GITEA_REPO}.git
      name: gitops-infra
      type: git
      username: "${GITEA_ADMIN_USER}"
      password: "${GITEA_ADMIN_PASSWORD}"
    gitea-industry40:
      url: http://gitea:3000/${GITEA_ORG}/industry40.git
      name: industry40
      type: git
      username: "${GITEA_ADMIN_USER}"
      password: "${GITEA_ADMIN_PASSWORD}"
    gitea-headscale:
      url: http://gitea:3000/${GITEA_ORG}/headscale.git
      name: headscale
      type: git
      username: "${GITEA_ADMIN_USER}"
      password: "${GITEA_ADMIN_PASSWORD}"
    # Add your own application repos below, for example:
    # gitea-my-app:
    #   url: http://gitea:3000/${GITEA_ORG}/my-app.git
    #   name: my-app
    #   type: git
    #   username: "${GITEA_ADMIN_USER}"
    #   password: "${GITEA_ADMIN_PASSWORD}"

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true

notifications:
  enabled: false
