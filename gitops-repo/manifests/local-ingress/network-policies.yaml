# --- 28. Allow monitoring-internal communication
#         Grafana → Prometheus (9090), Grafana → Loki (3100),
#         Prometheus → Alertmanager (9093)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-internal
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

---

# --- 28b. Allow monitoring pods to reach each other (egress side)
#          allow-dns-egress applies Egress policyType to all pods, which
#          implicitly denies all other egress (including Grafana → Prometheus).
#          This policy restores intra-namespace egress for all monitoring pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-internal-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

---

# --- 29. Allow Promtail to push logs to Loki (port 3100)
#         Promtail runs as DaemonSet in kube-system (or monitoring), no
#         network ingress from outside is needed — already covered by
#         allow-monitoring-internal above. This policy is a belt-and-suspenders
#         entry for when Promtail runs in a separate namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-promtail-loki-push
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: promtail
      ports:
        - port: 3100
          protocol: TCP

---

# --- 30. Allow Prometheus egress to scrape all namespaces
#         Prometheus initiates connections outbound; the target namespace
#         policies (allow-prometheus-scrape) permit the ingress side.
#         Two rules:
#         (a) pod IPs via namespaceSelector — covers regular pods
#         (b) node IPs via ipBlock — covers kubelet (10250), node-exporter
#             (9100, hostNetwork), CoreDNS (9153), and the k3d pod CIDR
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    # (a) Pod-to-pod scraping across all namespaces
    - to:
        - namespaceSelector: {}
      ports:
        - port: 9090
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8000
          protocol: TCP
        - port: 8001
          protocol: TCP
        - port: 8002
          protocol: TCP
        - port: 8003
          protocol: TCP
        - port: 9113
          protocol: TCP
        - port: 9100
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 8082
          protocol: TCP
        - port: 8083
          protocol: TCP
        - port: 9000
          protocol: TCP
        - port: 10250
          protocol: TCP
        - port: 9153
          protocol: TCP
    # (b) Host-network targets: kubelet (10250), node-exporter (9100),
    #     CoreDNS (9153) running on k3d node IPs (172.20.0.0/24)
    #     and pod CIDR (10.42.0.0/16) for host-network pods
    - to:
        - ipBlock:
            cidr: 172.20.0.0/24
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - port: 9100
          protocol: TCP
        - port: 10250
          protocol: TCP
        - port: 9153
          protocol: TCP
        - port: 9153
          protocol: UDP

---

# --- 31. DNS egress for monitoring pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

