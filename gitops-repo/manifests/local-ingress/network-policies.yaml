# --- 27. Allow Traefik to reach Grafana UI (port 3000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP

---

# --- 28. Allow monitoring-internal communication
#         Grafana → Prometheus (9090), Grafana → Loki (3100),
#         Prometheus → Alertmanager (9093)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-internal
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

---

# --- 29. Allow Promtail to push logs to Loki (port 3100)
#         Promtail runs as DaemonSet in kube-system (or monitoring), no
#         network ingress from outside is needed — already covered by
#         allow-monitoring-internal above. This policy is a belt-and-suspenders
#         entry for when Promtail runs in a separate namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-promtail-loki-push
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: promtail
      ports:
        - port: 3100
          protocol: TCP

---

# --- 30. Allow Prometheus egress to scrape all namespaces
#         Prometheus initiates connections outbound; the target namespace
#         policies (allow-prometheus-scrape) permit the ingress side.
#         This egress policy allows Prometheus to reach any pod on
#         common metrics ports across all namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 9090
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8000
          protocol: TCP
        - port: 8001
          protocol: TCP
        - port: 8002
          protocol: TCP
        - port: 8003
          protocol: TCP
        - port: 9113
          protocol: TCP
        - port: 9100
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 8082
          protocol: TCP
        - port: 8083
          protocol: TCP
        - port: 9000
          protocol: TCP

---

# --- 31. DNS egress for monitoring pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

