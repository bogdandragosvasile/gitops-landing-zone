---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: careerforge-slides
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea:3000/platform/gitops-infra.git
    targetRevision: main
    path: manifests/careerforge-slides
  destination:
    server: https://kubernetes.default.svc
    namespace: careerforge-slides
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
